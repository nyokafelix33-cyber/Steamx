<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Feng World</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --red:#e5091a;--red2:#ff2d3f;
  --bg:#07070f;--bg2:#0d0d1a;--bg3:#12121f;--bg4:#1a1a2a;
  --text:#f0f0f8;--muted:rgba(240,240,248,.45);--bdr:rgba(255,255,255,.08);
  --card-r:14px;--nav-h:64px;
  --font:'Space Grotesk',sans-serif;--font2:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(229,9,26,.4);border-radius:2px}

/* ── NAV ── */
#nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:500;
  display:flex;align-items:center;padding:0 20px;gap:16px;
  background:linear-gradient(to bottom,rgba(7,7,15,.98),rgba(7,7,15,.85));
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-icon{
  width:36px;height:36px;background:var(--red);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(229,9,26,.5);
  font-size:16px;font-weight:900;color:#fff;
}
.logo-txt{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  color:var(--text);
}
.logo-txt span{color:var(--red)}
.nav-links{display:flex;gap:4px;flex:1}
.nav-link{
  padding:7px 12px;border-radius:8px;font-size:13px;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all .2s;border:none;
  background:none;font-family:var(--font);white-space:nowrap;
}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,.06)}
.nav-link.active{color:#fff;background:rgba(229,9,26,.18);border:1px solid rgba(229,9,26,.3)}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.wl-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  color:var(--text);border-radius:10px;padding:7px 12px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;white-space:nowrap;
}
.wl-btn:hover{background:rgba(255,255,255,.12)}

/* ── SEARCH BAR ── */
#searchbar{
  position:fixed;top:var(--nav-h);left:0;right:0;z-index:490;
  padding:8px 16px 10px;
  background:rgba(7,7,15,.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.search-inner{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.09);
  border-radius:12px;padding:10px 14px;
  transition:all .25s;
}
.search-inner:focus-within{
  border-color:rgba(229,9,26,.5);
  background:rgba(229,9,26,.05);
  box-shadow:0 0 0 3px rgba(229,9,26,.08);
}
.search-inner svg{flex-shrink:0;opacity:.4}
#sinput{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;font-family:var(--font);font-weight:500;
}
#sinput::placeholder{color:var(--muted)}
#sclr{
  background:rgba(255,255,255,.1);border:none;color:var(--text);
  width:20px;height:20px;border-radius:50%;font-size:13px;
  display:none;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;
}
#sclr.show{display:flex}

/* ── PAGES ── */
.page{display:none;padding-top:calc(var(--nav-h) + 56px)}
.page.active{display:block}

/* ── HERO ── */
.hero{
  position:relative;height:calc(100vw * 0.56);min-height:240px;max-height:520px;
  overflow:hidden;
}
.hero-img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:opacity .6s;
}
.hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,rgba(7,7,15,.7) 40%,rgba(7,7,15,.2) 100%),
             linear-gradient(to right,rgba(7,7,15,.8) 0%,transparent 60%);
}
.hero-content{
  position:absolute;bottom:0;left:0;right:0;padding:20px 20px 28px;
  transform:translateY(0);transition:all .4s;
}
.hero-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.hero-badge{
  background:rgba(229,9,26,.85);border-radius:5px;
  padding:3px 8px;font-size:10px;font-weight:800;letter-spacing:.5px;
}
.hero-badge.outline{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.8);
}
.hero-title{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,52px);
  letter-spacing:2px;line-height:1;margin-bottom:8px;
  text-shadow:0 2px 20px rgba(0,0,0,.8);
}
.hero-desc{
  font-size:12px;color:rgba(240,240,248,.7);line-height:1.5;
  max-width:320px;margin-bottom:14px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.hero-btns{display:flex;gap:8px;flex-wrap:wrap}
.hero-dots{
  position:absolute;bottom:8px;right:16px;display:flex;gap:5px;z-index:2;
}
.hero-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.3);cursor:pointer;transition:all .3s;
}
.hero-dot.active{background:var(--red);width:18px;border-radius:3px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  border-radius:10px;padding:10px 18px;
  font-size:13px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;border:none;
  white-space:nowrap;
}
.btn-red{
  background:var(--red);color:#fff;
  box-shadow:0 4px 16px rgba(229,9,26,.4);
}
.btn-red:hover{background:var(--red2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(229,9,26,.5)}
.btn-ghost{
  background:rgba(255,255,255,.1);color:var(--text);
  border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(10px);
}
.btn-ghost:hover{background:rgba(255,255,255,.18)}
.btn-green{
  background:rgba(0,200,80,.15);color:#00c850;
  border:1px solid rgba(0,200,80,.3);
}
.btn-green:hover{background:rgba(0,200,80,.25)}
.btn-sm{padding:8px 14px;font-size:12px}

/* ── SECTIONS ── */
.section{margin-bottom:32px}
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;margin-bottom:12px;
}
.sec-title{
  font-size:16px;font-weight:800;letter-spacing:.3px;
  position:relative;
}
.sec-title::before{
  content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:16px;background:var(--red);border-radius:2px;
}
.sec-more{font-size:12px;color:var(--red);cursor:pointer;font-weight:700}

/* ── CARDS ── */
.cards-row{
  display:flex;gap:10px;overflow-x:auto;padding:0 16px 8px;
  scrollbar-width:none;
}
.cards-row::-webkit-scrollbar{display:none}
.card{
  flex-shrink:0;width:120px;cursor:pointer;
  transition:transform .25s;
}
.card:hover{transform:scale(1.04)}
.card-img-wrap{
  position:relative;border-radius:var(--card-r);overflow:hidden;
  aspect-ratio:2/3;background:var(--bg3);margin-bottom:7px;
}
.card-img{width:100%;height:100%;object-fit:cover;display:block}
.card-img-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 50%);
  opacity:0;transition:opacity .2s;
}
.card:hover .card-img-wrap::after{opacity:1}
.card-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:1;opacity:0;transition:opacity .2s;
}
.card:hover .card-play{opacity:1}
.card-play-icon{
  width:40px;height:40px;background:rgba(229,9,26,.9);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;box-shadow:0 4px 16px rgba(229,9,26,.5);
}
.card-rating{
  position:absolute;top:6px;left:6px;z-index:1;
  background:rgba(0,0,0,.75);border-radius:5px;
  padding:2px 6px;font-size:10px;font-weight:700;color:#ffd700;
}
.card-new{
  position:absolute;top:6px;right:6px;z-index:1;
  background:var(--red);border-radius:5px;
  padding:2px 5px;font-size:9px;font-weight:800;letter-spacing:.3px;
}
.card-title{font-size:12px;font-weight:600;line-height:1.3;color:var(--text)}
.card-meta{font-size:10px;color:var(--muted);margin-top:2px}

/* Wide cards for landscape */
.card-wide{width:170px}
.card-wide .card-img-wrap{aspect-ratio:16/9}

/* ── BROWSE PAGE ── */
.browse-filters{
  display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;
  scrollbar-width:none;
}
.browse-filters::-webkit-scrollbar{display:none}
.filter-btn{
  flex-shrink:0;padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  color:var(--muted);font-family:var(--font);transition:all .2s;
}
.filter-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  padding:0 16px 80px;
}
.grid .card{width:100%}

/* ── DETAIL PAGE ── */
#detail-page{padding-top:0!important}
.detail-back{
  position:fixed;top:16px;left:16px;z-index:600;
  width:38px;height:38px;border-radius:50%;
  background:rgba(7,7,15,.8);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;backdrop-filter:blur(10px);
  transition:all .2s;
}
.detail-back:hover{background:rgba(229,9,26,.3)}
.detail-hero{
  position:relative;height:56vw;min-height:220px;max-height:400px;
  overflow:hidden;
}
.detail-hero-img{width:100%;height:100%;object-fit:cover}
.detail-hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,rgba(7,7,15,.5) 50%,transparent 100%);
}
.detail-body{padding:0 16px;margin-top:-40px;position:relative;z-index:2}
.detail-row{display:flex;gap:14px;margin-bottom:16px}
.detail-poster{
  width:90px;flex-shrink:0;border-radius:10px;overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.1);
}
.detail-poster img{width:100%;display:block}
.detail-info{flex:1;padding-top:8px;min-width:0}
.detail-title{font-size:20px;font-weight:800;line-height:1.2;margin-bottom:6px}
.detail-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.chip{
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--muted);
}
.chip.red{background:rgba(229,9,26,.15);border-color:rgba(229,9,26,.3);color:var(--red)}
.chip.gold{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.3);color:#ffd700}
.detail-overview{
  font-size:13px;color:rgba(240,240,248,.72);line-height:1.6;
  margin-bottom:16px;font-family:var(--font2);
}
.detail-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.detail-tagline{
  font-size:13px;font-style:italic;color:var(--red);
  margin-bottom:12px;font-family:var(--font2);
}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bdr);margin-bottom:20px}
.tab{
  padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;
  background:none;border-left:none;border-right:none;border-top:none;
  font-family:var(--font);
}
.tab.active{color:var(--text);border-bottom-color:var(--red)}
.tab-pane{display:none}.tab-pane.active{display:block}

/* Cast */
.cast-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.cast-row::-webkit-scrollbar{display:none}
.cast-card{flex-shrink:0;width:70px;text-align:center}
.cast-img{
  width:62px;height:62px;border-radius:50%;object-fit:cover;margin:0 auto 6px;
  border:2px solid var(--bdr);background:var(--bg3);display:block;
}
.cast-name{font-size:10px;font-weight:600;color:var(--text);line-height:1.3}
.cast-role{font-size:9px;color:var(--muted)}

/* Episodes */
.ep-item{
  display:flex;gap:12px;padding:10px;
  background:var(--bg3);border-radius:10px;margin-bottom:8px;
  cursor:pointer;transition:all .2s;border:1px solid transparent;
}
.ep-item:hover,.ep-item.active-ep{border-color:rgba(229,9,26,.4);background:rgba(229,9,26,.08)}
.ep-thumb{
  width:80px;flex-shrink:0;border-radius:7px;overflow:hidden;
  background:var(--bg4);aspect-ratio:16/9;position:relative;
}
.ep-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.ep-thumb-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(229,9,26,.7);font-size:16px;opacity:0;transition:opacity .2s;
}
.ep-item:hover .ep-thumb-play{opacity:1}
.ep-info{flex:1;min-width:0}
.ep-num{font-size:10px;color:var(--red);font-weight:800;margin-bottom:3px}
.ep-name{font-size:13px;font-weight:700;margin-bottom:3px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ep-desc{font-size:11px;color:var(--muted);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.season-select{
  display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;
}
.season-select::-webkit-scrollbar{display:none}
.seas-btn{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  color:var(--muted);font-family:var(--font);transition:all .2s;
}
.seas-btn.active{background:var(--red);border-color:var(--red);color:#fff}

/* Similar grid */
.sim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

/* ── PLAYER MODAL ── */
#player-modal{
  display:none;
  position:fixed;inset:0;z-index:9000;
  background:#000;
  flex-direction:column;
  overflow:hidden;
}
#player-modal.open{display:flex}

/* TOP BAR — fixed height, never hidden, always clickable */
#pm-topbar{
  flex:0 0 54px;
  width:100%;
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:rgba(0,0,0,.92);
  border-bottom:1px solid rgba(255,255,255,.08);
  z-index:30;
  position:relative;
}

/* IFRAME fills ALL remaining space between topbar and bottombar */
#pm-iframe-wrap{
  flex:1 1 auto;
  position:relative;
  overflow:hidden;
  background:#000;
  /* stretch to fill - no aspect ratio constraint */
  min-height:0;
  width:100%;
}
#pm-iframe{
  position:absolute;
  top:0;left:0;
  width:100%;
  height:100%;
  border:none;
  display:block;
  background:#000;
}

/* BOTTOM BAR — fixed height, never hidden, always clickable */
#pm-bottombar{
  flex:0 0 auto;
  width:100%;
  padding:10px 14px 18px;
  background:rgba(0,0,0,.92);
  border-top:1px solid rgba(255,255,255,.08);
  z-index:30;
  position:relative;
}
.pm-back{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .2s;font-weight:700;
}
.pm-back:active{background:rgba(229,9,26,.5);transform:scale(.92)}
.pm-title{
  flex:1;font-size:14px;font-weight:700;
  text-shadow:0 1px 6px rgba(0,0,0,.9);
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.pm-ep-badge{
  background:rgba(229,9,26,.8);border-radius:6px;
  padding:3px 8px;font-size:11px;font-weight:700;flex-shrink:0;
}
.pm-srv-row{
  display:flex;gap:6px;overflow-x:auto;
  padding-bottom:6px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.pm-srv-row::-webkit-scrollbar{display:none}
.pm-srv{
  flex-shrink:0;padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.85);font-family:var(--font);transition:all .2s;
  min-height:36px;display:flex;align-items:center;
}
.pm-srv:active{transform:scale(.95)}
.pm-srv.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 12px rgba(229,9,26,.5)}
.pm-actions{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.pm-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
  color:#fff;border-radius:10px;padding:9px 14px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;min-height:40px;
}
.pm-btn:active{transform:scale(.95)}
.pm-btn.red{background:rgba(229,9,26,.8);border-color:var(--red);box-shadow:0 2px 12px rgba(229,9,26,.4)}
.pm-shield{
  margin-left:auto;display:flex;align-items:center;gap:4px;
  background:rgba(0,200,80,.2);border:1px solid rgba(0,200,80,.4);
  color:#00c850;border-radius:20px;padding:6px 12px;
  font-size:11px;font-weight:800;flex-shrink:0;
}

/* Episode Panel in player */
#pm-ep-panel{
  display:none;position:fixed;inset:0;z-index:9010;
  background:rgba(7,7,15,.97);backdrop-filter:blur(20px);
  overflow-y:auto;padding:60px 16px 40px;
}
#pm-ep-panel.open{display:block}
.pm-ep-close{
  position:sticky;top:-60px;float:right;margin-bottom:10px;
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

/* ── WATCHLIST ── */
#wl-page .grid{padding-bottom:100px}
.wl-empty{
  text-align:center;padding:60px 20px;
  color:var(--muted);
}
.wl-empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}

/* ── DOWNLOAD MODAL ── */
#dl-modal{
  display:none;position:fixed;inset:0;z-index:8000;
  background:rgba(0,0,0,.85);backdrop-filter:blur(16px);
  align-items:flex-end;justify-content:center;padding:0;
}
#dl-modal.open{display:flex}
.dl-box{
  background:var(--bg3);border:1px solid var(--bdr);
  border-radius:20px 20px 0 0;width:100%;max-width:520px;
  overflow:hidden;box-shadow:0 -8px 40px rgba(0,0,0,.8);
  animation:slideUp .3s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.dl-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:12px auto 0}
.dl-head{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr)}
.dl-poster{width:36px;height:52px;border-radius:6px;object-fit:cover;flex-shrink:0}
.dl-poster-fb{width:36px;height:52px;border-radius:6px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--muted);flex-shrink:0}
.dl-info{flex:1}
.dl-title{font-size:15px;font-weight:800}
.dl-sub{font-size:11px;color:var(--muted)}
.dl-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.dl-body{padding:14px 18px 28px}
.dl-sec{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--muted);margin-bottom:8px;text-transform:uppercase}
.dl-qualities{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.dl-q{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:var(--bg4);border:1px solid var(--bdr);border-radius:10px;
  padding:12px 8px;text-decoration:none;color:var(--text);transition:all .2s;cursor:pointer;
}
.dl-q:hover{border-color:rgba(0,200,80,.4);background:rgba(0,200,80,.08);transform:scale(1.02)}
.dl-q-label{font-size:15px;font-weight:900;font-family:'Bebas Neue',sans-serif;letter-spacing:1px}
.dl-q-label.q480{color:#aaa}
.dl-q-label.q720{color:#4fc3f7}
.dl-q-label.q1080{color:#00c850}
.dl-q-label.q4k{color:#ff9800}
.dl-q-size{font-size:10px;color:var(--muted)}
.dl-divider{height:1px;background:var(--bdr);margin:12px 0}
.dl-sources{display:flex;flex-direction:column;gap:7px}
.dl-src{
  display:flex;align-items:center;gap:12px;
  background:var(--bg4);border:1px solid var(--bdr);border-radius:10px;
  padding:11px 14px;text-decoration:none;color:var(--text);transition:all .2s;
}
.dl-src:hover{border-color:rgba(0,200,80,.35);background:rgba(0,200,80,.05)}
.dl-src-icon{font-size:18px;width:30px;text-align:center;flex-shrink:0}
.dl-src-info{flex:1}
.dl-src-name{font-size:13px;font-weight:700}
.dl-src-desc{font-size:10px;color:var(--muted)}
.dl-badge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;margin-left:5px}
.dl-badge.fast{background:rgba(0,200,80,.2);color:#00c850}
.dl-badge.hd{background:rgba(79,195,247,.2);color:#4fc3f7}
.dl-note{font-size:10px;color:rgba(255,255,255,.2);text-align:center;margin-top:12px;line-height:1.6}

/* ── SPINNER ── */
.spinwrap{display:flex;justify-content:center;padding:40px}
.spinner{
  width:36px;height:36px;border:3px solid rgba(229,9,26,.2);
  border-top-color:var(--red);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes sp{to{transform:rotate(360deg)}}
.auth-spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);
  background:rgba(20,20,35,.95);border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(20px);padding:10px 18px;border-radius:10px;
  font-size:13px;font-weight:600;z-index:99999;
  opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MISC ── */
.empty{padding:30px;text-align:center;color:var(--muted);font-size:13px}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}


/* ── DUB/SUB TOGGLE ── */
.dub-toggle{
  display:none;
  align-items:center;gap:8px;
  margin:0 16px 14px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--bdr);
  border-radius:12px;
  padding:10px 14px;
}
.dub-toggle.show{display:flex}
.dub-toggle-label{font-size:13px;font-weight:700;flex:1}
.dub-toggle-sub{font-size:11px;color:var(--muted)}
.dub-switch{
  position:relative;width:52px;height:28px;flex-shrink:0;
}
.dub-switch input{opacity:0;width:0;height:0}
.dub-slider{
  position:absolute;inset:0;background:rgba(255,255,255,.15);
  border-radius:28px;cursor:pointer;transition:.3s;border:1px solid var(--bdr);
}
.dub-slider::before{
  content:'';position:absolute;width:22px;height:22px;
  left:3px;top:2px;background:#fff;border-radius:50%;
  transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.4);
}
.dub-switch input:checked + .dub-slider{background:var(--red);border-color:var(--red)}
.dub-switch input:checked + .dub-slider::before{transform:translateX(24px)}
.dub-state{font-size:12px;font-weight:800;min-width:32px;text-align:right}
.dub-state.on{color:var(--red)}
.dub-state.off{color:var(--muted)}
</style>

var IMG = 'https://image.tmdb.org/t/p/';

function ge(id){return document.getElementById(id)}
function iurl(p,s){return p?IMG+(s||'w500')+p:''}
function xe(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

function tmdb(path,params){
  var p=Object.assign({api_key:KEY,language:'en-US'},params||{});
  var qs=Object.keys(p).map(function(k){return k+'='+encodeURIComponent(p[k]);}).join('&');
  return fetch(API+path+'?'+qs).then(function(r){return r.json();});
}

// ═══ NAVIGATION ═══
function go(page, noHistory){
  if(!noHistory && curPage!==page) prevPage=curPage;
  curPage=page;
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-link').forEach(function(l){l.classList.remove('active');});
  var pg=ge(page+'-page');
  if(pg){pg.classList.add('active');pg.classList.add('fade-in');}
  var nl=ge('nl-'+page);
  if(nl)nl.classList.add('active');
  var sb=ge('searchbar');
  // Hide search bar on detail page
  if(sb)sb.style.display=page==='detail'?'none':'block';
  window.scrollTo(0,0);
  if(page==='home')loadHome();
  else if(page==='movies')loadBrowse('movies');
  else if(page==='series')loadBrowse('series');
  else if(page==='anime')loadBrowse('anime');
  else if(page==='wl')renderWL();
  updateWLCount();
}
function goBack(){go(prevPage,true);}

// ═══ HERO ═══
function setHero(i){
  heroIdx=i;
  var d=heroItems[i];if(!d)return;
  var title=d.title||d.name||'';
  var yr=(d.release_date||d.first_air_date||'').slice(0,4);
  var img=iurl(d.backdrop_path,'w1280')||iurl(d.poster_path,'w780');
  ge('hero-img').src=img;
  ge('hero-title').textContent=title;
  ge('hero-desc').textContent=d.overview||'';
  ge('hero-badges').innerHTML=
    (yr?'<span class="hero-badge">'+yr+'</span>':'')+
    (d.vote_average?'<span class="hero-badge outline">&#9733; '+d.vote_average.toFixed(1)+'</span>':'')+
    '<span class="hero-badge outline">'+(d.media_type==='movie'?'Movie':'Series')+'</span>';
  ge('hero-dots').innerHTML=heroItems.slice(0,7).map(function(_,j){
    return '<div class="hero-dot'+(j===i?' active':'')+'" onclick="setHero('+j+')"></div>';
  }).join('');
}
function heroWatch(){if(!heroItems[heroIdx])return;var d=heroItems[heroIdx];pType=d.media_type==='movie'?'movie':'tv';pId=d.id;pTitle=d.title||d.name;pEpS=1;pEpE=1;pSrv=0;pYTKey='';openPlayer(getSrcs(pType,pId,1,1)[0],0,null);}
function heroDetail(){if(!heroItems[heroIdx])return;var d=heroItems[heroIdx];openDetail(d.id,d.media_type==='movie'?'movie':'tv');}
function startHeroTimer(){clearInterval(heroTimer);heroTimer=setInterval(function(){setHero((heroIdx+1)%Math.min(heroItems.length,7));},7000);}

// ═══ HOME ═══
function loadHome(){
  // Instant seed
  heroItems=SEED_TRENDING;
  setHero(0);startHeroTimer();
  renderHome({trending:SEED_TRENDING,popular:SEED_MOVIES,tv:SEED_TV,anime:SEED_ANIME});
  // Async upgrade
  Promise.all([
    tmdb('/trending/all/week'),
    tmdb('/movie/popular'),
    tmdb('/trending/tv/week'),

  ]).then(function(rs){

    setHero(0);startHeroTimer();
    renderHome({trending:rs[0].results||SEED_TRENDING,popular:rs[1].results||SEED_MOVIES,tv:rs[2].results||SEED_TV,anime:rs[3].results||SEED_ANIME});
  }).catch(function(){});

function renderHome(d){
  var h='';
  h+=makeSection('&#128293; Trending',d.trending||[],'movie','',false);
  h+=makeSection('&#127916; Popular Movies',d.popular||[],'movie','',false);
  h+=makeSection('&#128250; Top Series',d.tv||[],'tv','',false);
  h+=makeSection('&#127981; Anime',d.anime||[],'tv','',false);
  ge('home-sections').innerHTML=h;
}

function makeSection(title,items,type,genre,wide){
  if(!items||!items.length)return'';
  var cards=items.slice(0,12).map(function(d){return makeCard(d,type,wide);}).join('');
  return '<div class="section"><div class="sec-head"><div class="sec-title">'+title+'</div></div>'
    +'<div class="cards-row">'+cards+'</div></div>';
}

function makeCard(d,type,wide){
  var id=d.id,title=xe(d.title||d.name||''),
      poster=iurl(d.poster_path||(wide?d.backdrop_path:''),'w342'),
      yr=(d.release_date||d.first_air_date||'').slice(0,4),
      rating=d.vote_average?d.vote_average.toFixed(1):'';
  var mt=d.media_type||(type==='tv'?'tv':'movie');
  return '<div class="card'+(wide?' card-wide':'')+'" onclick="openDetail('+id+',\''+mt+'\')">'
    +'<div class="card-img-wrap">'
    +(poster?'<img class="card-img" src="'+poster+'" loading="lazy" alt="'+title+'">'
      :'<div class="card-img" style="background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);padding:8px;text-align:center">'+title+'</div>')
    +(rating?'<div class="card-rating">&#9733; '+rating+'</div>':'')
    +'<div class="card-play"><div class="card-play-icon">&#9654;</div></div>'
    +'</div>'
    +'<div class="card-title">'+title+'</div>'
    +(yr?'<div class="card-meta">'+yr+'</div>':'')
    +'</div>';
}

// ═══ BROWSE ═══
var browseState={movies:{genre:'',page:1},series:{genre:'',page:1},anime:{genre:'',page:1}};
var GENRES_MV=[{id:'',n:'All'},{id:'28',n:'Action'},{id:'35',n:'Comedy'},{id:'18',n:'Drama'},{id:'27',n:'Horror'},{id:'10749',n:'Romance'},{id:'878',n:'Sci-Fi'},{id:'53',n:'Thriller'},{id:'16',n:'Animation'}];
var GENRES_TV=[{id:'',n:'All'},{id:'10759',n:'Action'},{id:'35',n:'Comedy'},{id:'18',n:'Drama'},{id:'9648',n:'Mystery'},{id:'10765',n:'Sci-Fi'},{id:'10764',n:'Reality'},{id:'10762',n:'Kids'}];

function loadBrowse(pg){
  var isMv=pg==='movies', isAn=pg==='anime';
  var genres=isMv?GENRES_MV:GENRES_TV;
  var fid=pg==='movies'?'mv-filters':pg==='series'?'sr-filters':'an-filters';
  var gid=pg==='movies'?'mv-grid':pg==='series'?'sr-grid':'an-grid';
  var state=browseState[pg];
  ge(fid).innerHTML=genres.map(function(g){
    return '<button class="filter-btn'+(g.id===state.genre?' active':'')+
      '" onclick="setBrowseFilter(\''+pg+'\',\''+g.id+'\')">'+g.n+'</button>';
  }).join('');
  fetchBrowse(pg,state.genre);
}

function setBrowseFilter(pg,genre){
  browseState[pg].genre=genre;browseState[pg].page=1;
  loadBrowse(pg);
}

function fetchBrowse(pg,genre){
  var gid=pg==='movies'?'mv-grid':pg==='series'?'sr-grid':'an-grid';
  ge(gid).innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  var isAn=pg==='anime';
  var path=pg==='movies'?'/discover/movie':'/discover/tv';
  var params={sort_by:'popularity.desc',page:1};
  if(genre)params.with_genres=genre;
  if(isAn){params.with_genres='16';params.with_keywords='210024|287501';}
  tmdb(path,params).then(function(d){
    var items=d.results||[];
    var type=pg==='movies'?'movie':'tv';
    ge(gid).innerHTML=items.map(function(item){return makeCard(item,type,false);}).join('');
  }).catch(function(){
    ge(gid).innerHTML='<div class="empty">Failed to load. Check connection.</div>';
  });
}

// ═══ DETAIL ═══
function openDetail(id,type){
  prevPage=curPage;
  pType=type;pId=id;pEpS=1;pEpE=1;pSrv=0;
  go('detail',true);
  ge('d-backdrop').src='';
  ge('d-poster').src='';
  ge('d-title').textContent='Loading...';
  ge('d-chips').innerHTML='';
  ge('d-tagline').textContent='';
  ge('d-overview').textContent='';
  ge('d-btns').innerHTML='';
  ge('d-tabs').innerHTML='';
  ge('d-tab-content').innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  var path=type==='movie'?'/movie/'+id:'/tv/'+id;
  tmdb(path,{append_to_response:'credits,videos,similar,seasons'}).then(function(d){
    curDetail=d;curDetailType=type;
    pTitle=d.title||d.name||'';
    // Videos
    var vids=d.videos&&d.videos.results?d.videos.results:[];
    var trailer=vids.find(function(v){return v.site==='YouTube'&&v.type==='Trailer';});
    pYTKey=trailer?trailer.key:'';
    // Backdrop
    if(d.backdrop_path)ge('d-backdrop').src=iurl(d.backdrop_path,'w1280');
    // Poster
    if(d.poster_path)ge('d-poster').src=iurl(d.poster_path,'w342');
    else ge('d-poster').parentElement.style.display='none';
    // Title
    ge('d-title').textContent=pTitle;
    // Chips
    var yr=(d.release_date||d.first_air_date||'').slice(0,4);
    var runtime=d.runtime?d.runtime+'m':d.episode_run_time?d.episode_run_time[0]+'m':'';
    var chips='';
    if(d.vote_average)chips+='<span class="chip gold">&#9733; '+d.vote_average.toFixed(1)+'</span>';
    if(yr)chips+='<span class="chip">'+yr+'</span>';
    if(runtime)chips+='<span class="chip">'+runtime+'</span>';
    if(d.status)chips+='<span class="chip">'+d.status+'</span>';
    (d.genres||[]).slice(0,3).forEach(function(g){chips+='<span class="chip">'+xe(g.name)+'</span>';});
    ge('d-chips').innerHTML=chips;
    // Tagline
    if(d.tagline){ge('d-tagline').textContent='\u201c'+d.tagline+'\u201d';}
    // Overview
    ge('d-overview').textContent=d.overview||'No description available.';
    // Watchlist state
    var inWL=watchlist.some(function(w){return w.id===id;});
    // Buttons
    ge('d-btns').innerHTML=
      '<button class="btn btn-red" onclick="startPlay()">&#9654; Watch Now</button>'
      +'<button class="btn btn-ghost" id="wlbtn" onclick="toggleWL()">'+( inWL?'&#10003; Saved':'+ Watchlist')+'</button>'
      +'<button class="btn btn-green" onclick="openDL()">&#11123; Download</button>'
      +(d.homepage?'<a href="'+d.homepage+'" target="_blank" class="btn btn-ghost btn-sm" rel="noopener">Official Site</a>':'');
    // Detect anime
    var genres=d.genres||[];
    var isAnime=(d.original_language==='ja'&&type==='tv')
      ||(genres.some(function(g){return g.name==='Animation';})&&d.original_language==='ja');
    pIsAnime=isAnime;pDubMode=false;
    var dubEl=ge('dub-toggle');if(dubEl)dubEl.className='dub-toggle'+(isAnime?' show':'');
    var dubChk=ge('dub-chk');if(dubChk)dubChk.checked=false;
    var dubLbl=ge('dub-state-lbl');if(dubLbl){dubLbl.textContent='SUB';dubLbl.className='dub-state off';}
    if(isAnime){
      pAnilistId=0;
      var subTxt=ge('dub-sub-txt');
      if(subTxt)subTxt.textContent='Checking dub availability...';
      getAnilistId(id, d.name||d.title||'').then(function(aid){
        pAnilistId=aid;
        if(subTxt){
          subTxt.textContent = aid
            ? 'Dub available via VidPlus (S1/S2). Toggle ON for English.'
            : 'Try S1 VidPlus — if no dub, use S3+ for Japanese sub.';
        }
      });
    }
    // Tabs
    var tabs='<button class="tab active" onclick="switchTab(\'overview\',this)">Overview</button>';
    if(type==='tv')tabs+='<button class="tab" onclick="switchTab(\'episodes\',this)">Episodes</button>';
    if(d.credits&&d.credits.cast&&d.credits.cast.length)tabs+='<button class="tab" onclick="switchTab(\'cast\',this)">Cast</button>';
    if(d.similar&&d.similar.results&&d.similar.results.length)tabs+='<button class="tab" onclick="switchTab(\'similar\',this)">Similar</button>';
    ge('d-tabs').innerHTML=tabs;
    showDetailTab('overview',d);
  }).catch(function(e){
    ge('d-title').textContent='Failed to load';
    ge('d-tab-content').innerHTML='<div class="empty">Could not load details. Please try again.</div>';
  });
}

function switchTab(name,btn){
  document.querySelectorAll('#d-tabs .tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  showDetailTab(name,curDetail);
}

function showDetailTab(name,d){
  var h='';
  if(name==='overview'){
    var crew=d.credits&&d.credits.crew?d.credits.crew:[];
    var dir=crew.find(function(c){return c.job==='Director';});
    if(dir)h+='<p style="font-size:12px;color:var(--muted);margin-bottom:12px">Director: <b style="color:var(--text)">'+xe(dir.name)+'</b></p>';
    if(d.production_companies&&d.production_companies.length){
      h+='<p style="font-size:12px;color:var(--muted)">Studio: <b style="color:var(--text)">'+xe(d.production_companies[0].name)+'</b></p>';
    }
  } else if(name==='episodes'){
    var seas=(d.seasons||[]).filter(function(s){return s.season_number>0;});
    h='<div class="season-select" id="seas-btns">'
      +seas.map(function(s){return '<button class="seas-btn'+(s.season_number===1?' active':'')+'" onclick="loadSeasonEps('+s.season_number+',this)">Season '+s.season_number+'</button>';}).join('')
      +'</div><div id="ep-list"><div class="spinwrap"><div class="spinner"></div></div></div>';
    ge('d-tab-content').innerHTML=h;
    if(seas.length)loadSeasonEps(1,null);
    return;
  } else if(name==='cast'){
    var cast=(d.credits&&d.credits.cast?d.credits.cast:[]).slice(0,20);
    h='<div class="cast-row">'+cast.map(function(c){
      var img=c.profile_path?iurl(c.profile_path,'w185'):'';
      return '<div class="cast-card">'
        +(img?'<img class="cast-img" src="'+img+'" loading="lazy" alt="'+xe(c.name)+'">'
          :'<div class="cast-img" style="display:flex;align-items:center;justify-content:center;font-size:20px">&#128100;</div>')
        +'<div class="cast-name">'+xe(c.name)+'</div>'
        +'<div class="cast-role">'+xe(c.character||'')+'</div>'
        +'</div>';
    }).join('')+'</div>';
  } else if(name==='similar'){
    var sim=(d.similar&&d.similar.results?d.similar.results:[]).slice(0,12);
    h='<div class="sim-grid">'+sim.map(function(s){return makeCard(s,curDetailType,false);}).join('')+'</div>';
  }
  ge('d-tab-content').innerHTML=h;
}

function loadSeasonEps(season,btn){
  if(btn){
    document.querySelectorAll('.seas-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
  }
  ge('ep-list').innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  tmdb('/tv/'+pId+'/season/'+season).then(function(d){
    var eps=d.episodes||[];
    ge('ep-list').innerHTML=eps.map(function(ep){
      var thumb=ep.still_path?iurl(ep.still_path,'w300'):'';
      return '<div class="ep-item'+(season===pEpS&&ep.episode_number===pEpE?' active-ep':'')+'" onclick="playEp('+season+','+ep.episode_number+')">'
        +'<div class="ep-thumb">'
        +(thumb?'<img src="'+thumb+'" loading="lazy" alt="">':'<div style="width:100%;height:100%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:20px">&#127916;</div>')
        +'<div class="ep-thumb-play">&#9654;</div>'
        +'</div>'
        +'<div class="ep-info">'
        +'<div class="ep-num">S'+season+' E'+ep.episode_number+'</div>'
        +'<div class="ep-name">'+xe(ep.name||'Episode '+ep.episode_number)+'</div>'
        +(ep.overview?'<div class="ep-desc">'+xe(ep.overview)+'</div>':'')
        +'</div>'
        +'</div>';
    }).join('');
  }).catch(function(){
    ge('ep-list').innerHTML='<div class="empty">Failed to load episodes.</div>';
  });
}

// ═══ PLAY ═══
function startPlay(){
  pSrv=0;pEpS=1;pEpE=1;
  if(pIsAnime){
    startAnimePlay(1);
  } else {
    openPlayer(getSrcs(pType,pId,1,1)[0],0,null);
  }
}
function playEp(s,e){
  pEpS=s;pEpE=e;pSrv=0;
  pmCloseEps();
  if(pIsAnime){
    // For anime, episode number is absolute (AniList uses absolute ep numbers)
    startAnimePlay(e);
  } else {
    openPlayer(getSrcs('tv',pId,s,e)[0],0,'S'+s+' E'+e);
  }
}

function openPlayer(src,srvIdx,epInfo){
  var modal=ge('player-modal');
  // Landscape on mobile
  try{if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(function(){});}catch(e){}
  ge('pm-iframe').src=src;
  ge('pm-title').textContent=pTitle||'Now Playing';
  var epBadge=ge('pm-ep-badge');
  if(epInfo){epBadge.textContent=epInfo;epBadge.style.display='block';}
  else{epBadge.style.display='none';}
  // Server pills
  ge('pm-srv-row').innerHTML=SRVN.map(function(n,i){
    return '<button class="pm-srv'+(i===srvIdx?' active':'')+'" onclick="switchSrv('+i+')">S'+(i+1)+' '+n+'</button>';
  }).join('');
  var epBtn=ge('pm-ep-btn');if(epBtn)epBtn.style.display=pType==='tv'?'inline-flex':'none';
  var trlBtn=ge('pm-trl-btn');if(trlBtn)trlBtn.style.display=pYTKey?'inline-flex':'none';
  modal.classList.add('open');
  document.body.style.overflow='hidden';
  pmShowControls(); // always visible, no auto-hide
  // Show unmute button for servers that mute by default
  var unmuteBtn=ge('pm-unmute-btn');
  if(unmuteBtn)unmuteBtn.style.display='inline-flex';
  installAB();
}

function closePlayer(){
  ge('pm-iframe').src='';
  ge('player-modal').classList.remove('open');
  pmCloseEps();
  document.body.style.overflow='';
  try{if(screen.orientation&&screen.orientation.unlock)screen.orientation.unlock();}catch(e){}
}

function switchSrv(idx){
  pSrv=idx;
  var src=getSrcs(pType,pId,pEpS,pEpE)[idx];
  ge('pm-iframe').src=src;
  document.querySelectorAll('.pm-srv').forEach(function(b,i){b.classList.toggle('active',i===idx);});
  pmShowControls();
  toast(SRVN[idx]+' loaded');
}
// pmNextSrv defined in anime block
function pmTrailer(){if(pYTKey)openPlayer('https://www.youtube.com/embed/'+pYTKey+'?autoplay=1&rel=0',-1,'Trailer');}

function pmUnmute(){
  // Try to unmute via postMessage to iframe
  var iframe=ge('pm-iframe');
  if(iframe&&iframe.contentWindow){
    try{
      iframe.contentWindow.postMessage({action:'unmute'},'*');
      iframe.contentWindow.postMessage(JSON.stringify({type:'playerUnmute'}),'*');
    }catch(e){}
  }
  // Also reload current server — some servers unmute on reload
  var src=ge('pm-iframe').src;
  if(src){
    // Strip muted param and re-add muted=false
    src=src.replace(/[?&]muted=[^&]*/g,'');
    var sep=src.indexOf('?')>=0?'&':'?';
    src+=sep+'muted=false&autoplay=true';
    ge('pm-iframe').src='';
    setTimeout(function(){ge('pm-iframe').src=src;},100);
  }
  // Hide the unmute button after tapping
  var btn=ge('pm-unmute-btn');
  if(btn)btn.style.display='none';
  toast('Sound enabled! If still muted, try Next Server');
}

  else{
    watchlist.push({id:pId,type:pType,title:pTitle,poster:curDetail?curDetail.poster_path:''});

  ge('dl-sub').textContent=(yr||'')+(yr?' · ':'')+( type==='tv'?'TV Series':'Movie');
  // Quality buttons — all go to vidsrc direct
  var dlUrl=type==='movie'?'https://dl.vidsrc.vip/movie/'+d.id:'https://dl.vidsrc.vip/tv/'+d.id;

    return '<a href="'+dlUrl+'" target="_blank" rel="noopener" class="dl-q" onclick="window._allowNav=true;setTimeout(function(){window._allowNav=false;},2000)">'
      +'<span class="dl-q-label '+q2.cls+'">'+q2.label+'</span>'
      +'<span class="dl-q-size">'+q2.size+'</span></a>';
  }).join('');
  // Sources
  ge('dl-sources').innerHTML=[
    {icon:'&#9889;',name:'VidSrc Direct',desc:'Direct file download — recommended',url:dlUrl,badge:'FAST',bc:'fast'},
    {icon:'&#127381;',name:'Goojara',desc:'Search & download — huge library',url:'https://www.goojara.to/search?q='+qt,badge:'',bc:''},
    {icon:'&#127760;',name:'Soaper.tv',desc:'Movies & series — direct download option',url:'https://soaper.tv/search.html?keyword='+qt,badge:'',bc:''},
    {icon:'&#128190;',name:'Archive.org',desc:'Free legal downloads — classics',url:'https://archive.org/search?query='+qt+'&mediatype=movies',badge:'FREE',bc:'hd'},
  ].map(function(s){
    return '<a href="'+s.url+'" target="_blank" rel="noopener" class="dl-src" onclick="window._allowNav=true;setTimeout(function(){window._allowNav=false;},2000)">'
      +'<span class="dl-src-icon">'+s.icon+'</span>'
      +'<span class="dl-src-info"><span class="dl-src-name">'+s.name+(s.badge?'<span class="dl-badge '+s.bc+'">'+s.badge+'</span>':'')+'</span>'
      +'<br><span class="dl-src-desc">'+s.desc+'</span></span>'
      +'<span style="opacity:.3;font-size:14px">&#8594;</span>'
      +'</a>';
  }).join('');
  ge('dl-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDL(){ge('dl-modal').classList.remove('open');document.body.style.overflow='';}

// ═══ AD BLOCKER ═══
function installAB(){
  if(window._abOn)return;window._abOn=true;
  var orig=window.open;
  window.open=function(url){
    if(!url)return null;
    var safe=['youtube','youtu.be','tmdb','vidsrc','vidlink','videasy','vidfast','embed.su','multiembed','111movies','cinemaos','goojara','soaper','archive.org','dl.vidsrc'];
    if(safe.some(function(d){return url.indexOf(d)>=0;}))return orig.apply(window,arguments);
    toast('Ad blocked!');return{closed:false,close:function(){},focus:function(){}};
  };
  // beforeunload removed — was causing "Leave site?" popups
  document.addEventListener('click',function(e){
    var t=e.target;
    for(var i=0;i<8&&t&&t!==document;i++,t=t.parentElement){
      if(t.tagName==='A'&&t.target==='_blank'){
        var h=t.getAttribute('href')||'';
        var ok=['youtube','youtu.be','tmdb','vidsrc','vidlink','videasy','vidfast','embed.su','111movies','cinemaos','goojara','soaper','archive.org','dl.vidsrc','vip/movie','vip/tv'].some(function(d){return h.indexOf(d)>=0;});
        if(!ok){e.preventDefault();e.stopPropagation();toast('Ad blocked!');return;}
      }
    }
  },true);
}

// ═══ ANIME SYSTEM ════════════════════════════════════════════════════════
// VidPlus uses AniList IDs with ?dub=true for English dub
// We map TMDB ID → AniList ID via the AniList GraphQL API

var anilistCache = {};

function getAnilistId(tmdbId, titleStr) {
  var key = 'al_' + tmdbId;
  if (anilistCache[key]) return Promise.resolve(anilistCache[key]);
  // Search AniList by title
  var gql = JSON.stringify({
    query: 'query($s:String){Media(search:$s,type:ANIME){id}}',
    variables: { s: titleStr || pTitle }
  });
  return fetch('https://graphql.anilist.co', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: gql
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    var id = d && d.data && d.data.Media ? d.data.Media.id : 0;
    anilistCache[key] = id;
    console.log('AniList ID for "' + (titleStr||pTitle) + '":', id);
    return id;
  })
  .catch(function(){ return 0; });
}

// Build anime server list — VidPlus (dub/sub) + fallbacks
function getAnimeSrcs(tmdbId, season, episode, isDub, aniId) {
  var ep  = episode || 1;
  var s   = season  || 1;
  var aid = aniId   || tmdbId; // AniList ID preferred, TMDB as fallback
  var dub = isDub ? 'true' : 'false';
  return [
    // S1 VidPlus — uses AniList ID, real dub/sub toggle
    'https://player.vidplus.to/embed/anime/' + aid + '/' + ep + '?dub=' + dub + '&autoplay=true',
    // S2 VidPlus alt episode path
    'https://player.vidplus.to/embed/anime/' + aid + '?episode=' + ep + '&dub=' + dub + '&autoplay=true',
    // S3 Vidlink (language selector built in)
    'https://vidlink.pro/tv/' + tmdbId + '/' + s + '/' + ep + '?autoplay=true&muted=false',
    // S4 VidSrc.cc
    'https://vidsrc.cc/v2/embed/tv/' + tmdbId + '/' + s + '/' + ep,
    // S5 VidSrc.to
    'https://vidsrc.to/embed/tv/' + tmdbId + '/' + s + '/' + ep,
    // S6 EmbedSU
    'https://embed.su/embed/tv/' + tmdbId + '/' + s + '/' + ep,
    // S7 Videasy
    'https://player.videasy.net/tv/' + tmdbId + '/' + s + '/' + ep,
    // S8 MultiEmbed
    'https://multiembed.mov/directstream.php?video_id=' + tmdbId + '&s=' + s + '&e=' + ep,
    // S9 2Embed
    'https://www.2embed.cc/embedtvfull/' + tmdbId + '&s=' + s + '&e=' + ep,
  ];
}

var ANIME_SRVN = ['VidPlus ★','VidPlus Alt','Vidlink','VidSrc.cc','VidSrc.to','EmbedSU','Videasy','MultiEmbed','2Embed'];

// Called when dub toggle changes
function toggleDub(isDub) {
  pDubMode = isDub;
  var lbl = ge('dub-state-lbl');
  if (lbl) { lbl.textContent = isDub ? 'DUB' : 'SUB'; lbl.className = 'dub-state ' + (isDub ? 'on' : 'off'); }
  toast(isDub ? '🇺🇸 English Dub — loading...' : '🇯🇵 Japanese Sub — loading...');
  // If player already open, reload S1 with new dub setting
  var modal = ge('player-modal');
  if (modal && modal.classList.contains('open')) {
    pSrv = 0;
    var src = getAnimeSrcs(pId, pEpS, pEpE, isDub, pAnilistId)[0];
    ge('pm-iframe').src = src;
    rebuildAnimePills(0);
  }
}

function findDub() {
  // Update toggle state visually and trigger dub load
  var chk = ge('dub-chk');
  if (chk) { chk.checked = true; }
  toggleDub(true);
  // Also open player immediately
  startAnimePlay(pEpE || 1);
}

function startAnimePlay(episode) {
  pEpE = episode || 1; pEpS = 1; pSrv = 0;
  var srcs = getAnimeSrcs(pId, 1, pEpE, pDubMode, pAnilistId);
  openAnimePlayer(srcs[0], 0, pEpE > 1 ? 'Episode ' + pEpE : null);
}

function openAnimePlayer(src, srvIdx, epInfo) {
  var modal = ge('player-modal');
  try { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(function(){}); } catch(e) {}
  ge('pm-iframe').src = src;
  ge('pm-title').textContent = pTitle || 'Now Playing';
  var epBadge = ge('pm-ep-badge');
  if (epInfo) { epBadge.textContent = epInfo; epBadge.style.display = 'block'; }
  else { epBadge.style.display = 'none'; }
  rebuildAnimePills(srvIdx);
  var epBtn = ge('pm-ep-btn'); if (epBtn) epBtn.style.display = 'inline-flex';
  var trlBtn = ge('pm-trl-btn'); if (trlBtn) trlBtn.style.display = pYTKey ? 'inline-flex' : 'none';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  pmShowControls();
  var unmuteBtn = ge('pm-unmute-btn'); if (unmuteBtn) unmuteBtn.style.display = 'inline-flex';
  installAB();
}

function rebuildAnimePills(activeIdx) {
  ge('pm-srv-row').innerHTML = ANIME_SRVN.map(function(n, i) {
    var isDubSrv = i <= 1;
    var label = 'S'+(i+1)+' '+n + (isDubSrv ? ' ['+(pDubMode?'DUB':'SUB')+']' : '');
    return '<button class="pm-srv' + (i===activeIdx?' active':'') + (isDubSrv?' dub-srv':'') +
      '" onclick="switchAnimeSrv('+i+')">' + label + '</button>';
  }).join('');
}

function switchAnimeSrv(idx) {
  pSrv = idx;
  var src = getAnimeSrcs(pId, pEpS, pEpE, pDubMode, pAnilistId)[idx];
  ge('pm-iframe').src = src;
  document.querySelectorAll('.pm-srv').forEach(function(b,i){ b.classList.toggle('active', i===idx); });
  pmShowControls();
  toast(ANIME_SRVN[idx] + ' loading...');
}

function pmNextSrv() {
  if (pIsAnime) { var n=(pSrv+1)%ANIME_SRVN.length; switchAnimeSrv(n); }
  else { var n=(pSrv+1)%SRVN.length; switchSrv(n); }
}

// ═══ TOAST ═══
var toastT;
function toast(msg){var t=ge('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('on');},2500);}

// ═══ INIT ═══
updateWLCount();
loadHome();

</script>
