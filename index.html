<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Feng World</title>
<meta http-equiv="Content-Security-Policy" content="default-src * data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src vidsrc.to vidsrc.cc vidlink.pro 2embed.stream vidsrc.xyz vidsrc.me autoembed.cc multiembed.mov youtube.com www.youtube.com; navigate-to 'self';">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --red:#00a651;--red2:#00c962;
  --bg:#010f08;--bg2:#051a10;--bg3:#0a2016;--bg4:#0f2d1c;
  --text:#f0f0f8;--muted:rgba(240,240,248,.45);--bdr:rgba(255,255,255,.08);
  --card-r:14px;--nav-h:64px;
  --font:'Space Grotesk',sans-serif;--font2:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,166,81,.4);border-radius:2px}

/* ── NAV ── */
#nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:500;
  display:flex;align-items:center;padding:0 20px;gap:16px;
  background:linear-gradient(to bottom,rgba(1,15,8,.98),rgba(1,15,8,.85));
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-icon{
  width:36px;height:36px;background:var(--red);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(0,166,81,.5);
  font-size:16px;font-weight:900;color:#fff;
}
.logo-txt{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  color:var(--text);
}
.logo-txt span{color:var(--red)}
.nav-links{display:flex;gap:4px;flex:1}
.nav-link{
  padding:7px 12px;border-radius:8px;font-size:13px;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all .2s;border:none;
  background:none;font-family:var(--font);white-space:nowrap;
}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,.06)}
.nav-link.active{color:#fff;background:rgba(0,166,81,.18);border:1px solid rgba(0,166,81,.3)}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.wl-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  color:var(--text);border-radius:10px;padding:7px 12px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;white-space:nowrap;
}
.wl-btn:hover{background:rgba(255,255,255,.12)}

/* ── SEARCH BAR ── */
#searchbar{
  position:fixed;top:var(--nav-h);left:0;right:0;z-index:490;
  padding:8px 16px 10px;
  background:rgba(1,15,8,.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.search-inner{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.09);
  border-radius:12px;padding:10px 14px;
  transition:all .25s;
}
.search-inner:focus-within{
  border-color:rgba(0,166,81,.5);
  background:rgba(0,166,81,.05);
  box-shadow:0 0 0 3px rgba(0,166,81,.08);
}
.search-inner svg{flex-shrink:0;opacity:.4}
#sinput{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;font-family:var(--font);font-weight:500;
}
#sinput::placeholder{color:var(--muted)}
#sclr{
  background:rgba(255,255,255,.1);border:none;color:var(--text);
  width:20px;height:20px;border-radius:50%;font-size:13px;
  display:none;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;
}
#sclr.show{display:flex}

/* ── PAGES ── */
.page{display:none;padding-top:calc(var(--nav-h) + 56px)}
.page.active{display:block}

/* ── HERO ── */
.hero{
  position:relative;height:calc(100vw * 0.56);min-height:240px;max-height:520px;
  overflow:hidden;
}
.hero-img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:opacity .6s;
}
.hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,rgba(1,15,8,.7) 40%,rgba(1,15,8,.2) 100%),
             linear-gradient(to right,rgba(1,15,8,.8) 0%,transparent 60%);
}
.hero-content{
  position:absolute;bottom:0;left:0;right:0;padding:20px 20px 28px;
  transform:translateY(0);transition:all .4s;
}
.hero-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.hero-badge{
  background:rgba(0,166,81,.85);border-radius:5px;
  padding:3px 8px;font-size:10px;font-weight:800;letter-spacing:.5px;
}
.hero-badge.outline{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.8);
}
.hero-title{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,52px);
  letter-spacing:2px;line-height:1;margin-bottom:8px;
  text-shadow:0 2px 20px rgba(0,0,0,.8);
}
.hero-desc{
  font-size:12px;color:rgba(240,240,248,.7);line-height:1.5;
  max-width:320px;margin-bottom:14px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.hero-btns{display:flex;gap:8px;flex-wrap:wrap}
.hero-dots{
  position:absolute;bottom:8px;right:16px;display:flex;gap:5px;z-index:2;
}
.hero-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.3);cursor:pointer;transition:all .3s;
}
.hero-dot.active{background:var(--red);width:18px;border-radius:3px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  border-radius:10px;padding:10px 18px;
  font-size:13px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;border:none;
  white-space:nowrap;
}
.btn-red{
  background:var(--red);color:#fff;
  box-shadow:0 4px 16px rgba(0,166,81,.4);
}
.btn-red:hover{background:var(--red2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,166,81,.5)}
.btn-ghost{
  background:rgba(255,255,255,.1);color:var(--text);
  border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(10px);
}
.btn-ghost:hover{background:rgba(255,255,255,.18)}
.btn-green{
  background:rgba(0,200,80,.15);color:#00c850;
  border:1px solid rgba(0,200,80,.3);
}
.btn-green:hover{background:rgba(0,200,80,.25)}
.btn-sm{padding:8px 14px;font-size:12px}

/* ── SECTIONS ── */
.section{margin-bottom:32px}
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;margin-bottom:12px;
}
.sec-title{
  font-size:16px;font-weight:800;letter-spacing:.3px;
  position:relative;
}
.sec-title::before{
  content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:16px;background:var(--red);border-radius:2px;
}
.sec-more{font-size:12px;color:var(--red);cursor:pointer;font-weight:700}

/* ── CARDS ── */
.cards-row{
  display:flex;gap:10px;overflow-x:auto;padding:0 16px 8px;
  scrollbar-width:none;
}
.cards-row::-webkit-scrollbar{display:none}
.card{
  flex-shrink:0;width:120px;cursor:pointer;
  transition:transform .25s;
}
.card:hover{transform:scale(1.04)}
.card-img-wrap{
  position:relative;border-radius:var(--card-r);overflow:hidden;
  aspect-ratio:2/3;background:var(--bg3);margin-bottom:7px;
}
.card-img{width:100%;height:100%;object-fit:cover;display:block}
.card-img-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 50%);
  opacity:0;transition:opacity .2s;
}
.card:hover .card-img-wrap::after{opacity:1}
.card-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:1;opacity:0;transition:opacity .2s;
}
.card:hover .card-play{opacity:1}
.card-play-icon{
  width:40px;height:40px;background:rgba(229,9,26,.9);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;box-shadow:0 4px 16px rgba(229,9,26,.5);
}
.card-rating{
  position:absolute;top:6px;left:6px;z-index:1;
  background:rgba(0,0,0,.75);border-radius:5px;
  padding:2px 6px;font-size:10px;font-weight:700;color:#ffd700;
}
.card-new{
  position:absolute;top:6px;right:6px;z-index:1;
  background:var(--red);border-radius:5px;
  padding:2px 5px;font-size:9px;font-weight:800;letter-spacing:.3px;
}

  50%    { box-shadow:0 2px 16px rgba(255,100,0,.85); }
}
.card-title{font-size:12px;font-weight:600;line-height:1.3;color:var(--text)}
.card-meta{font-size:10px;color:var(--muted);margin-top:2px}

/* Wide cards for landscape */
.card-wide{width:170px}
.card-wide .card-img-wrap{aspect-ratio:16/9}

/* ── BROWSE PAGE ── */
.browse-filters{
  display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;
  scrollbar-width:none;
}
.browse-filters::-webkit-scrollbar{display:none}
.filter-btn{
  flex-shrink:0;padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  color:var(--muted);font-family:var(--font);transition:all .2s;
}
.filter-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  padding:0 16px 20px;
}
.grid .card{width:100%}
/* ── LOAD MORE ── */
.load-more-wrap{
  grid-column:1/-1;
  display:flex;justify-content:center;
  padding:20px 0 40px;
}
.load-more-btn{
  padding:12px 40px;border-radius:24px;
  background:rgba(229,9,26,.15);border:1.5px solid rgba(229,9,26,.4);
  color:var(--red);font-size:13px;font-weight:800;cursor:pointer;
  font-family:var(--font);transition:all .25s;letter-spacing:.5px;
}
.load-more-btn:hover{
  background:var(--red);color:#fff;
  box-shadow:0 4px 20px rgba(229,9,26,.4);transform:translateY(-1px);
}


/* ── DETAIL PAGE ── */
#detail-page{padding-top:0!important}
.detail-back{
  position:fixed;top:16px;left:16px;z-index:600;
  width:38px;height:38px;border-radius:50%;
  background:rgba(7,7,15,.8);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;backdrop-filter:blur(10px);
  transition:all .2s;
}
.detail-back:hover{background:rgba(229,9,26,.3)}
.detail-hero{
  position:relative;height:56vw;min-height:220px;max-height:400px;
  overflow:hidden;
}
.detail-hero-img{width:100%;height:100%;object-fit:cover}
.detail-hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,rgba(7,7,15,.5) 50%,transparent 100%);
}
.detail-body{padding:0 16px;margin-top:-40px;position:relative;z-index:2}
.detail-row{display:flex;gap:14px;margin-bottom:16px}
.detail-poster{
  width:90px;flex-shrink:0;border-radius:10px;overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.1);
}
.detail-poster img{width:100%;display:block}
.detail-info{flex:1;padding-top:8px;min-width:0}
.detail-title{font-size:20px;font-weight:800;line-height:1.2;margin-bottom:6px}
.detail-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.chip{
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--muted);
}
.chip.red{background:rgba(229,9,26,.15);border-color:rgba(229,9,26,.3);color:var(--red)}
.chip.gold{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.3);color:#ffd700}
.detail-overview{
  font-size:13px;color:rgba(240,240,248,.72);line-height:1.6;
  margin-bottom:16px;font-family:var(--font2);
}
.detail-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.detail-tagline{
  font-size:13px;font-style:italic;color:var(--red);
  margin-bottom:12px;font-family:var(--font2);
}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bdr);margin-bottom:20px}
.tab{
  padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;
  background:none;border-left:none;border-right:none;border-top:none;
  font-family:var(--font);
}
.tab.active{color:var(--text);border-bottom-color:var(--red)}
.tab-pane{display:none}.tab-pane.active{display:block}

/* Cast */
.cast-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.cast-row::-webkit-scrollbar{display:none}
.cast-card{flex-shrink:0;width:70px;text-align:center}
.cast-img{
  width:62px;height:62px;border-radius:50%;object-fit:cover;margin:0 auto 6px;
  border:2px solid var(--bdr);background:var(--bg3);display:block;
}
.cast-name{font-size:10px;font-weight:600;color:var(--text);line-height:1.3}
.cast-role{font-size:9px;color:var(--muted)}

/* Episodes */
.ep-item{
  display:flex;gap:12px;padding:10px;
  background:var(--bg3);border-radius:10px;margin-bottom:8px;
  cursor:pointer;transition:all .2s;border:1px solid transparent;
}
.ep-item:hover,.ep-item.active-ep{border-color:rgba(229,9,26,.4);background:rgba(229,9,26,.08)}
.ep-thumb{
  width:80px;flex-shrink:0;border-radius:7px;overflow:hidden;
  background:var(--bg4);aspect-ratio:16/9;position:relative;
}
.ep-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.ep-thumb-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(229,9,26,.7);font-size:16px;opacity:0;transition:opacity .2s;
}
.ep-item:hover .ep-thumb-play{opacity:1}
.ep-info{flex:1;min-width:0}
.ep-num{font-size:10px;color:var(--red);font-weight:800;margin-bottom:3px}
.ep-name{font-size:13px;font-weight:700;margin-bottom:3px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ep-desc{font-size:11px;color:var(--muted);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.season-select{
  display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;
}
.season-select::-webkit-scrollbar{display:none}
.seas-btn{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  color:var(--muted);font-family:var(--font);transition:all .2s;
}
.seas-btn.active{background:var(--red);border-color:var(--red);color:#fff}

/* Similar grid */
.sim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

/* ── PLAYER MODAL ── */
#player-modal{
  display:none;
  visibility:hidden;
  position:fixed;inset:0;z-index:9000;
  background:#000;
  flex-direction:column;
  overflow:hidden;
}
#player-modal.open{display:flex;visibility:visible;}

/* TOP BAR — fixed height, never hidden, always clickable */
#pm-topbar{
  flex:0 0 54px;
  width:100%;
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:rgba(1,18,10,.95);
  border-bottom:1px solid rgba(255,255,255,.08);
}

/* IFRAME fills ALL remaining space between topbar and bottombar */
#pm-iframe-wrap{
  flex:1 1 auto;
  position:relative;
  overflow:hidden;
  background:#000;
  min-height:0;
  width:100%;
}
#pm-iframe{
  position:absolute;
  top:0;left:0;
  width:100%;
  height:100%;
  border:none;
  display:block;
  background:#000;
}


/* BOTTOM BAR — fixed height, never hidden, always clickable */
#pm-bottombar{
  flex:0 0 auto;
  width:100%;
  padding:10px 14px 18px;
  background:rgba(1,18,10,.95);
  border-top:1px solid rgba(255,255,255,.08);
}
.pm-back{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .2s;font-weight:700;
}
.pm-back:active{background:rgba(229,9,26,.5);transform:scale(.92)}
.pm-title{
  flex:1;font-size:14px;font-weight:700;
  text-shadow:0 1px 6px rgba(0,0,0,.9);
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.pm-ep-badge{
  background:rgba(229,9,26,.8);border-radius:6px;
  padding:3px 8px;font-size:11px;font-weight:700;flex-shrink:0;
}
.pm-srv-row{
  display:flex;gap:6px;overflow-x:auto;
  padding-bottom:6px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.pm-srv-row::-webkit-scrollbar{display:none}
.pm-srv{
  flex-shrink:0;padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.85);font-family:var(--font);transition:all .2s;
  min-height:36px;display:flex;align-items:center;
}
.pm-srv:active{transform:scale(.95)}
.pm-srv.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 12px rgba(0,166,81,.5)}
.pm-actions{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.pm-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
  color:#fff;border-radius:10px;padding:9px 14px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;min-height:40px;
}
.pm-btn:active{transform:scale(.95)}
.pm-btn.red{background:rgba(0,166,81,.8);border-color:var(--red);box-shadow:0 2px 12px rgba(0,166,81,.4)}
.pm-shield{
  margin-left:auto;display:flex;align-items:center;gap:4px;
  background:rgba(0,200,80,.2);border:1px solid rgba(0,200,80,.4);
  color:#00c850;border-radius:20px;padding:6px 12px;
  font-size:11px;font-weight:800;flex-shrink:0;
}

/* Episode Panel in player */
#pm-ep-panel{
  display:none;position:fixed;inset:0;z-index:9010;
  background:rgba(7,7,15,.97);backdrop-filter:blur(20px);
  overflow-y:auto;padding:60px 16px 40px;
}
#pm-ep-panel.open{display:block}
.pm-ep-close{
  position:sticky;top:-60px;float:right;margin-bottom:10px;
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

/* ── WATCHLIST ── */
#wl-page .grid{padding-bottom:100px}
.wl-empty{
  text-align:center;padding:60px 20px;
  color:var(--muted);
}
.wl-empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}



/* ── SPINNER ── */
.spinwrap{display:flex;justify-content:center;padding:40px}
.spinner{
  width:36px;height:36px;border:3px solid rgba(229,9,26,.2);
  border-top-color:var(--red);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes sp{to{transform:rotate(360deg)}}
.auth-spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);
  background:rgba(5,25,14,.95);border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(20px);padding:10px 18px;border-radius:10px;
  font-size:13px;font-weight:600;z-index:99999;
  opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MISC ── */
.empty{padding:30px;text-align:center;color:var(--muted);font-size:13px}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}


/* ── DUB/SUB TOGGLE ── */
.dub-toggle{
  display:none;
  align-items:center;gap:8px;
  margin:0 16px 14px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--bdr);
  border-radius:12px;
  padding:10px 14px;
}
.dub-toggle.show{display:flex}
.dub-toggle-label{font-size:13px;font-weight:700;flex:1}
.dub-toggle-sub{font-size:11px;color:var(--muted)}
.dub-switch{
  position:relative;width:52px;height:28px;flex-shrink:0;
}
.dub-switch input{opacity:0;width:0;height:0}
.dub-slider{
  position:absolute;inset:0;background:rgba(255,255,255,.15);
  border-radius:28px;cursor:pointer;transition:.3s;border:1px solid var(--bdr);
}
.dub-slider::before{
  content:'';position:absolute;width:22px;height:22px;
  left:3px;top:2px;background:#fff;border-radius:50%;
  transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.4);
}
.dub-switch input:checked + .dub-slider{background:var(--red);border-color:var(--red)}
.dub-switch input:checked + .dub-slider::before{transform:translateX(24px)}
.dub-state{font-size:12px;font-weight:800;min-width:32px;text-align:right}
.dub-state.on{color:var(--red)}
.dub-state.off{color:var(--muted)}

/* ── LIVE TV ── */
.live-cats{
  display:flex;gap:8px;padding:0 16px 16px;
  overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;
}
.live-cats::-webkit-scrollbar{display:none}
.live-cat{
  flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  cursor:pointer;transition:.2s;white-space:nowrap;
}
.live-cat.active,.live-cat:hover{background:var(--red);border-color:var(--red);color:#fff}
/* ── ANIMATED FLAME ── */
@keyframes flicker {
  0%,100% { transform: scaleY(1) rotate(-2deg); filter: brightness(1); }
  20%      { transform: scaleY(1.06) rotate(1deg); filter: brightness(1.15); }
  40%      { transform: scaleY(0.95) rotate(-1deg); filter: brightness(0.9); }
  60%      { transform: scaleY(1.08) rotate(2deg); filter: brightness(1.2); }
  80%      { transform: scaleY(0.98) rotate(-2deg); filter: brightness(1.05); }
}
@keyframes flickerGlow {
  0%,100% { text-shadow: 0 0 8px #ff6b00, 0 0 16px #ff3300; }
  33%      { text-shadow: 0 0 14px #ff9000, 0 0 28px #ff5500, 0 0 40px #ff2200; }
  66%      { text-shadow: 0 0 6px #ff4400, 0 0 12px #ff2200; }
}
.flame-icon {
  display:inline-block;
  animation: flicker 1.4s ease-in-out infinite;
  transform-origin: bottom center;
  font-size: 18px;
}
.section-trending .sec-title {
  animation: flickerGlow 1.4s ease-in-out infinite;
  color: #fff;
  font-size: 17px;
  letter-spacing: .5px;
}
.section-trending .sec-title::before {
  background: linear-gradient(to bottom, #00c962, #007a3d);
  box-shadow: 0 0 8px rgba(0,166,81,.7);
}

/* ── POLISH: Section title bar ── */

}

/* ── POLISH: Hero badge glow ── */

function go(page, noHistory){
  if(!noHistory && curPage!==page) prevPage=curPage;
  curPage=page;
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-link').forEach(function(l){l.classList.remove('active');});
  var pg=ge(page+'-page');
  if(pg){pg.classList.add('active');pg.classList.add('fade-in');}
  var nl=ge('nl-'+page);
  if(nl)nl.classList.add('active');
  var sb=ge('searchbar');
  if(sb)sb.style.display=page==='detail'?'none':'block';
  window.scrollTo(0,0);
  if(page==='home')loadHome();
  else if(page==='movies')loadBrowse('movies');
  else if(page==='series')loadBrowse('series');
  else if(page==='anime')loadBrowse('anime');
  else if(page==='wl')renderWL();
  updateWLCount();
}
function goBack(){go(prevPage,true);}

function loadHome(){
  // Show seed data immediately
  heroItems=SEED_TRENDING;
  setHero(0);startHeroTimer();
  renderHome({trending:SEED_TRENDING,popular:SEED_MOVIES,tv:SEED_TV,anime:SEED_ANIME,newMovies:[],topRated:[],kDrama:[],action:[]});
  // Fetch live data — many sections
  Promise.all([
    tmdb('/trending/all/week'),
    tmdb('/movie/now_playing'),
    tmdb('/movie/popular'),
    tmdb('/movie/top_rated'),
    tmdb('/tv/popular'),
    tmdb('/tv/top_rated'),
    tmdb('/discover/tv',{with_genres:'16',sort_by:'popularity.desc','vote_count.gte':50}),
    tmdb('/discover/movie',{with_genres:'28',sort_by:'popularity.desc'}),
    tmdb('/discover/tv',{with_origin_country:'KR',sort_by:'popularity.desc','vote_count.gte':20}),
    tmdb('/discover/movie',{with_genres:'27',sort_by:'popularity.desc'}),
  ]).then(function(rs){
    var trending=(rs[0].results||[]).map(function(m){if(!m.media_type)m.media_type='movie';return m;});
    var nowMovies=(rs[1].results||[]).map(function(m){m.media_type='movie';return m;});
    var onAirCombined=nowMovies.concat((rs[4].results||[]).map(function(t){t.media_type='tv';return t;}))
      .sort(function(a,b){return new Date(b.release_date||b.first_air_date||0)-new Date(a.release_date||a.first_air_date||0);});
    if(trending.length){heroItems=trending.slice(0,10);setHero(0);startHeroTimer();}
    renderHome({
      trending:   trending.length?trending:SEED_TRENDING,
      popular:    rs[2].results||SEED_MOVIES,
      tv:         rs[4].results||SEED_TV,
      anime:      rs[6].results||SEED_ANIME,
      newMovies:  nowMovies.slice(0,12),
      topRated:   rs[3].results||[],
      topSeries:  rs[5].results||[],
      kDrama:     rs[8].results||[],
      action:     rs[7].results||[],
      horror:     rs[9].results||[],
    });
  }).catch(function(){});
}

function renderHome(d){
  var h='';
  h+=makeSection('TRENDING NOW',d.trending||[],'movie',true);
  h+=makeSection('POPULAR MOVIES',d.popular||[],'movie',false);
  if(d.newMovies&&d.newMovies.length)h+=makeSection('NEW IN CINEMAS',d.newMovies,'movie',false);
  if(d.topRated&&d.topRated.length)h+=makeSection('TOP RATED MOVIES',d.topRated,'movie',false);
  h+=makeSection('TOP SERIES',d.tv||[],'tv',false);
  if(d.topSeries&&d.topSeries.length)h+=makeSection('HIGHEST RATED SERIES',d.topSeries,'tv',false);
  h+=makeSection('ANIME',d.anime||[],'tv',false);
  if(d.kDrama&&d.kDrama.length)h+=makeSection('K-DRAMA',d.kDrama,'tv',false);
  if(d.action&&d.action.length)h+=makeSection('ACTION MOVIES',d.action,'movie',false);
  if(d.horror&&d.horror.length)h+=makeSection('HORROR',d.horror,'movie',false);
  ge('home-sections').innerHTML=h;
}

function makeSection(title,items,type,isTrending){
  if(!items||!items.length)return'';
  var cards=items.slice(0,12).map(function(d){return makeCard(d,type,false);}).join('');
  var icon = isTrending
    ? '<span class="flame-icon" aria-hidden="true">&#128293;</span>'
    : (title==='POPULAR MOVIES'?'&#127916; ':title==='TOP SERIES'?'&#128250; ':'&#127981; ');
  return '<div class="section'+(isTrending?' section-trending':'')+'">'+
    '<div class="sec-head">'+
      '<div class="sec-title">'+(isTrending?'<span class="flame-wrap">'+icon+'</span> ':icon)+title+'</div>'+
    '</div>'+
    '<div class="cards-row">'+cards+'</div>'+
  '</div>';
}

function makeCard(d,type,wide){
  var id=d.id,title=xe(d.title||d.name||''),
      poster=iurl(d.poster_path||(wide?d.backdrop_path:''),'w342'),
      yr=(d.release_date||d.first_air_date||'').slice(0,4),
      rating=d.vote_average?d.vote_average.toFixed(1):'';
  var mt=d.media_type||(type==='tv'?'tv':'movie');
  return '<div class="card'+(wide?' card-wide':'')+'" onclick="openDetail('+id+',\''+mt+'\')">'
    +'<div class="card-img-wrap">'
    +(poster?'<img class="card-img" src="'+poster+'" loading="lazy" alt="'+title+'">'
      :'<div class="card-img" style="background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);padding:8px;text-align:center">'+title+'</div>')
    +(rating?'<div class="card-rating">&#9733; '+rating+'</div>':'')
    +'<div class="card-play"><div class="card-play-icon">&#9654;</div></div>'
    +'</div>'
    +'<div class="card-title">'+title+'</div>'
    +(yr?'<div class="card-meta">'+yr+'</div>':'')
    +'</div>';
}

function updateFilterBtn(pg){

  // find button on current page
  var pgEl = ge(pg+'-page');
  if(pgEl){
    var btn = pgEl.querySelector('.filter-trigger-btn');
    if(btn) btn.classList.toggle('has-filter', hasFilter);
  }
}

function buildBrowseParams(pg, pageNum){
  var s = filterState[pg];
  var isAnime = pg==='anime';
  var params = {sort_by: s.sort, page: pageNum, 'vote_count.gte':3};
  if(s.genres.length > 0){
    params.with_genres = s.genres.join(',');
  } else if(isAnime && !s.country){
    params.with_genres = '16';
  }
  if(s.country) params.with_origin_country = s.country;
  if(s.year && s.year !== 'older'){
    if(pg==='movies'){
      params['primary_release_year'] = s.year;
    } else {
      params['first_air_date.gte'] = s.year+'-01-01';
      params['first_air_date.lte'] = s.year+'-12-31';
    }
  } else if(s.year === 'older'){
    if(pg==='movies') params['primary_release_date.lte'] = '2015-12-31';
    else params['first_air_date.lte'] = '2015-12-31';
  }
  return params;
}

var browsePageNum={movies:1,series:1,anime:1};
var browseLoading={movies:false,series:false,anime:false};
var browseTotal={movies:999,series:999,anime:999};

function fetchBrowse(pg){
  var gid=pg==='movies'?'mv-grid':pg==='series'?'sr-grid':'an-grid';
  var path=pg==='movies'?'/discover/movie':'/discover/tv';
  var type=pg==='movies'?'movie':'tv';
  browsePageNum[pg]=1; browseLoading[pg]=true;
  ge(gid).innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  // Remove old load-more btn if any
  var oldWrap=ge(pg+'-loadmore');
  if(oldWrap)oldWrap.remove();

  Promise.all([
    tmdb(path,buildBrowseParams(pg,1)),
    tmdb(path,buildBrowseParams(pg,2)),
    tmdb(path,buildBrowseParams(pg,3)),
  ]).then(function(rs){
    browseTotal[pg]=rs[0].total_pages||1;
    browsePageNum[pg]=3;
    browseLoading[pg]=false;
    var seen={};
    var items=[].concat(rs[0].results||[],rs[1].results||[],rs[2].results||[]).filter(function(it){
      if(seen[it.id])return false;seen[it.id]=1;return true;
    });
    if(!items.length){
      ge(gid).innerHTML='<div class="empty">No results found. Try adjusting filters.</div>';
      return;
    }
    ge(gid).innerHTML=items.map(function(it){return makeCard(it,type,false);}).join('');
    appendLoadMoreBtn(pg,gid);
  }).catch(function(){
    browseLoading[pg]=false;
    ge(gid).innerHTML='<div class="empty">Failed to load. Check connection.</div>';
  });
}

function appendLoadMoreBtn(pg,gid){
  var old=ge(pg+'-loadmore');if(old)old.remove();
  if(browsePageNum[pg]>=browseTotal[pg])return;
  var wrap=document.createElement('div');
  wrap.id=pg+'-loadmore';
  wrap.className='load-more-wrap';
  wrap.innerHTML='<button class="load-more-btn" id="lmbtn-'+pg+'">Load More</button>';
  ge(gid).after(wrap);
  ge('lmbtn-'+pg).addEventListener('click',function(){loadMoreBrowse(pg);});
}

function loadMoreBrowse(pg){
  if(browseLoading[pg])return;
  var next=browsePageNum[pg]+1;
  if(next>browseTotal[pg])return;
  browseLoading[pg]=true;
  var gid=pg==='movies'?'mv-grid':pg==='series'?'sr-grid':'an-grid';

function chip(label, selClass, action){
  return '<div class="fd-chip '+selClass+'" data-action="'+action+'">'+label+'</div>';
}

function renderFilterDrawer(pg){
  var s = filterState[pg];
  var isMovie = pg==='movies';
  var isAnime = pg==='anime';
  var genres = isMovie ? GENRES_MOVIE : (isAnime ? GENRES_ANIME : GENRES_TV_LIST);
  var years = ['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','Older'];
  var h = '';

  // Sort
  h += '<div class="fd-sec-title">Sort By</div><div class="fd-chips">';
  (isMovie ? SORT_TABS : SORT_TABS_TV).forEach(function(t){
    var sel = s.sort===t.id ? 'selected fd-chip-all' : '';
    h += chip(t.n, sel, 'sort:'+t.id);
  });
  h += '</div>';

  // Genres
  h += '<div class="fd-divider"></div><div class="fd-sec-title">Genres</div><div class="fd-chips">';
  h += chip('All Genres', s.genres.length===0?'selected fd-chip-all':'', 'genre-all:');
  genres.forEach(function(g){
    h += chip(g.n, s.genres.indexOf(g.id)>=0?'selected':'', 'genre:'+g.id);
  });
  h += '</div>';

  // Country
  h += '<div class="fd-divider"></div><div class="fd-sec-title">Country</div><div class="fd-chips">';
  h += chip('All Countries', s.country===''?'selected fd-chip-all':'', 'country:');
  COUNTRIES.forEach(function(ct){
    h += chip(ct.n, s.country===ct.c?'selected':'', 'country:'+ct.c);
  });
  h += '</div>';

  // Year
  h += '<div class="fd-divider"></div><div class="fd-sec-title">Release Year</div><div class="fd-chips">';
  h += chip('All Time', s.year===''?'selected fd-chip-all':'', 'year:');
  years.forEach(function(yr){
    var yid = yr==='Older'?'older':yr;
    h += chip(yr, s.year===yid?'selected':'', 'year:'+yid);
  });
  h += '</div>';

  ge('fd-body').innerHTML = h;

  // Attach click listeners using data-action
  ge('fd-body').querySelectorAll('.fd-chip').forEach(function(el){
    el.addEventListener('click', function(){
      var act = this.getAttribute('data-action');
      var colon = act.indexOf(':');
      var key = act.slice(0, colon);
      var val = act.slice(colon+1);
      var s2 = filterState[filterPage];
      if(key==='sort')      { s2.sort=val; }
      else if(key==='country'){ s2.country=val; }
      else if(key==='year')   { s2.year=val; }
      else if(key==='genre-all'){ s2.genres=[]; }
      else if(key==='genre'){
        var i = s2.genres.indexOf(val);
        if(i>=0) s2.genres.splice(i,1); else s2.genres.push(val);
      }
      renderFilterDrawer(filterPage);
    });
  });
}

function pmFullscreen(){
  var modal = ge('player-modal');
  var wrap = ge('pm-iframe-wrap');

  // Step 1: go fullscreen on the modal element
  var el = modal || wrap;
  var fsPromise = null;
  if(el.requestFullscreen){ fsPromise = el.requestFullscreen(); }
  else if(el.webkitRequestFullscreen){ fsPromise = el.webkitRequestFullscreen(); }
  else if(el.mozRequestFullScreen){ fsPromise = el.mozRequestFullScreen(); }

  // Step 2: after fullscreen is granted, lock to landscape
  function lockLandscape(){
    try{
      if(screen.orientation && screen.orientation.lock){
        screen.orientation.lock('landscape').catch(function(){});
      } else if(window.screen && window.screen.lockOrientation){
        window.screen.lockOrientation('landscape');
      } else if(window.screen && window.screen.mozLockOrientation){
        window.screen.mozLockOrientation('landscape');
      }
    }catch(e){}
  }

  if(fsPromise && fsPromise.then){
    fsPromise.then(lockLandscape).catch(function(){lockLandscape();});
  } else {
    setTimeout(lockLandscape, 100);
  }

  // Step 3: listen for fullscreen exit — unlock orientation
  function onFsChange(){
    var isFs = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;
    if(!isFs){
      try{
        if(screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
      }catch(e){}
      document.removeEventListener('fullscreenchange', onFsChange);
      document.removeEventListener('webkitfullscreenchange', onFsChange);
    }
  }
  document.addEventListener('fullscreenchange', onFsChange);
  document.addEventListener('webkitfullscreenchange', onFsChange);
}

// ═══ AD BLOCKER ═══
function installAB(){
  if(window._abOn)return;window._abOn=true;

  // Kill window.open completely
  window.open=function(){ toast('🛡 Ad blocked!'); return null; };

  // Kill window.alert/confirm used by some ad scripts
  window.alert=function(){};
  window.confirm=function(){return false;};
  window.prompt=function(){return null;};

  // Catch redirect the instant it happens — visibilitychange fires
  // before the browser actually loads the new page
  // history.back() in same tick cancels navigation on Android Chrome
  document.addEventListener('visibilitychange',function(){
    if(document.hidden && ge('player-modal').classList.contains('open')){
      history.back();
    }
  });

  // iOS Safari — pagehide fires before unload
  window.addEventListener('pagehide',function(){
    if(ge('player-modal').classList.contains('open')){
      history.back();
    }
  },true);

  // Catch any <a> clicks trying to navigate away
  document.addEventListener('click',function(e){
    var a=e.target.closest('a[href]');
    if(!a)return;
    var href=String(a.href||'');
    if(href.indexOf('javascript')>=0||href.indexOf('#')===0)return;
    if(href.indexOf(location.hostname)<0){
      e.preventDefault();
      e.stopImmediatePropagation();
      toast('🛡 Ad blocked!');
    }
  },true);

  // Watch for any new iframes injected by ads
  var obs=new MutationObserver(function(muts){
    muts.forEach(function(m){
      m.addedNodes.forEach(function(n){
        if(n.tagName==='IFRAME' && n.id!=='pm-iframe'){
          n.remove();
          toast('🛡 Ad blocked!');
        }
        // Also remove injected script tags from unknown domains
        if(n.tagName==='SCRIPT'){
          var src=n.src||'';
          var safe=['vidsrc','vidlink','2embed','multiembed','autoembed','youtube','tmdb','github','googleapis','gstatic'];
          if(src && !safe.some(function(d){return src.indexOf(d)>=0;})){
            n.remove();
          }
        }
      });
    });
  });
  obs.observe(document.documentElement,{childList:true,subtree:true});
}
