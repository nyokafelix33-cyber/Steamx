<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feng World - Movies & TV Shows</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #ffffff;
      color: #1f2937;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    /* Header */
    #header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 24px;
      font-weight: bold;
      text-decoration: none;
      color: white;
    }

    .logo-sub {
      font-size: 12px;
      opacity: 0.8;
    }

    .search-container {
      flex: 1;
      max-width: 400px;
      position: relative;
    }

    .search-container input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 14px;
      transition: all 0.2s;
    }

    .search-container input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .search-container input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      opacity: 0.6;
    }

    .view-controls {
      display: flex;
      gap: 8px;
    }

    .view-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .view-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .view-btn.active {
      background: rgba(255, 255, 255, 0.4);
    }

    .header-nav {
      display: flex;
      gap: 24px;
      padding: 12px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      max-width: 1400px;
      margin: 0 auto;
    }

    .nav-link {
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .nav-link:hover {
      opacity: 0.8;
    }

    /* Main Container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .filter-tabs::-webkit-scrollbar {
      height: 4px;
    }

    .filter-tab {
      padding: 10px 20px;
      border: none;
      border-radius: 24px;
      background: #e5e7eb;
      color: #374151;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .filter-tab:hover {
      background: #d1d5db;
    }

    .filter-tab.active {
      background: #22c55e;
      color: white;
    }

    /* Content Grid */
    .content-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .content-card {
      cursor: pointer;
      transition: transform 0.2s;
    }

    .content-card:hover {
      transform: scale(1.05);
    }

    .card-image {
      position: relative;
      width: 100%;
      aspect-ratio: 2/3;
      background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .card-image-placeholder {
      opacity: 0.3;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .content-card:hover .card-overlay {
      opacity: 1;
    }

    .play-icon {
      width: 50px;
      height: 50px;
      background: rgba(37, 99, 235, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
    }

    .quality-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      color: white;
      z-index: 10;
    }

    .quality-dvd {
      background: #22c55e;
    }

    .quality-hdtv {
      background: #2563eb;
    }

    .rating-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      color: #fbbf24;
      display: flex;
      align-items: center;
      gap: 2px;
      z-index: 10;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #1f2937;
      line-height: 1.3;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-meta {
      font-size: 11px;
      color: #6b7280;
    }

    /* List View */
    .content-list {
      display: none;
    }

    .content-list.active {
      display: block;
    }

    .list-header {
      display: grid;
      grid-template-columns: 40px 1fr 120px 80px 100px;
      gap: 16px;
      padding: 16px 20px;
      background: #f3f4f6;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      color: #374151;
      margin-bottom: 12px;
    }

    .list-item {
      display: grid;
      grid-template-columns: 40px 1fr 120px 80px 100px;
      gap: 16px;
      padding: 16px 20px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      align-items: center;
      margin-bottom: 8px;
      transition: all 0.2s;
    }

    .list-item:hover {
      background: #f9fafb;
      border-color: #2563eb;
    }

    .list-number {
      color: #6b7280;
      font-weight: 600;
      font-size: 13px;
    }

    .list-title {
      font-weight: 600;
      color: #1f2937;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .list-date {
      font-size: 13px;
      color: #6b7280;
    }

    .list-rating {
      font-weight: bold;
      color: #fbbf24;
      font-size: 13px;
    }

    .list-quality {
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      color: white;
      text-align: center;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state-text {
      font-size: 16px;
      font-weight: 600;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-top {
        flex-direction: column;
        gap: 12px;
      }

      .search-container {
        max-width: 100%;
      }

      .content-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 12px;
      }

      .list-header,
      .list-item {
        grid-template-columns: 30px 1fr 70px;
        gap: 12px;
      }

      .list-date,
      .list-rating {
        display: none;
      }

      .header-nav {
        gap: 16px;
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      .header-top {
        padding: 12px 16px;
      }

      .container {
        padding: 16px 12px;
      }

      .content-grid {
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
        gap: 8px;
      }

      .card-title {
        font-size: 11px;
      }

      .filter-tabs {
        gap: 8px;
      }

      .filter-tab {
        padding: 8px 16px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-top">
      <a href="#" class="logo">
        FENG WORLD<span class="logo-sub"></span>
      </a>
      <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" id="searchInput" placeholder="Search movies, shows...">
      </div>
      <div class="view-controls">
        <button class="view-btn active" id="gridViewBtn" title="Grid View">⊞</button>
        <button class="view-btn" id="listViewBtn" title="List View">≡</button>
      </div>
    </div>
    <nav class="header-nav">
      <span class="nav-link">Browse</span>
      <span class="nav-link">Movies</span>
      <span class="nav-link">Series</span>
      <span class="nav-link">Forum</span>
    </nav>
  </header>

  <!-- Main Content -->
  <div class="container">
    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="recent">Recent</button>
      <button class="filter-tab" data-filter="popular">Popular</button>
      <button class="filter-tab" data-filter="genre">Genre</button>
      <button class="filter-tab" data-filter="year">Year</button>
      <button class="filter-tab" data-filter="a-z">A-Z</button>
    </div>

    <!-- Grid View -->
    <div class="content-grid" id="contentGrid"></div>

    <!-- List View -->
    <div class="content-list" id="contentList">
      <div class="list-header">
        <div>#</div>
        <div>Title</div>
        <div>Date</div>
        <div>Rating</div>
        <div>Quality</div>
      </div>
      <div id="listItems"></div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-state-icon">📭</div>
      <div class="empty-state-text">No results found</div>
    </div>
  </div>

  <script>
    // Sample Data
    const allContent = [
      {
        id: 1,
        title: 'Avatar: Fire and Ash',
        date: '2025-01-01',
        rating: 8.2,
        type: 'movie',
        quality: 'DVD',
        emoji: '🎬'
      },
      {
        id: 2,
        title: 'Send Help',
        date: '2026-01-15',
        rating: 7.9,
        type: 'movie',
        quality: 'DVD',
        emoji: '🎭'
      },
      {
        id: 3,
        title: 'Daredevil: Born Again',
        date: '2025-03-01',
        rating: 8.5,
        type: 'tv',
        quality: 'HDTV',
        emoji: '📺'
      },
      {
        id: 4,
        title: 'High Potential',
        date: '2024-09-17',
        rating: 8.1,
        type: 'tv',
        quality: 'HDTV',
        emoji: '🎪'
      },
      {
        id: 5,
        title: 'Scream 7',
        date: '2026-02-28',
        rating: 7.6,
        type: 'movie',
        quality: 'DVD',
        emoji: '👻'
      },
      {
        id: 6,
        title: 'War Machine',
        date: '2026-03-15',
        rating: 8.3,
        type: 'movie',
        quality: 'DVD',
        emoji: '💣'
      },
      {
        id: 7,
        title: 'Good Luck, Have Fun, Don\'t Die',
        date: '2025-11-20',
        rating: 7.4,
        type: 'tv',
        quality: 'HDTV',
        emoji: '🎮'
      },
      {
        id: 8,
        title: 'Shelter',
        date: '2026-04-10',
        rating: 7.8,
        type: 'movie',
        quality: 'DVD',
        emoji: '🏠'
      },
      {
        id: 9,
        title: 'Invincible',
        date: '2024-11-03',
        rating: 8.7,
        type: 'tv',
        quality: 'HDTV',
        emoji: '⚡'
      },
      {
        id: 10,
        title: 'Marshals',
        date: '2025-01-08',
        rating: 8.0,
        type: 'tv',
        quality: 'HDTV',
        emoji: '🚔'
      },
      {
        id: 11,
        title: 'Paradise',
        date: '2024-12-28',
        rating: 7.5,
        type: 'tv',
        quality: 'HDTV',
        emoji: '🏝️'
      },
      {
        id: 12,
        title: 'Shrinking',
        date: '2024-10-15',
        rating: 8.4,
        type: 'tv',
        quality: 'HDTV',
        emoji: '🧠'
      }
    ];

    let currentView = 'grid';
    let filteredContent = [...allContent];

    // DOM Elements
    const searchInput = document.getElementById('searchInput');
    const gridViewBtn = document.getElementById('gridViewBtn');
    const listViewBtn = document.getElementById('listViewBtn');
    const contentGrid = document.getElementById('contentGrid');
    const contentList = document.getElementById('contentList');
    const listItems = document.getElementById('listItems');
    const emptyState = document.getElementById('emptyState');
    const filterTabs = document.querySelectorAll('.filter-tab');

    // Event Listeners
    searchInput.addEventListener('input', handleSearch);
    gridViewBtn.addEventListener('click', () => switchView('grid'));
    listViewBtn.addEventListener('click', () => switchView('list'));
    filterTabs.forEach(tab => {
      tab.addEventListener('click', () => handleFilter(tab));
    });

    // Functions
    function handleSearch(e) {
      const query = e.target.value.toLowerCase();
      filteredContent = allContent.filter(item =>
        item.title.toLowerCase().includes(query)
      );
      render();
    }

    function handleFilter(tab) {
      filterTabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const filter = tab.dataset.filter;
      
      filteredContent = [...allContent];
      
      if (filter === 'popular') {
        filteredContent.sort((a, b) => b.rating - a.rating);
      } else if (filter === 'a-z') {
        filteredContent.sort((a, b) => a.title.localeCompare(b.title));
      } else if (filter === 'recent') {
        filteredContent.sort((a, b) => new Date(b.date) - new Date(a.date));
      }
      
      render();
    }

    function switchView(view) {
      currentView = view;
      gridViewBtn.classList.toggle('active', view === 'grid');
      listViewBtn.classList.toggle('active', view === 'list');
      contentGrid.style.display = view === 'grid' ? 'grid' : 'none';
      contentList.classList.toggle('active', view === 'list');
      render();
    }

    function render() {
      if (filteredContent.length === 0) {
        emptyState.style.display = 'block';
        contentGrid.innerHTML = '';
        listItems.innerHTML = '';
        return;
      }

      emptyState.style.display = 'none';

      if (currentView === 'grid') {
        renderGrid();
      } else {
        renderList();
      }
    }

    function renderGrid() {
      contentGrid.innerHTML = filteredContent.map(item => `
        <div class="content-card">
          <div class="card-image">
            <span class="card-image-placeholder">${item.emoji}</span>
            <div class="card-overlay">
              <div class="play-icon">▶</div>
            </div>
            <div class="quality-badge quality-${item.quality === 'DVD' ? 'dvd' : 'hdtv'}">
              ${item.quality}
            </div>
            <div class="rating-badge">
              ⭐ ${item.rating.toFixed(1)}
            </div>
          </div>
          <div class="card-title">${item.title}</div>
          <div class="card-meta">${item.date}</div>
        </div>
      `).join('');
    }

    function renderList() {
      listItems.innerHTML = filteredContent.map((item, idx) => `
        <div class="list-item">
          <div class="list-number">${idx + 1}</div>
          <div class="list-title">${item.title}</div>
          <div class="list-date">${item.date}</div>
          <div class="list-rating">⭐ ${item.rating.toFixed(1)}</div>
          <div class="list-quality quality-${item.quality === 'DVD' ? 'dvd' : 'hdtv'}">
            ${item.quality}
          </div>
        </div>
      `).join('');
    }

    // Initial render
    render();
  </script>
</body>
</html>
