<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StreamVault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--red:#e50914;--bg:#07070f;--bg3:#13131f;--bg4:#1a1a28;--text:#f0f0f8;--muted:rgba(240,240,248,.45);--bdr:rgba(255,255,255,.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow-x:hidden}
::selection{background:rgba(229,9,20,.3)}
::-webkit-scrollbar{width:5px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
button{font-family:'Outfit',sans-serif;cursor:pointer}
img{display:block}
a{color:inherit;text-decoration:none}
.page{display:none}.page.active{display:block}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;height:62px;padding:0 24px;transition:background .4s}
#nav.bg{background:rgba(7,7,15,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr)}
.logo{display:flex;align-items:center;gap:9px;margin-right:20px;cursor:pointer;flex-shrink:0}
.logo-icon{width:30px;height:30px;background:var(--red);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:900;box-shadow:0 0 16px rgba(229,9,20,.5)}
.logo-txt{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.logo-txt b{color:var(--red)}
.ntabs{display:flex;gap:2px;flex-shrink:0}
.nt{background:none;border:none;color:rgba(240,240,248,.5);font-size:13px;font-weight:600;padding:6px 11px;border-radius:7px;transition:all .2s;white-space:nowrap}
.nt:hover,.nt.on{color:var(--text);background:rgba(255,255,255,.08)}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.sbar{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:1px solid var(--bdr);border-radius:9px;padding:6px 12px;width:180px;transition:all .3s}
.sbar:focus-within{width:240px;border-color:rgba(229,9,20,.4)}
.sbar input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:'Outfit',sans-serif;width:100%}
.sbar input::placeholder{color:var(--muted)}
.wlbtn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:1px solid var(--bdr);color:var(--text);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap}
.wlbtn:hover{background:rgba(255,255,255,.12)}
#wlc{background:var(--red);color:#fff;border-radius:9px;padding:1px 6px;font-size:10px;font-weight:800;display:none}

/* HERO */
#hero{position:relative;height:100vh;min-height:560px;background-size:cover;background-position:center 20%;overflow:hidden}
.hov{position:absolute;inset:0;background:linear-gradient(110deg,rgba(7,7,15,.98) 0%,rgba(7,7,15,.6) 45%,rgba(7,7,15,.05) 70%,transparent 85%),linear-gradient(to top,var(--bg) 0%,rgba(7,7,15,.45) 30%,transparent 55%)}
.hbody{position:absolute;bottom:90px;left:24px;max-width:90vw;animation:fu .8s cubic-bezier(.16,1,.3,1)}
@keyframes fu{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:none}}
.hbadge{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;font-size:9px;font-weight:800;letter-spacing:2px;padding:4px 12px;border-radius:30px;margin-bottom:13px;text-transform:uppercase}
.htitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,9vw,80px);line-height:.92;letter-spacing:3px;margin-bottom:12px}
.hmeta{display:flex;gap:8px;align-items:center;margin-bottom:13px;flex-wrap:wrap}
.hscore{background:var(--red);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800}
.htag{background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.15);padding:4px 12px;border-radius:20px;font-size:11px}
.hdesc{font-size:14px;line-height:1.65;color:rgba(240,240,248,.68);margin-bottom:22px;max-width:500px}
.hbtns{display:flex;gap:10px;flex-wrap:wrap}
.btn-red{display:inline-flex;align-items:center;gap:7px;background:var(--red);color:#fff;border:none;border-radius:10px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 5px 20px rgba(229,9,20,.4);transition:transform .15s}
.btn-red:hover{transform:translateY(-2px)}
.btn-ghost{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);color:var(--text);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-ghost:hover{background:rgba(255,255,255,.16)}
.btn-ghost.saved{background:rgba(229,9,20,.2);border-color:var(--red);color:var(--red)}
.hdots{position:absolute;bottom:24px;right:24px;display:flex;gap:7px;align-items:center}
.hdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.28);border:none;cursor:pointer;transition:all .22s}
.hdot.on{background:var(--red);width:20px;border-radius:4px}

/* HOME SECTIONS */
.secs{padding:0 24px 80px}
.sec{margin-bottom:4px}
.shead{padding:22px 0 11px}
.stitle{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
.sln{display:inline-block;width:3px;height:15px;background:var(--red);border-radius:2px}
.srow{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory}
.srow::-webkit-scrollbar{height:0}
.wrow{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.wrow::-webkit-scrollbar{height:0}

/* POSTER CARD */
.card{flex-shrink:0;width:140px;cursor:pointer;scroll-snap-align:start;transition:transform .2s}
.card:hover{transform:scale(1.07) translateY(-5px);z-index:5}
.cposter{position:relative;border-radius:9px;overflow:hidden;background:var(--bg4)}
.cimg{width:140px;height:210px;object-fit:cover;display:block}
.cfb{width:140px;height:210px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:rgba(255,255,255,.12);background:var(--bg4)}
.chov{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,15,.95) 0%,transparent 55%);opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:12px}
.card:hover .chov{opacity:1}
.cpbtn{width:40px;height:40px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cscore{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.8);padding:2px 7px;border-radius:5px;font-size:10px;font-weight:800;color:#ffd700}
.cwl{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(7,7,15,.75);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.cwl:hover,.cwl.on{background:var(--red);border-color:var(--red)}
.cname{font-size:11px;font-weight:600;line-height:1.3;color:rgba(240,240,248,.75);margin-top:7px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cyr{font-size:10px;color:var(--muted);margin-top:2px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.grid .card{width:100%}
.grid .cimg,.grid .cfb{width:100%}

/* WIDE CARD */
.wcard{flex-shrink:0;width:255px;height:145px;border-radius:10px;overflow:hidden;cursor:pointer;position:relative;transition:transform .2s;background:var(--bg4)}
.wcard:hover{transform:scale(1.04) translateY(-3px)}
.wcard img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.wcfade{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,15,.93) 0%,transparent 55%)}
.wcbody{position:absolute;bottom:0;left:0;right:0;padding:10px 12px}
.wctitle{font-size:13px;font-weight:800;margin-bottom:3px}
.wcmeta{font-size:10px;color:rgba(240,240,248,.5);display:flex;gap:7px}

/* BROWSE */
#browse-page{padding:80px 24px 80px;min-height:100vh}
.bhead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.btitle{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:3px;line-height:1}
.btitle span{color:var(--red)}
.fpills{display:flex;gap:7px;flex-wrap:wrap}
.fp{background:rgba(255,255,255,.06);border:1px solid var(--bdr);color:var(--muted);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;transition:all .2s}
.fp:hover{color:var(--text)}.fp.on{background:var(--red);border-color:var(--red);color:#fff}
.pagrow{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:40px}
.pbtn{background:rgba(255,255,255,.07);border:1px solid var(--bdr);color:var(--text);border-radius:9px;padding:9px 20px;font-size:13px;font-weight:700;transition:all .2s}
.pbtn:hover:not(:disabled){background:var(--red);border-color:var(--red)}
.pbtn:disabled{opacity:.3;cursor:not-allowed}

/* WL & SEARCH */
#wl-page{padding:80px 24px 80px;min-height:100vh}
#search-page{padding:80px 24px 60px;min-height:100vh}
.slbl{font-size:13px;color:var(--muted);margin-bottom:16px;font-weight:500}

/* DETAIL */
#detail-page{min-height:100vh;padding-bottom:80px}
.dbg{position:relative;height:68vh;min-height:460px;background-size:cover;background-position:center 20%}
.dbgov{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(7,7,15,.5) 45%,rgba(7,7,15,.18) 100%)}
.dcnt{padding:0 24px}
.dmain{display:flex;gap:20px;align-items:flex-end;margin-top:-190px;margin-bottom:28px;position:relative;z-index:2}
.dposter{width:130px;height:195px;border-radius:12px;object-fit:cover;flex-shrink:0;border:2px solid rgba(255,255,255,.12);box-shadow:0 16px 50px rgba(0,0,0,.7)}
.dpfb{width:130px;height:195px;border-radius:12px;flex-shrink:0;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;color:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.1)}
.dinfo{flex:1;min-width:0}
.dtitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,60px);letter-spacing:2px;line-height:.94;margin-bottom:11px}
.dmeta{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.dscore{background:var(--red);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800}
.dchip{background:rgba(255,255,255,.09);border:1px solid var(--bdr);padding:4px 11px;border-radius:20px;font-size:11px}
.dgens{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.dgpill{background:rgba(255,255,255,.06);border:1px solid var(--bdr);padding:4px 12px;border-radius:20px;font-size:11px}
.dov{font-size:13px;line-height:1.7;color:rgba(240,240,248,.7);margin-bottom:20px}
.dbtns{display:flex;gap:10px;flex-wrap:wrap}

/* PLAYER */
.pw{border-radius:12px;overflow:hidden;margin-bottom:28px;box-shadow:0 16px 50px rgba(0,0,0,.7);background:#000}
.pw iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
.pph{aspect-ratio:16/9;background:linear-gradient(135deg,var(--bg3),var(--bg4));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;position:relative;overflow:hidden}
.pph img.pthumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.35}
.pph:hover .pbig{transform:scale(1.1)}
.pbig{width:72px;height:72px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;box-shadow:0 7px 26px rgba(229,9,20,.5);transition:transform .2s;position:relative;z-index:2}
.plbl{font-size:14px;font-weight:700;position:relative;z-index:2}
.psub{font-size:12px;opacity:.45;position:relative;z-index:2}
.pbar{padding:12px 16px;background:var(--bg3);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pbar-t{font-size:13px;font-weight:700}
.pbar-i{font-size:11px;color:var(--muted)}
.adchip{background:rgba(0,200,80,.12);border:1px solid rgba(0,200,80,.28);color:#00c850;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}
.pbar-btns{margin-left:auto;display:flex;gap:6px}
.srv-btn{background:rgba(229,9,20,.15);border:1px solid rgba(229,9,20,.3);color:var(--red);border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}
.trl-btn{background:rgba(255,255,255,.08);border:1px solid var(--bdr);color:var(--text);border-radius:7px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer}

/* DETAIL TABS */
.dtabs{display:flex;gap:2px;margin-bottom:24px;border-bottom:1px solid var(--bdr)}
.dtab{background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;padding:10px 16px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.dtab:hover{color:var(--text)}.dtab.on{color:var(--text);border-bottom-color:var(--red)}

/* CAST */
.castrow{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.castrow::-webkit-scrollbar{height:0}
.cc{flex-shrink:0;width:80px;text-align:center}
.cc img,.cc .ccfb{width:68px;height:68px;border-radius:50%;object-fit:cover;margin:0 auto 7px;border:2px solid var(--bdr);display:block}
.cc .ccfb{background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:18px}
.cc-name{font-size:10px;font-weight:700;line-height:1.2}
.cc-role{font-size:9px;color:var(--muted);margin-top:2px}
.crew-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:18px}
.ci{background:var(--bg3);border-radius:8px;padding:12px;border:1px solid var(--bdr)}
.ci-name{font-size:13px;font-weight:700;margin-bottom:3px}
.ci-job{font-size:11px;color:var(--muted)}

/* EPISODES */
.srow2{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.sbtn{background:rgba(255,255,255,.06);border:1px solid var(--bdr);color:var(--muted);border-radius:8px;padding:6px 13px;font-size:12px;font-weight:600;transition:all .2s;cursor:pointer}
.sbtn:hover{color:var(--text)}.sbtn.on{background:var(--red);border-color:var(--red);color:#fff}
.eplist{display:flex;flex-direction:column;gap:8px}
.epi{display:flex;align-items:stretch;background:var(--bg3);border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid var(--bdr);transition:background .2s}
.epi:hover{background:var(--bg4);border-color:rgba(229,9,20,.3)}
.epthumb{width:130px;height:74px;flex-shrink:0;position:relative;background:var(--bg4);display:flex;align-items:center;justify-content:center;overflow:hidden}
.epthumb img{width:100%;height:100%;object-fit:cover}
.epplay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.epi:hover .epplay{opacity:1}
.eppi{width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.epinfo{flex:1;padding:10px 12px 10px 0;min-width:0}
.epn{font-size:10px;color:var(--red);font-weight:700;margin-bottom:3px}
.ept{font-size:12px;font-weight:700;margin-bottom:4px;line-height:1.3}
.epd{font-size:11px;color:var(--muted);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.eprt{font-size:10px;color:var(--muted);margin-top:3px}

/* BACK BTN */
.back-btn{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid var(--bdr);color:var(--text);border-radius:9px;padding:7px 15px;font-size:13px;font-weight:600;cursor:pointer;margin:74px 0 0 24px;transition:all .2s}
.back-btn:hover{background:rgba(255,255,255,.14)}
.sw{margin-bottom:32px}
.sw h3{font-size:15px;font-weight:800;margin-bottom:14px}
.spinwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted)}
.spinner{width:34px;height:34px;border:3px solid rgba(255,255,255,.07);border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:60px 20px;text-align:center;color:var(--muted)}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--bdr);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav id="nav">
  <div class="logo" onclick="go('home')">
    <div class="logo-icon">&#9654;</div>
    <div class="logo-txt">Stream<b>Vault</b></div>
  </div>
  <div class="ntabs">
    <button class="nt on"  id="nt-home"   onclick="go('home')">Home</button>
    <button class="nt"     id="nt-movies" onclick="go('movies')">Movies</button>
    <button class="nt"     id="nt-series" onclick="go('series')">Series</button>
    <button class="nt"     id="nt-anime"  onclick="go('anime')">Anime</button>
  </div>
  <div class="nav-r">
    <div class="sbar">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" style="opacity:.38;flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="sinput" type="text" placeholder="Search..." oninput="doSearch(this.value)">
    </div>
    <button class="wlbtn" onclick="go('wl')">&#128278; <span id="wlc">0</span></button>
  </div>
</nav>

<div id="home-page" class="page active">
  <div id="hero">
    <div class="hov"></div>
    <div class="hbody">
      <div class="hbadge">Featured</div>
      <div class="htitle" id="htitle">STREAMVAULT</div>
      <div class="hmeta" id="hmeta"></div>
      <p class="hdesc" id="hdesc">Your premium streaming destination.</p>
      <div class="hbtns">
        <button class="btn-red" id="h-watch">&#9654; Watch Now</button>
        <button class="btn-ghost" id="h-info">More Info</button>
        <button class="btn-ghost" id="h-wl">+ Watchlist</button>
      </div>
    </div>
    <div class="hdots" id="hdots"></div>
  </div>
  <div class="secs" id="hsecs">
    <div class="spinwrap"><div class="spinner"></div><div>Loading content...</div></div>
  </div>
</div>

<div id="browse-page" class="page">
  <div class="bhead">
    <div class="btitle" id="btitle">MOVIES</div>
    <div class="fpills" id="bfp"></div>
  </div>
  <div id="bgrid" class="grid"></div>
  <div class="pagrow">
    <button class="pbtn" id="pprev" onclick="bpage(-1)" disabled>Prev</button>
    <span id="pinfo" style="color:var(--muted);font-size:14px;font-weight:500">Page 1</span>
    <button class="pbtn" id="pnext" onclick="bpage(1)">Next</button>
  </div>
</div>

<div id="wl-page" class="page">
  <div style="padding-bottom:20px"><div class="btitle">MY <span style="color:var(--red)">LIST</span></div></div>
  <div id="wlgrid" class="grid"></div>
</div>

<div id="search-page" class="page">
  <div class="slbl" id="slbl">Search results</div>
  <div id="sgrid" class="grid"></div>
</div>

<div id="detail-page" class="page">
  <button class="back-btn" onclick="goBack()">Back</button>
  <div class="dbg" id="dbg"><div class="dbgov"></div></div>
  <div class="dcnt">
    <div class="dmain">
      <div id="dpw"></div>
      <div class="dinfo" id="dinfo"><div class="spinwrap"><div class="spinner"></div></div></div>
    </div>
    <div class="pw" id="pw">
      <div class="pph" onclick="startPlay()">
        <div class="pbig">&#9654;</div>
        <div class="plbl">Click to Watch</div>
        <div class="psub">Loading stream...</div>
      </div>
    </div>
    <div class="dtabs">
      <button class="dtab on" onclick="showTab('ov',this)">Overview</button>
      <button class="dtab" onclick="showTab('cast',this)">Cast &amp; Crew</button>
      <button class="dtab" id="eptab" style="display:none" onclick="showTab('ep',this)">Episodes</button>
      <button class="dtab" onclick="showTab('sim',this)">Similar</button>
    </div>
    <div id="tc" style="padding-bottom:60px"></div>
  </div>
</div>

function tmdb(path){
  var sep=path.indexOf('?')>=0?'&':'?';
  return fetch(TBASE+path+sep+'api_key='+KEY).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});

  }
  renderHome((tr&&tr.results)||SD_TREND,(pop&&pop.results)||SD_POP,(top&&top.results)||SD_TOP,(tv&&tv.results)||SD_TV,(ani&&ani.results)||SD_ANIME);
}).catch(function(){});

function setHero(i){
  heroIdx=i;
  var it=heroItems[i];if(!it)return;
  var title=it.title||it.name||'';
  var heroEl=ge('hero');
  if(it.backdrop_path)heroEl.style.backgroundImage="url('"+iurl(it.backdrop_path,'original')+"')";
  ge('htitle').textContent=title;
  var yr=(it.release_date||it.first_air_date||'').slice(0,4);
  var gens=(it.genre_ids||[]).slice(0,3).map(function(g){return GM[g];}).filter(Boolean);
  ge('hmeta').innerHTML=(it.vote_average?'<span class="hscore">'+it.vote_average.toFixed(1)+'</span>':'')+gens.map(function(g){return'<span class="htag">'+g+'</span>';}).join('')+(yr?'<span class="htag">'+yr+'</span>':'');
  ge('hdesc').textContent=(it.overview||'').slice(0,160)+((it.overview||'').length>160?'...':'');
  var type=it.media_type||(it.first_air_date?'tv':'movie');
  ge('h-watch').onclick=function(){openDetail(it.id,type,true);};
  ge('h-info').onclick=function(){openDetail(it.id,type,false);};
  refreshHWL(it);
  ge('hdots').innerHTML=heroItems.slice(0,7).map(function(_,j){return'<button class="hdot'+(j===i?' on':'')+'" onclick="setHero('+j+')"></button>';}).join('');
  clearInterval(heroTimer);
  heroTimer=setInterval(function(){setHero((heroIdx+1)%Math.min(7,heroItems.length));},7000);
}

function refreshHWL(it){
  var b=ge('h-wl');if(!b)return;
  var inWL=WL.some(function(x){return x.id===it.id;});
  b.textContent=inWL?'Saved':'+ Watchlist';
  b.className='btn-ghost'+(inWL?' saved':'');
  b.onclick=function(){toggleWL(it);refreshHWL(it);};
}

function renderHome(trend,movies,top,tv,anime){
  function sec(title,items,wide){
    var valid=(items||[]).filter(function(i){return i.poster_path;}).slice(0,20);
    if(!valid.length)return'';
    return'<div class="sec"><div class="shead"><div class="stitle"><span class="sln"></span>'+title+'</div></div>'
      +(wide?'<div class="wrow">'+valid.slice(0,10).map(wCard).join('')+'</div>':'<div class="srow">'+valid.map(pCard).join('')+'</div>')
      +'</div>';
  }
  sh('hsecs',sec('Trending Now',trend)+sec('Popular Movies',movies)+sec('Top Rated',top,true)+sec('Popular Series',tv)+sec('Anime',anime));
}

function wCard(it){
  var title=it.title||it.name||'';
  var yr=(it.release_date||it.first_air_date||'').slice(0,4);
  var type=it.media_type||(it.first_air_date?'tv':'movie');
  var bg=it.backdrop_path?iurl(it.backdrop_path,'w780'):iurl(it.poster_path,'w500');
  return'<div class="wcard" onclick="openDetail('+it.id+',\''+type+'\',false)">'+(bg?'<img src="'+bg+'" loading="lazy" onerror="this.style.display=\'none\'">':'')+'<div class="wcfade"></div><div class="wcbody"><div class="wctitle">'+xe(title)+'</div><div class="wcmeta">'+(it.vote_average?'<span>'+it.vote_average.toFixed(1)+'</span>':'')+(yr?'<span>'+yr+'</span>':'')+'</div></div></div>';
}

function pCard(it){
  var title=it.title||it.name||'';
  var yr=(it.release_date||it.first_air_date||'').slice(0,4);
  var rat=it.vote_average?it.vote_average.toFixed(1):'';
  var type=it.media_type||(it.first_air_date?'tv':'movie');
  var inWL=WL.some(function(x){return x.id===it.id;});
  var src=it.poster_path?iurl(it.poster_path,'w500'):'';
  return'<div class="card" onclick="openDetail('+it.id+',\''+type+'\',false)">'
    +'<div class="cposter">'
    +(src?'<img class="cimg" src="'+src+'" loading="lazy" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">':'')
    +'<div class="cfb" style="'+(src?'display:none':'')+'">'+xe(title).slice(0,2).toUpperCase()+'</div>'
    +(rat?'<div class="cscore">'+rat+'</div>':'')
    +'<div class="chov"><button class="cpbtn" onclick="event.stopPropagation();openDetail('+it.id+',\''+type+'\',true)">&#9654;</button></div>'
    +'<button class="cwl'+(inWL?' on':'')+'" onclick="event.stopPropagation();quickWL('+it.id+')">'+(inWL?'v':'+')+'</button>'
    +'</div>'
    +'<div class="cname">'+xe(title)+'</div>'
    +(yr?'<div class="cyr">'+yr+'</div>':'')
    +'</div>';
}

function quickWL(id){
  var all=SD_TREND.concat(SD_POP).concat(SD_TOP).concat(SD_TV).concat(SD_ANIME);

}

function openDetail(id,type,autoPlay){
  prevTab=curTab;go('detail');
  window.scrollTo({top:0,behavior:'instant'});
  curDetailId=id;curDetailType=type;curDetailData=null;curSeason=1;
  ge('dbg').style.backgroundImage='';
  sh('dpw','<div class="dpfb">...</div>');
  sh('dinfo','<div class="spinwrap"><div class="spinner"></div></div>');
  sh('pw','<div class="pph" onclick="startPlay()"><div class="pbig">&#9654;</div><div class="plbl">Loading...</div></div>');
  sh('tc','');
  ge('eptab').style.display='none';
  document.querySelectorAll('.dtab').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('.dtab')[0].classList.add('on');
  tmdb('/'+type+'/'+id+'?append_to_response=credits,similar,videos').then(function(d){
    if(!d){var all=SD_TREND.concat(SD_POP).concat(SD_TV).concat(SD_ANIME);d=all.find(function(x){return x.id===id;})||{id:id,title:'Unknown',overview:''};}
    curDetailData=d;
    buildDetail(d,type,autoPlay);
  });
}

function buildDetail(d,type,autoPlay){
  if(d.backdrop_path)ge('dbg').style.backgroundImage="url('"+iurl(d.backdrop_path,'original')+"')";
  var title=d.title||d.name||'';
  sh('dpw',d.poster_path?'<img class="dposter" src="'+iurl(d.poster_path,'w500')+'" onerror="this.outerHTML=\'<div class=dpfb>'+xe(title).slice(0,2)+'</div>\'">':'<div class="dpfb">'+xe(title).slice(0,2).toUpperCase()+'</div>');
  var rat=d.vote_average?d.vote_average.toFixed(1):'';
  var yr=(d.release_date||d.first_air_date||'').slice(0,4);
  var rt=d.runtime?d.runtime+' min':(d.episode_run_time&&d.episode_run_time[0]?d.episode_run_time[0]+' min/ep':'');
  var gens=(d.genres||[]).map(function(g){return g.name;});
  var inWL=WL.some(function(x){return x.id===d.id;});
  sh('dinfo','<h1 class="dtitle">'+xe(title)+'</h1>'
    +'<div class="dmeta">'+(rat?'<span class="dscore">'+rat+'</span>':'')+(yr?'<span class="dchip">'+yr+'</span>':'')+(rt?'<span class="dchip">'+rt+'</span>':'')+(d.status?'<span class="dchip">'+d.status+'</span>':'')+(d.number_of_seasons?'<span class="dchip">'+d.number_of_seasons+' Seasons</span>':'')+'<span class="dchip">'+(type==='tv'?'Series':'Movie')+'</span></div>'
    +(gens.length?'<div class="dgens">'+gens.slice(0,5).map(function(g){return'<span class="dgpill">'+g+'</span>';}).join('')+'</div>':'')
    +'<p class="dov">'+(d.overview||'No description.')+'</p>'
    +'<div class="dbtns"><button class="btn-red" onclick="startPlay()">&#9654; Watch Now</button>'
    +'<button class="btn-ghost'+(inWL?' saved':'')+'" id="dwlbtn" onclick="toggleDetailWL()">'+(inWL?'Saved':'+ Watchlist')+'</button>'
    +(d.homepage?'<a href="'+d.homepage+'" target="_blank" class="btn-ghost" rel="noopener">Official Site</a>':'')
    +'</div>');
  if(type==='tv'&&d.number_of_seasons)ge('eptab').style.display='inline-block';
  var vids=(d.videos&&d.videos.results)||[];
  var trl=vids.find(function(v){return v.type==='Trailer'&&v.site==='YouTube';})||vids.find(function(v){return v.site==='YouTube';});
  pYTKey=trl?trl.key:null;pTitle=title;pType=type;pId=d.id;pSrv=0;pEpS=1;pEpE=1;
  var ppH='<div class="pph" onclick="startPlay()">';
  if(pYTKey)ppH+='<img class="pthumb" src="https://img.youtube.com/vi/'+pYTKey+'/maxresdefault.jpg" onerror="this.style.display=\'none\'">';
  ppH+='<div class="pbig" style="position:relative;z-index:2">&#9654;</div><div class="plbl" style="position:relative;z-index:2">Watch '+xe(title)+'</div><div class="psub" style="position:relative;z-index:2">'+(pYTKey?'Trailer available - click to stream':'Click to stream')+'</div></div>';
  sh('pw',ppH);
  showTabContent('ov');
  if(autoPlay)startPlay();
}

}

  sh('pw','<iframe src="'+src+'" allowfullscreen allow="autoplay;encrypted-media;picture-in-picture" style="width:100%;aspect-ratio:16/9;border:none;display:block"></iframe>'
    +'<div class="pbar"><span class="pbar-t">'+xe(pTitle)+'</span><span class="adchip">Shield AdBlock ON</span><span class="pbar-i">'+(info||sn)+'</span>'
    +'<div class="pbar-btns">'+(pYTKey?'<button class="trl-btn" onclick="playTrailer()">Trailer</button>':'')+'<button class="srv-btn" onclick="nextSrv()">Next Server</button></div>'
    +(pType==='tv'?'<div style="width:100%;font-size:11px;color:var(--red);font-weight:600;margin-top:4px">Pick episodes below</div>':'')
    +'</div>');
  installAB();
}

function installAB(){
  if(window._abOn)return;window._abOn=true;
  var orig=window.open;
  window.open=function(url){
    if(!url)return null;
    var safe=['youtube.com','youtu.be','themoviedb','tmdb.org'];
    if(safe.some(function(d){return url.indexOf(d)>=0;}))return orig.apply(window,arguments);
    toast('Ad blocked!');return{closed:false,close:function(){},focus:function(){}};
  };
  document.addEventListener('click',function(e){
    var t=e.target;
    for(var i=0;i<8&&t&&t!==document;i++,t=t.parentElement){
      if(t.tagName==='A'&&t.target==='_blank'){
        var h=t.getAttribute('href')||'';
        var ok=['youtube','youtu.be','themoviedb','tmdb','vidsrc','embed.su','multiembed'].some(function(d){return h.indexOf(d)>=0;});
        if(!ok){e.preventDefault();e.stopPropagation();toast('Ad blocked!');return;}
      }
    }
  },true);
}

function startPlay(){pSrv=0;pEpS=1;pEpE=1;buildPW(getSrcs(pType,pId,1,1)[0],0);}
function nextSrv(){var s=getSrcs(pType,pId,pEpS,pEpE);pSrv=(pSrv+1)%s.length;buildPW(s[pSrv],pSrv);toast('Switched to '+(SRVN[pSrv]||'Server '+(pSrv+1)));}
function playTrailer(){if(!pYTKey)return;sh('pw','<iframe src="https://www.youtube.com/embed/'+pYTKey+'?autoplay=1&rel=0" allowfullscreen allow="autoplay;encrypted-media" style="width:100%;aspect-ratio:16/9;border:none;display:block"></iframe><div class="pbar"><span class="pbar-t">'+xe(pTitle)+'</span><span class="pbar-i">Official Trailer</span><div class="pbar-btns"><button class="srv-btn" onclick="startPlay()">Full Stream</button></div></div>');}
function playEp(s,e){pEpS=s;pEpE=e;pSrv=0;buildPW(getSrcs('tv',pId,s,e)[0],0,'S'+s+' E'+e);ge('pw').scrollIntoView({behavior:'smooth',block:'start'});}

function showTab(tab,btn){
  document.querySelectorAll('.dtab').forEach(function(b){b.classList.remove('on');});
  if(btn)btn.classList.add('on');
  showTabContent(tab);
}

function showTabContent(tab){
  var d=curDetailData||{};var tc=ge('tc');if(!tc)return;
  if(tab==='ov'){
    var trl=(d.videos&&d.videos.results)?d.videos.results.find(function(v){return v.type==='Trailer'&&v.site==='YouTube';}):null;
    tc.innerHTML=(d.tagline?'<p style="font-size:14px;font-style:italic;color:var(--muted);margin-bottom:12px">'+xe(d.tagline)+'</p>':'')
      +'<p style="font-size:13px;line-height:1.75;color:rgba(240,240,248,.72);margin-bottom:20px">'+xe(d.overview||'')+'</p>'
      +(d.budget?'<p style="font-size:12px;margin-bottom:6px"><span style="color:var(--muted)">Budget: </span>$'+parseFloat((d.budget/1e6).toFixed(1))+'M</p>':'')
      +(d.revenue?'<p style="font-size:12px;margin-bottom:16px"><span style="color:var(--muted)">Revenue: </span>$'+parseFloat((d.revenue/1e6).toFixed(1))+'M</p>':'')
      +(trl?'<button class="btn-red" onclick="playTrailer()">Watch Trailer</button>':'');
  } else if(tab==='cast'){
    var cast=(d.credits&&d.credits.cast)?d.credits.cast.slice(0,20):[];
    var wj=['Director','Producer','Screenplay','Writer','Executive Producer','Creator'];
    var seen={};
    var crew=((d.credits&&d.credits.crew)||[]).filter(function(c){if(seen[c.id]||wj.indexOf(c.job)<0)return false;seen[c.id]=true;return true;}).slice(0,16);
    tc.innerHTML='<div class="sw"><h3>Cast</h3><div class="castrow">'+cast.map(function(c){return'<div class="cc">'+(c.profile_path?'<img src="'+iurl(c.profile_path,'w185')+'" loading="lazy" onerror="this.outerHTML=\'<div class=ccfb>'+c.name[0]+'</div>\'">':'<div class="ccfb">'+c.name[0]+'</div>')+'<div class="cc-name">'+xe(c.name)+'</div><div class="cc-role">'+xe((c.character||'').slice(0,20))+'</div></div>';}).join('')+'</div></div>'
      +(crew.length?'<div class="sw"><h3>Crew</h3><div class="crew-grid">'+crew.map(function(c){return'<div class="ci"><div class="ci-name">'+xe(c.name)+'</div><div class="ci-job">'+xe(c.job)+'</div></div>';}).join('')+'</div></div>':'');
  } else if(tab==='ep'){
    var seasons=(d.seasons||[]).filter(function(s){return s.season_number>0;});
    if(!seasons.length){tc.innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';loadEps(curDetailId,1);return;}
    tc.innerHTML='<div class="srow2">'+seasons.map(function(s){return'<button class="sbtn'+(s.season_number===curSeason?' on':'')+'" onclick="loadEps('+curDetailId+','+s.season_number+',this)">Season '+s.season_number+'</button>';}).join('')+'</div><div id="eplist"><div class="spinwrap"><div class="spinner"></div></div></div>';
    loadEps(curDetailId,curSeason);
  } else if(tab==='sim'){
    var sim=(d.similar&&d.similar.results)?d.similar.results.filter(function(i){return i.poster_path;}).slice(0,16):[];
    tc.innerHTML=sim.length?'<div class="srow">'+sim.map(pCard).join('')+'</div>':'<div class="empty"><div>No similar titles</div></div>';
  }
}

function loadEps(showId,season,btn){
  curSeason=season;
  if(btn){document.querySelectorAll('.sbtn').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');}
  var el=ge('eplist');if(el)el.innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  tmdb('/tv/'+showId+'/season/'+season).then(function(d){
    var eps=(d&&d.episodes)||[];
    if(!el)return;
    if(!eps.length){el.innerHTML='<div class="empty">No episodes found</div>';return;}
    el.innerHTML='<div class="eplist">'+eps.map(function(ep){
      var th=ep.still_path?iurl(ep.still_path,'w300'):'';
      return'<div class="epi" onclick="playEp('+season+','+ep.episode_number+')">'
        +'<div class="epthumb">'+(th?'<img src="'+th+'" loading="lazy" onerror="this.outerHTML=\'<div style=font-size:18px;color:var(--muted)>play</div>\'">':'<div style="font-size:18px;color:var(--muted)">play</div>')+'<div class="epplay"><div class="eppi">&#9654;</div></div></div>'
        +'<div class="epinfo"><div class="epn">S'+season+' E'+ep.episode_number+'</div><div class="ept">'+xe(ep.name||'Episode '+ep.episode_number)+'</div><div class="epd">'+xe((ep.overview||'').slice(0,110))+'</div>'+(ep.runtime?'<div class="eprt">'+ep.runtime+' min</div>':'')+'</div></div>';
    }).join('')+'</div>';
  });
}

function toggleWL(it){
  var idx=WL.findIndex(function(x){return x.id===it.id;});
  if(idx>-1){WL.splice(idx,1);toast('Removed from Watchlist');}
  else{WL.push(it);toast('Added to Watchlist');}
  var c=ge('wlc');c.textContent=WL.length;c.style.display=WL.length?'inline':'none';
  if(curTab==='wl')renderWL();
}

function toggleDetailWL(){
  var d=curDetailData;if(!d||!d.id)return;
  toggleWL(d);
  var b=ge('dwlbtn');if(!b)return;
  var inWL=WL.some(function(x){return x.id===d.id;});
  b.className='btn-ghost'+(inWL?' saved':'');
  b.textContent=inWL?'Saved':'+ Watchlist';
}

function renderWL(){
  sh('wlgrid',WL.length?WL.map(pCard).join(''):'<div class="empty" style="grid-column:1/-1"><div style="font-size:50px;opacity:.3">&#128278;</div><div style="font-size:16px;font-weight:700;opacity:.5">Nothing saved yet</div></div>');
}

var BCFG={
  movies:{title:'MOVIES',filters:[{v:'popular',l:'Popular'},{v:'top_rated',l:'Top Rated'},{v:'upcoming',l:'Upcoming'},{v:'now_playing',l:'Now Playing'}],path:function(f,p){return'/movie/'+f+'?page='+p;}},
  series:{title:'TV <span style="color:var(--red)">SERIES</span>',filters:[{v:'popular',l:'Popular'},{v:'top_rated',l:'Top Rated'},{v:'on_the_air',l:'On Air'}],path:function(f,p){return'/tv/'+f+'?page='+p;}},
  anime:{title:'ANIME',filters:[{v:'pop',l:'Popular'},{v:'top',l:'Top Rated'},{v:'air',l:'Airing'}],path:function(f,p){var q=f==='top'?'sort_by=vote_average.desc&vote_count.gte=200':f==='air'?'sort_by=first_air_date.desc':'sort_by=popularity.desc';return'/discover/tv?with_genres=16&'+q+'&page='+p;}}
};

function setupBrowse(type){
  curBrowse=type;curPage=1;
  var cfg=BCFG[type];
  curFilter=cfg.filters.length?cfg.filters[0].v:'';
  ge('btitle').innerHTML=cfg.title;
  ge('bfp').innerHTML=cfg.filters.map(function(f){return'<button class="fp'+(f.v===curFilter?' on':'')+'" onclick="setFilter(\''+f.v+'\',this)">'+f.l+'</button>';}).join('');
  loadBrowse();
}

function setFilter(v,btn){
  curFilter=v;curPage=1;
  document.querySelectorAll('.fp').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');loadBrowse();
}

function loadBrowse(){
  sh('bgrid','<div class="spinwrap" style="grid-column:1/-1"><div class="spinner"></div><div>Loading...</div></div>');
  ge('pinfo').textContent='Page '+curPage;
  ge('pprev').disabled=curPage===1;
  var cfg=BCFG[curBrowse];
  var fb={popular:SD_POP,top_rated:SD_TOP,upcoming:SD_POP,now_playing:SD_POP,pop:SD_ANIME,top:SD_ANIME,air:SD_ANIME};
  tmdb(cfg.path(curFilter,curPage)).then(function(d){
    var items=(d&&d.results)?d.results.filter(function(i){return i.poster_path;}):(fb[curFilter]||SD_POP);
    sh('bgrid',items.map(pCard).join('')||'<div style="grid-column:1/-1;text-align:center;padding:50px;color:var(--muted)">No results</div>');
  });
}

function bpage(d){curPage=Math.max(1,curPage+d);loadBrowse();window.scrollTo({top:0,behavior:'smooth'});}

var searchT;
function doSearch(q){
  var sp=ge('search-page');
  if(!q||!q.trim()){sp.classList.remove('active');showPageEl(curTab);return;}
  ['home-page','browse-page','wl-page','detail-page'].forEach(function(id){var e=ge(id);if(e)e.classList.remove('active');});
  sp.classList.add('active');
  ge('slbl').textContent='Searching "'+q+'"...';
  sh('sgrid','<div class="spinwrap" style="grid-column:1/-1"><div class="spinner"></div></div>');
  clearTimeout(searchT);
  searchT=setTimeout(function(){
    tmdb('/search/multi?query='+encodeURIComponent(q)).then(function(d){
      var live=(d&&d.results)?d.results.filter(function(i){return i.poster_path;}):[]; 
      var sq=q.toLowerCase();
      var all=SD_TREND.concat(SD_POP).concat(SD_TOP).concat(SD_TV).concat(SD_ANIME);
      var seed=all.filter(function(i){return!live.find(function(r){return r.id===i.id;})&&(i.title||i.name||'').toLowerCase().indexOf(sq)>=0;});
      var res=live.concat(seed);
      ge('slbl').textContent=res.length+' result'+(res.length!==1?'s':'')+' for "'+q+'"';
      sh('sgrid',res.map(pCard).join('')||'<div class="empty" style="grid-column:1/-1"><div>No results</div></div>');
    });
  },500);
}

function go(tab){
  ge('sinput').value='';
  ['home-page','browse-page','wl-page','search-page','detail-page'].forEach(function(id){var e=ge(id);if(e)e.classList.remove('active');});
  ['nt-home','nt-movies','nt-series','nt-anime'].forEach(function(id){var e=ge(id);if(e)e.classList.remove('on');});
  prevTab=curTab;curTab=tab;
  if(tab==='home'){ge('home-page').classList.add('active');ge('nt-home').classList.add('on');}
  else if(tab==='movies'){ge('browse-page').classList.add('active');ge('nt-movies').classList.add('on');setupBrowse('movies');}
  else if(tab==='series'){ge('browse-page').classList.add('active');ge('nt-series').classList.add('on');setupBrowse('series');}
  else if(tab==='anime'){ge('browse-page').classList.add('active');ge('nt-anime').classList.add('on');setupBrowse('anime');}
  else if(tab==='wl'){ge('wl-page').classList.add('active');renderWL();}
  else if(tab==='detail'){ge('detail-page').classList.add('active');}
  if(tab!=='detail')window.scrollTo({top:0,behavior:'smooth'});
}

function showPageEl(tab){var map={home:'home-page',movies:'browse-page',series:'browse-page',anime:'browse-page',wl:'wl-page',detail:'detail-page'};var e=ge(map[tab]||'home-page');if(e)e.classList.add('active');}
function goBack(){go(prevTab==='detail'?'home':(prevTab||'home'));}

var toastT;
function toast(msg){var t=ge('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('on');},2400);}
</script>
</body>
</html>
