<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#2563eb"/>
<title>Feng World</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --blue:#2563eb;--blue2:#1d4ed8;
  --bg:#ffffff;--bg2:#f9fafb;--bg3:#f3f4f6;--bg4:#e5e7eb;
  --text:#1f2937;--muted:#6b7280;--bdr:#e5e7eb;
  --card-r:14px;--nav-h:64px;
  --font:'Space Grotesk',sans-serif;--font2:'DM Sans',sans-serif;
}
[data-theme="dark"]{
  --bg:#0a0a14;--bg2:#12121f;--bg3:#1a1a2a;--bg4:#25253a;
  --text:#f8f9fa;--muted:#a1a1aa;--bdr:#2a2a3a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(37,99,235,.4);border-radius:2px}

/* ── NAV ── */
#nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:500;
  display:flex;align-items:center;padding:0 20px;gap:16px;
  background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(37,99,235,.2);
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-icon{
  width:36px;height:36px;background:#ffffff;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(37,99,235,.3);
  font-size:16px;font-weight:900;color:#2563eb;
}
.logo-txt{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  color:#ffffff;
}
.logo-txt span{color:#ffffff}
.nav-links{display:flex;gap:4px;flex:1}
.nav-link{
  padding:7px 12px;border-radius:8px;font-size:13px;font-weight:600;
  color:rgba(255,255,255,.65);cursor:pointer;transition:all .2s;border:none;
  background:none;font-family:var(--font);white-space:nowrap;
}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.12)}
.nav-link.active{color:#fff;background:rgba(229,9,26,.18);border:1px solid rgba(229,9,26,.3)}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.wl-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;border-radius:10px;padding:7px 12px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;white-space:nowrap;
}
.wl-btn:hover{background:rgba(255,255,255,.25)}

/* ── SEARCH BAR ── */
#searchbar{
  position:fixed;top:var(--nav-h);left:0;right:0;z-index:490;
  padding:8px 16px 10px;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.search-inner{
  display:flex;align-items:center;gap:10px;
  background:#f3f4f6;
  border:1.5px solid #d1d5db;
  border-radius:12px;padding:10px 14px;
  transition:all .25s;
}
.search-inner:focus-within{
  border-color:rgba(229,9,26,.5);
  background:rgba(229,9,26,.05);
  box-shadow:0 0 0 3px rgba(229,9,26,.08);
}
.search-inner svg{flex-shrink:0;opacity:.4}
#sinput{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;font-family:var(--font);font-weight:500;
}
#sinput::placeholder{color:var(--muted)}
#sclr{
  background:rgba(255,255,255,.1);border:none;color:var(--text);
  width:20px;height:20px;border-radius:50%;font-size:13px;
  display:none;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;
}
#sclr.show{display:flex}

/* ── PAGES ── */
.page{display:none;padding-top:calc(var(--nav-h) + 56px)}
.page.active{display:block}

/* ── HERO ── */
.hero{
  position:relative;height:calc(100vw * 0.56);min-height:240px;max-height:520px;
  overflow:hidden;
}
.hero-img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:opacity .6s;
}
.hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,rgba(255,255,255,.7) 40%,rgba(255,255,255,.2) 100%),
             linear-gradient(to right,rgba(255,255,255,.8) 0%,transparent 60%);
}
.hero-content{
  position:absolute;bottom:0;left:0;right:0;padding:20px 20px 28px;
  transform:translateY(0);transition:all .4s;
}
.hero-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.hero-badge{
  background:rgba(229,9,26,.85);border-radius:5px;
  padding:3px 8px;font-size:10px;font-weight:800;letter-spacing:.5px;
}
.hero-badge.outline{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.8);
}
.hero-title{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,52px);
  letter-spacing:2px;line-height:1;margin-bottom:8px;
  text-shadow:0 2px 20px rgba(31,41,55,.8);
}
.hero-desc{
  font-size:12px;color:rgba(240,240,248,.7);line-height:1.5;
  max-width:320px;margin-bottom:14px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.hero-btns{display:flex;gap:8px;flex-wrap:wrap}
.hero-dots{
  position:absolute;bottom:8px;right:16px;display:flex;gap:5px;z-index:2;
}
.hero-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.3);cursor:pointer;transition:all .3s;
}
.hero-dot.active{background:#2563eb;width:18px;border-radius:3px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  border-radius:10px;padding:10px 18px;
  font-size:13px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;border:none;
  white-space:nowrap;
}
.btn-red{
  background:#2563eb;color:#fff;
  box-shadow:0 4px 16px rgba(229,9,26,.4);
}
.btn-red:hover{background:#1d4ed8;transform:translateY(-1px);box-shadow:0 6px 20px rgba(229,9,26,.5)}
.btn-ghost{
  background:rgba(255,255,255,.1);color:var(--text);
  border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(10px);
}
.btn-ghost:hover{background:rgba(255,255,255,.18)}
.btn-green{
  background:rgba(0,200,80,.15);color:#00c850;
  border:1px solid rgba(0,200,80,.3);
}
.btn-green:hover{background:rgba(0,200,80,.25)}
.btn-sm{padding:8px 14px;font-size:12px}

/* ── SECTIONS ── */
.section{margin-bottom:32px}
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;margin-bottom:12px;
}
.sec-title{
  font-size:16px;font-weight:800;letter-spacing:.3px;
  position:relative;
}
.sec-title::before{
  content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:16px;background:#2563eb;border-radius:2px;
}
.sec-more{font-size:12px;color:#2563eb;cursor:pointer;font-weight:700}

/* ── CARDS ── */
.cards-row{
  display:flex;gap:10px;overflow-x:auto;padding:0 16px 8px;
  scrollbar-width:none;
}
.cards-row::-webkit-scrollbar{display:none}
.card{
  flex-shrink:0;width:120px;cursor:pointer;
  transition:transform .25s;
}
.card:hover{transform:scale(1.04)}
.card-img-wrap{
  position:relative;border-radius:var(--card-r);overflow:hidden;
  aspect-ratio:2/3;background:var(--bg3);margin-bottom:7px;
}
.card-img{width:100%;height:100%;object-fit:cover;display:block}
.card-img-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(31,41,55,.7) 0%,transparent 50%);
  opacity:0;transition:opacity .2s;
}
.card:hover .card-img-wrap::after{opacity:1}
.card-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:1;opacity:0;transition:opacity .2s;
}
.card:hover .card-play{opacity:1}
.card-play-icon{
  width:40px;height:40px;background:rgba(229,9,26,.9);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;box-shadow:0 4px 16px rgba(229,9,26,.5);
}
.card-rating{
  position:absolute;top:6px;left:6px;z-index:1;
  background:rgba(31,41,55,.75);border-radius:5px;
  padding:2px 6px;font-size:10px;font-weight:700;color:#ffd700;
}
.card-new{
  position:absolute;top:6px;right:6px;z-index:1;
  background:#2563eb;border-radius:5px;
  padding:2px 5px;font-size:9px;font-weight:800;letter-spacing:.3px;
}

  50%    { box-shadow:0 2px 16px rgba(255,100,0,.85); }
}
.card-title{font-size:12px;font-weight:600;line-height:1.3;color:var(--text)}
.card-meta{font-size:10px;color:var(--muted);margin-top:2px}

/* Wide cards for landscape */
.card-wide{width:170px}
.card-wide .card-img-wrap{aspect-ratio:16/9}

/* ── BROWSE PAGE ── */
.browse-filters{
  display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;
  scrollbar-width:none;
}
.browse-filters::-webkit-scrollbar{display:none}
.filter-btn{
  flex-shrink:0;padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  color:var(--muted);font-family:var(--font);transition:all .2s;
}
.filter-btn.active{background:#2563eb;border-color:#2563eb;color:#fff}
.grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  padding:0 16px 20px;
}
.grid .card{width:100%}
/* ── LOAD MORE ── */
.load-more-wrap{
  grid-column:1/-1;
  display:flex;justify-content:center;
  padding:20px 0 40px;
}
.load-more-btn{
  padding:12px 40px;border-radius:24px;
  background:rgba(229,9,26,.15);border:1.5px solid rgba(229,9,26,.4);
  color:#2563eb;font-size:13px;font-weight:800;cursor:pointer;
  font-family:var(--font);transition:all .25s;letter-spacing:.5px;
}
.load-more-btn:hover{
  background:#2563eb;color:#fff;
  box-shadow:0 4px 20px rgba(229,9,26,.4);transform:translateY(-1px);
}


/* ── DETAIL PAGE ── */
#detail-page{padding-top:0!important}
.detail-back{
  position:fixed;top:16px;left:16px;z-index:600;
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;backdrop-filter:blur(10px);
  transition:all .2s;
}
.detail-back:hover{background:rgba(229,9,26,.3)}
.detail-hero{
  position:relative;height:56vw;min-height:220px;max-height:400px;
  overflow:hidden;
}
.detail-hero-img{width:100%;height:100%;object-fit:cover}
.detail-hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,rgba(255,255,255,.5) 50%,transparent 100%);
}
.detail-body{padding:0 16px;margin-top:-40px;position:relative;z-index:2}
.detail-row{display:flex;gap:14px;margin-bottom:16px}
.detail-poster{
  width:90px;flex-shrink:0;border-radius:10px;overflow:hidden;
  box-shadow:0 8px 30px rgba(31,41,55,.6);border:2px solid rgba(255,255,255,.1);
}
.detail-poster img{width:100%;display:block}
.detail-info{flex:1;padding-top:8px;min-width:0}
.detail-title{font-size:20px;font-weight:800;line-height:1.2;margin-bottom:6px}
.detail-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.chip{
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--muted);
}
.chip.red{background:rgba(229,9,26,.15);border-color:rgba(229,9,26,.3);color:#2563eb}
.chip.gold{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.3);color:#ffd700}
.detail-overview{
  font-size:13px;color:rgba(240,240,248,.72);line-height:1.6;
  margin-bottom:16px;font-family:var(--font2);
}
.detail-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.detail-tagline{
  font-size:13px;font-style:italic;color:#2563eb;
  margin-bottom:12px;font-family:var(--font2);
}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bdr);margin-bottom:20px}
.tab{
  padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;
  background:none;border-left:none;border-right:none;border-top:none;
  font-family:var(--font);
}
.tab.active{color:var(--text);border-bottom-color:#2563eb}
.tab-pane{display:none}.tab-pane.active{display:block}

/* Cast */
.cast-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.cast-row::-webkit-scrollbar{display:none}
.cast-card{flex-shrink:0;width:70px;text-align:center}
.cast-img{
  width:62px;height:62px;border-radius:50%;object-fit:cover;margin:0 auto 6px;
  border:2px solid var(--bdr);background:var(--bg3);display:block;
}
.cast-name{font-size:10px;font-weight:600;color:var(--text);line-height:1.3}
.cast-role{font-size:9px;color:var(--muted)}

/* Episodes */
.ep-item{
  display:flex;gap:12px;padding:10px;
  background:var(--bg3);border-radius:10px;margin-bottom:8px;
  cursor:pointer;transition:all .2s;border:1px solid transparent;
}
.ep-item:hover,.ep-item.active-ep{border-color:rgba(229,9,26,.4);background:rgba(229,9,26,.08)}
.ep-thumb{
  width:80px;flex-shrink:0;border-radius:7px;overflow:hidden;
  background:var(--bg4);aspect-ratio:16/9;position:relative;
}
.ep-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.ep-thumb-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(229,9,26,.7);font-size:16px;opacity:0;transition:opacity .2s;
}
.ep-item:hover .ep-thumb-play{opacity:1}
.ep-info{flex:1;min-width:0}
.ep-num{font-size:10px;color:#2563eb;font-weight:800;margin-bottom:3px}
.ep-name{font-size:13px;font-weight:700;margin-bottom:3px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ep-desc{font-size:11px;color:var(--muted);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.season-select{
  display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;
}
.season-select::-webkit-scrollbar{display:none}
.seas-btn{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  color:var(--muted);font-family:var(--font);transition:all .2s;
}
.seas-btn.active{background:#2563eb;border-color:#2563eb;color:#fff}

/* Similar grid */
.sim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

/* ── PLAYER MODAL ── */
#player-modal{
  display:none;
  position:fixed;inset:0;z-index:9000;
  background:#000;
  flex-direction:column;
  overflow:hidden;
}
#player-modal.open{display:flex}

/* TOP BAR — fixed height, never hidden, always clickable */
#pm-topbar{
  flex:0 0 54px;
  width:100%;
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:rgba(31,41,55,.92);
  border-bottom:1px solid rgba(255,255,255,.08);
  z-index:30;
  position:relative;
}

/* IFRAME fills ALL remaining space between topbar and bottombar */
#pm-iframe-wrap{
  flex:1 1 auto;
  position:relative;
  overflow:hidden;
  background:#000;
  min-height:0;
  width:100%;
}
/* When iframe-wrap goes native fullscreen */
#pm-iframe-wrap:fullscreen,
#pm-iframe-wrap:-webkit-full-screen{
  width:100vw;
  height:100vh;
  background:#000;
}
#pm-iframe-wrap:fullscreen #pm-iframe,
#pm-iframe-wrap:-webkit-full-screen #pm-iframe{
  position:absolute;
  top:0;left:0;width:100%;height:100%;
}
#pm-iframe{
  position:absolute;
  top:0;left:0;
  width:100%;
  height:100%;
  border:none;
  display:block;
  background:#000;
}
/* Only block top banner strip \~50px — ads appear there, controls don't */
#ad-shield-overlay{
  position:absolute;top:0;left:0;right:0;
  height:60px; /* covers top banner ad zone */
  z-index:5;pointer-events:none;
  background:transparent;
}

/* BOTTOM BAR — fixed height, never hidden, always clickable */
#pm-bottombar{
  flex:0 0 auto;
  width:100%;
  padding:10px 14px 18px;
  background:rgba(31,41,55,.92);
  border-top:1px solid rgba(255,255,255,.08);
  z-index:30;
  position:relative;
}
.pm-back{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .2s;font-weight:700;
}
.pm-back:active{background:rgba(229,9,26,.5);transform:scale(.92)}
.pm-title{
  flex:1;font-size:14px;font-weight:700;
  text-shadow:0 1px 6px rgba(31,41,55,.9);
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.pm-ep-badge{
  background:rgba(229,9,26,.8);border-radius:6px;
  padding:3px 8px;font-size:11px;font-weight:700;flex-shrink:0;
}
.pm-srv-row{
  display:flex;gap:6px;overflow-x:auto;
  padding-bottom:6px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.pm-srv-row::-webkit-scrollbar{display:none}
.pm-srv{
  flex-shrink:0;padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.85);font-family:var(--font);transition:all .2s;
  min-height:36px;display:flex;align-items:center;
}
.pm-srv:active{transform:scale(.95)}
.pm-srv.active{background:#2563eb;border-color:#2563eb;color:#fff;box-shadow:0 2px 12px rgba(229,9,26,.5)}
.pm-actions{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.pm-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
  color:#fff;border-radius:10px;padding:9px 14px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;min-height:40px;
}
.pm-btn:active{transform:scale(.95)}
.pm-btn.red{background:rgba(229,9,26,.8);border-color:#2563eb;box-shadow:0 2px 12px rgba(229,9,26,.4)}
.pm-shield{
  margin-left:auto;display:flex;align-items:center;gap:4px;
  background:rgba(0,200,80,.2);border:1px solid rgba(0,200,80,.4);
  color:#00c850;border-radius:20px;padding:6px 12px;
  font-size:11px;font-weight:800;flex-shrink:0;
}

/* Episode Panel in player */
#pm-ep-panel{
  display:none;position:fixed;inset:0;z-index:9010;
  background:rgba(15,15,25,.97);backdrop-filter:blur(20px);
  overflow-y:auto;padding:16px 16px 40px;
}
#pm-ep-panel.open{display:block}
.pm-ep-close{
  position:sticky;top:8px;float:right;margin-bottom:10px;
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:1;
}

/* ── WATCHLIST ── */
#wl-page .grid{padding-bottom:100px}
.wl-empty{
  text-align:center;padding:60px 20px;
  color:var(--muted);
}
.wl-empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}

    tmdb('/movie/now_playing'),
    tmdb('/tv/on_the_air'),
    tmdb('/discover/movie',{sort_by:'popularity.desc','primary_release_year':'2026','vote_count.gte':'10'}),
    tmdb('/discover/tv',{sort_by:'popularity.desc','first_air_date.gte':'2025-01-01','vote_count.gte':'20'}),
    tmdb('/discover/tv',{with_genres:'16',with_keywords:'210024|287501',sort_by:'popularity.desc'})
  ]).then(function(rs){
    var nowPlaying=(rs[0].results||[]).map(function(d){d.media_type='movie';return d;});
    var onAir=(rs[1].results||[]).map(function(d){d.media_type='tv';return d;});
    var merged=[];
    for(var i=0;i<Math.max(nowPlaying.length,onAir.length);i++){
      if(nowPlaying[i])merged.push(nowPlaying[i]);
      if(onAir[i])merged.push(onAir[i]);
    }
    heroItems=merged.filter(function(d){return d.backdrop_path;}).slice(0,12);
    if(!heroItems.length)heroItems=SEED_TRENDING;
    setHero(0);startHeroTimer();
    var movies2026=(rs[2].results&&rs[2].results.length)?rs[2].results:SEED_MOVIES;
    var tvRecent=(rs[3].results&&rs[3].results.length)?rs[3].results:SEED_TV;
    var anime=rs[4].results||SEED_ANIME;
    renderHome({trending:merged.slice(0,12)||SEED_TRENDING,popular:movies2026,tv:tvRecent,anime:anime});
  }).catch(function(){});
}

  h+=makeSection('&#127916; Popular Movies',d.popular||[],'movie',false);
  h+=makeSection('&#128250; Top Series',d.tv||[],'tv',false);
  h+=makeSection('&#127981; Anime',d.anime||[],'tv',false);

function makeSection(title,items,type,isTrending){
  if(!items||!items.length)return'';
  var cards=items.slice(0,12).map(function(d){return makeCard(d,type||d.media_type||'movie',false);}).join('');
  var cls='section'+(isTrending?' section-trending':'');
  var displayTitle=isTrending?'<span class="flame-icon">&#128293;</span> Trending':title;
  return '<div class="'+cls+'"><div class="sec-head"><div class="sec-title">'+displayTitle+'</div></div>'
    +'<div class="cards-row">'+cards+'</div></div>';
}

function makeCard(d,type,wide){
  var id=d.id,title=xe(d.title||d.name||''),
      poster=iurl(d.poster_path||(wide?d.backdrop_path:''),'w342'),

      rating=d.vote_average?d.vote_average.toFixed(1):'';

  return '<div class="card'+(wide?' card-wide':'')+'" onclick="openDetail('+id+',\''+mt+'\')">'
    +'<div class="card-img-wrap">'
    +(poster?'<img class="card-img" src="'+poster+'" loading="lazy" alt="'+title+'">'
      :'<div class="card-img" style="background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);padding:8px;text-align:center">'+title+'</div>')
    +(rating?'<div class="card-rating">&#9733; '+rating+'</div>':'')

// ═══ BROWSE ═══
var GENRES_MV=[{id:'',n:'All'},{id:'28',n:'Action'},{id:'35',n:'Comedy'},{id:'18',n:'Drama'},{id:'27',n:'Horror'},{id:'10749',n:'Romance'},{id:'878',n:'Sci-Fi'},{id:'53',n:'Thriller'},{id:'16',n:'Animation'}];
var GENRES_TV=[{id:'',n:'All'},{id:'10759',n:'Action'},{id:'35',n:'Comedy'},{id:'18',n:'Drama'},{id:'9648',n:'Mystery'},{id:'10765',n:'Sci-Fi'},{id:'10764',n:'Reality'},{id:'10762',n:'Kids'}];

function loadBrowse(pg){
  var isAn=pg==='anime';
  var genres=pg==='movies'?GENRES_MV:GENRES_TV;
  var rowId=pg==='movies'?'mv-sort-row':pg==='series'?'sr-sort-row':'an-sort-row';
  var gid=pg==='movies'?'mv-grid':pg==='series'?'sr-grid':'an-grid';
  var state=filterState[pg];
  ge(rowId).innerHTML=genres.map(function(g){
    var active=(!state.genres.length&&g.id==='')||(state.genres.indexOf(g.id)>=0&&g.id!=='');
    return '<button class="filter-btn'+(active?' active':'')+'" onclick="toggleGenreQuick(\''+pg+'\',\''+g.id+'\',this)">'+g.n+'</button>';
  }).join('');
  updateFilterBtn(pg);
  browseItems[pg]=[];browsePage[pg]=1;
  ge(gid).innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  fetchBrowse(pg,1);
}

function toggleGenreQuick(pg,gid,btn){
  var state=filterState[pg];
  if(gid===''){state.genres=[];}
  else{
    var idx=state.genres.indexOf(gid);
    if(idx>=0)state.genres.splice(idx,1);
    else state.genres.push(gid);
  }
  loadBrowse(pg);
}

function buildBrowseParams(pg,pageNum){
  var state=filterState[pg];
  var isAn=pg==='anime';
  var params={sort_by:state.sort,page:pageNum};
  if(isAn){params.with_genres='16';params.with_keywords='210024|287501';}
  else if(state.genres.length)params.with_genres=state.genres.join(',');
  if(state.country)params.with_origin_country=state.country;
  if(state.year){
    if(pg==='movies')params.primary_release_year=state.year;
    else params.first_air_date_year=state.year;
  }
  return params;
}

function fetchBrowse(pg,pageNum){
  var path=pg==='movies'?'/discover/movie':'/discover/tv';
  var params=buildBrowseParams(pg,pageNum);
  var gid=pg==='movies'?'mv-grid':pg==='series'?'sr-grid':'an-grid';
  var type=pg==='movies'?'movie':'tv';
  tmdb(path,params).then(function(d){
    var items=d.results||[];
    browseItems[pg]=browseItems[pg].concat(items);
    var cards=browseItems[pg].map(function(item){return makeCard(item,type,false);}).join('');
    var hasMore=d.page<d.total_pages&&d.page<6;
    ge(gid).innerHTML=cards+(hasMore?'<div style="grid-column:1/-1;text-align:center;padding:20px"><button class="btn" style="border:1px solid #2563eb;color:#2563eb;background:transparent" onclick="loadMoreBrowse(\''+pg+'\')">Load More</button></div>':'');
  }).catch(function(){
    ge(gid).innerHTML='<div class="empty">Failed to load. Check connection.</div>';
  });
}

function loadMoreBrowse(pg){
  browsePage[pg]++;
  var gid=pg==='movies'?'mv-grid':pg==='series'?'sr-grid':'an-grid';
  var btn=ge(gid).querySelector('button');
  if(btn)btn.parentElement.remove();
  fetchBrowse(pg,browsePage[pg]);
}

function updateFilterBtn(pg){
  var btn=document.querySelector('#'+pg+'-page .filter-active-btn');

function setSort(pg,val,btn){

function renderFilterDrawer(pg){
  var s=filterState[pg];
  var sorts=pg==='movies'?[
    {v:'popularity.desc',l:'Most Popular'},{v:'vote_average.desc',l:'Top Rated'},
    {v:'release_date.desc',l:'Newest'},{v:'revenue.desc',l:'Box Office'},
  ]:[
    {v:'first_air_date.desc',l:'Newest'},{v:'popularity.desc',l:'Most Popular'},
    {v:'vote_average.desc',l:'Top Rated'},
  ];
  var genres=pg==='movies'?GENRES_MV.slice(1):GENRES_TV.slice(1);
  var years=[];for(var y=2025;y>=1970;y--)years.push(y);
  var countries=[{v:'',l:'Any'},{v:'US',l:'USA'},{v:'GB',l:'UK'},{v:'KR',l:'Korea'},{v:'JP',l:'Japan'},{v:'IN',l:'India'},{v:'FR',l:'France'}];
  var h='<div class="fd-sec-title">Sort By</div>';
  h+='<div class="fd-chips">'+sorts.map(function(so){
    return '<button class="fd-chip sort-chip'+(s.sort===so.v?' selected':'')+'" onclick="setSort(\''+pg+'\',\''+so.v+'\',this)">'+so.l+'</button>';
  }).join('')+'</div>';
  h+='<div class="fd-sec-title">Genres</div>';
  h+='<div class="fd-chips">'+genres.map(function(g){
    return '<button class="fd-chip'+(s.genres.indexOf(g.id)>=0?' selected':'')+'" onclick="toggleFDGenre(\''+pg+'\',\''+g.id+'\',this)">'+g.n+'</button>';
  }).join('')+'</div>';
  h+='<div class="fd-sec-title">Country</div>';
  h+='<div class="fd-chips">'+countries.map(function(co){
    return '<button class="fd-chip'+(s.country===co.v?' selected':'')+'" onclick="setFDCountry(\''+pg+'\',\''+co.v+'\',this)">'+co.l+'</button>';
  }).join('')+'</div>';
  h+='<div class="fd-sec-title">Release Year</div>';
  h+='<select style="width:100%;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--text);font-size:13px;font-family:var(--font);outline:none" onchange="setFDYear(\''+pg+'\',this.value)"><option value="">Any Year</option>';
  years.forEach(function(y){h+='<option value="'+y+'"'+(s.year==y?' selected':'')+'>'+y+'</option>';});
  h+='</select>';
  ge('fd-body').innerHTML=h;
}
function toggleFDGenre(pg,gid,btn){
  var s=filterState[pg];
  var idx=s.genres.indexOf(gid);
  if(idx>=0)s.genres.splice(idx,1);else s.genres.push(gid);
  btn.classList.toggle('selected');
}
function setFDCountry(pg,val,btn){
  filterState[pg].country=val;
  document.querySelectorAll('.fd-chips .fd-chip').forEach(function(b){
    if(b.getAttribute('onclick')&&b.getAttribute('onclick').indexOf('setFDCountry')>=0)b.classList.remove('selected');
  });
  btn.classList.add('selected');
}
function setFDYear(pg,val){filterState[pg].year=val;}

function openDetail(id,type){
  var cp=ge('channels-page');if(cp&&cp.classList.contains('open'))closeChannels();
  var pp=ge('provider-page');if(pp&&pp.classList.contains('open'))closeProvider();
  var ap=ge('actor-page');if(ap&&ap.classList.contains('open'))closeActorProfile();
  prevPage=curPage;
  pType=type;pId=id;pEpS=1;pEpE=1;pSrv=0;pIsAnime=false;pDubMode=false;
  go('detail',true);
  ge('d-backdrop').src='';
  ge('d-poster').src='';
  ge('d-title').textContent='Loading...';
  ge('d-chips').innerHTML='';
  ge('d-tagline').textContent='';
  ge('d-overview').textContent='';
  ge('d-btns').innerHTML='';
  ge('d-tabs').innerHTML='';
  ge('d-tab-content').innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  var dubEl=ge('dub-toggle');if(dubEl)dubEl.style.display='none';
  var path=type==='movie'?'/movie/'+id:'/tv/'+id;
  tmdb(path,{append_to_response:'credits,videos,similar,seasons'}).then(function(d){
    curDetail=d;curDetailType=type;
    pTitle=d.title||d.name||'';
    var vids=d.videos&&d.videos.results?d.videos.results:[];
    var trailer=vids.find(function(v){return v.site==='YouTube'&&v.type==='Trailer';});
    pYTKey=trailer?trailer.key:'';
    var isAnime=(d.original_language==='ja'&&type==='tv')||
      ((d.genres||[]).some(function(g){return g.id===16;})&&d.original_language==='ja');
    pIsAnime=isAnime;
    if(d.backdrop_path)ge('d-backdrop').src=iurl(d.backdrop_path,'w1280');
    if(d.poster_path)ge('d-poster').src=iurl(d.poster_path,'w342');
    else ge('d-poster').parentElement.style.display='none';
    ge('d-title').textContent=pTitle;
    var yr=(d.release_date||d.first_air_date||'').slice(0,4);
    var runtime=d.runtime?d.runtime+'m':d.episode_run_time?d.episode_run_time[0]+'m':'';
    var chips='';
    if(d.vote_average)chips+='<span class="chip gold">&#9733; '+d.vote_average.toFixed(1)+'</span>';
    if(yr)chips+='<span class="chip">'+yr+'</span>';
    if(runtime)chips+='<span class="chip">'+runtime+'</span>';
    if(d.status)chips+='<span class="chip">'+d.status+'</span>';
    (d.genres||[]).slice(0,3).forEach(function(g){chips+='<span class="chip">'+xe(g.name)+'</span>';});
    ge('d-chips').innerHTML=chips;
    if(d.tagline)ge('d-tagline').textContent='\u201c'+d.tagline+'\u201d';
    ge('d-overview').textContent=d.overview||'No description available.';
    var inWL=watchlist.some(function(w){return w.id===id;});
    ge('d-btns').innerHTML=
      '<button class="btn btn-red" onclick="startPlay()">&#9654; Watch Now</button>'
      +'<button class="btn btn-ghost" id="wlbtn" onclick="toggleWL()">'+(inWL?'&#10003; Saved':'+ Watchlist')+'</button>'
      +(d.homepage?'<a href="'+d.homepage+'" target="_blank" class="btn btn-ghost btn-sm" rel="noopener">Official Site</a>':'');
    if(isAnime&&dubEl){
      dubEl.style.display='flex';
      ge('dub-state-lbl').textContent='Sub';
      ge('dub-chk').checked=false;
    }
    var tabs='<button class="tab active" onclick="switchTab(\'overview\',this)">Overview</button>';
    if(type==='tv')tabs+='<button class="tab" onclick="switchTab(\'episodes\',this)">Episodes</button>';
    if(d.credits&&d.credits.cast&&d.credits.cast.length)tabs+='<button class="tab" onclick="switchTab(\'cast\',this)">Cast</button>';
    if(d.similar&&d.similar.results&&d.similar.results.length)tabs+='<button class="tab" onclick="switchTab(\'similar\',this)">Similar</button>';
    ge('d-tabs').innerHTML=tabs;
    showDetailTab('overview',d);
  }).catch(function(){
    ge('d-title').textContent='Failed to load';
    ge('d-tab-content').innerHTML='<div class="empty">Could not load details. Please try again.</div>';
  });
}

function toggleDub(){
  pDubMode=!pDubMode;

}

function switchTab(name,btn){

function showDetailTab(name,d){
  var h='';
  if(name==='overview'){
    var crew=d.credits&&d.credits.crew?d.credits.crew:[];

    if(dir)h+='<p style="font-size:12px;color:var(--muted);margin-bottom:12px">Director: <b style="color:var(--text)">'+xe(dir.name)+'</b></p>';
    if(d.production_companies&&d.production_companies.length)
      h+='<p style="font-size:12px;color:var(--muted)">Studio: <b style="color:var(--text)">'+xe(d.production_companies[0].name)+'</b></p>';
  }else if(name==='episodes'){
    var seas=(d.seasons||[]).filter(function(s){return s.season_number>0;});
    h='<div class="season-select" id="seas-btns">'
      +seas.map(function(s){return '<button class="seas-btn'+(s.season_number===1?' active':'')+'" onclick="loadSeasonEps('+s.season_number+',this)">Season '+s.season_number+'</button>';}).join('')
      +'</div><div id="ep-list"><div class="spinwrap"><div class="spinner"></div></div></div>';
    ge('d-tab-content').innerHTML=h;
    if(seas.length)loadSeasonEps(1,null);
    return;
  }else if(name==='cast'){
    var cast=(d.credits&&d.credits.cast?d.credits.cast:[]).slice(0,30);
    h='<p style="font-size:11px;color:var(--muted);margin-bottom:12px">&#128072; Tap any cast member to see their full filmography</p>';
    h+='<div class="cast-row">'+cast.map(function(c){
      var img=c.profile_path?iurl(c.profile_path,'w185'):'';
      return '<div class="cast-card" onclick="openActorProfile('+c.id+',\''+xe(c.name)+'\')">'
        +'<div class="cast-img-wrap">'
        +(img?'<img class="cast-img" src="'+img+'" loading="lazy" alt="'+xe(c.name)+'">'
          :'<div class="cast-img" style="display:flex;align-items:center;justify-content:center;font-size:20px">&#128100;</div>')
        +'<div class="cast-img-overlay">&#9654;</div>'
        +'</div>'
        +'<div class="cast-name">'+xe(c.name)+'</div>'
        +'<div class="cast-role">'+xe(c.character||'')+'</div>'
        +'</div>';
    }).join('')+'</div>';
  }else if(name==='similar'){
    var sim=(d.similar&&d.similar.results?d.similar.results:[]).slice(0,12);
    h='<div class="sim-grid">'+sim.map(function(s){return makeCard(s,curDetailType,false);}).join('')+'</div>';
  }

function loadSeasonEps(season,btn){
  if(btn){
    document.querySelectorAll('.seas-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
  }
  ge('ep-list').innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';

    var eps=d.episodes||[];
    ge('ep-list').innerHTML=eps.map(function(ep){
      var thumb=ep.still_path?iurl(ep.still_path,'w300'):'';
      return '<div class="ep-item'+(season===pEpS&&ep.episode_number===pEpE?' active-ep':'')+'" onclick="playEp('+season+','+ep.episode_number+')">'
        +'<div class="ep-thumb">'
        +(thumb?'<img src="'+thumb+'" loading="lazy" alt="">'
          :'<div style="width:100%;height:100%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:20px">&#127916;</div>')
        +'<div class="ep-thumb-play">&#9654;</div>'
        +'</div>'
        +'<div class="ep-info">'
        +'<div class="ep-num">S'+season+' E'+ep.episode_number+'</div>'
        +'<div class="ep-name">'+xe(ep.name||'Episode '+ep.episode_number)+'</div>'
        +(ep.overview?'<div class="ep-desc">'+xe(ep.overview)+'</div>':'')
        +'</div>'
        +'</div>';
    }).join('');
  }).catch(function(){
    ge('ep-list').innerHTML='<div class="empty">Failed to load episodes.</div>';
  });
}

function openActorProfile(actorId,actorName){
  curActorId=actorId;actorFilter='all';
  var ap=ge('actor-page');
  if(!ap){
    var div=document.createElement('div');
    div.id='actor-page';
    div.style.cssText='display:none;position:fixed;inset:0;z-index:7000;background:var(--bg);overflow-y:auto;';
    div.innerHTML='<div style="position:sticky;top:0;z-index:10;background:rgba(255,255,255,.95);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bdr)">'
      +'<button onclick="closeActorProfile()" style="background:rgba(255,255,255,.08);border:none;color:var(--text);width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer">&#8592;</button>'
      +'<div id="actor-name" style="font-size:16px;font-weight:800"></div></div>'
      +'<div id="actor-body" style="padding:16px"><div class="spinwrap"><div class="spinner"></div></div></div>';
    div.classList.add('open');
    document.body.appendChild(div);
    ap=div;
  } else {
    ap.classList.add('open');
  }
  document.body.style.overflow='hidden';
  var nameEl=ge('actor-name');
  if(nameEl)nameEl.textContent=actorName;
  var body=ge('actor-body');
  if(body)body.innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  Promise.all([
    tmdb('/person/'+actorId),
    tmdb('/person/'+actorId+'/combined_credits')
  ]).then(function(rs){
    renderActorBody(rs[0],rs[1]);
  }).catch(function(){
    if(body)body.innerHTML='<div class="empty">Could not load actor info.</div>';
  });
}

function closeActorProfile(){
  var ap=ge('actor-page');
  if(ap)ap.classList.remove('open');
  document.body.style.overflow='';
  curActorId=null;
}

function renderActorBody(p,credits){
  var body=ge('actor-body');
  if(!body)return;
  var allCredits=(credits.cast||[]).filter(function(c){return c.poster_path;})
    .sort(function(a,b){return (b.vote_count||0)-(a.vote_count||0);});
  var filtered=actorFilter==='all'?allCredits:allCredits.filter(function(c){return c.media_type===actorFilter;});
  var movieCount=allCredits.filter(function(c){return c.media_type==='movie';}).length;
  var tvCount=allCredits.filter(function(c){return c.media_type==='tv';}).length;
  var h='';
  if(p.profile_path)h+='<div style="text-align:center;margin-bottom:16px"><img src="'+iurl(p.profile_path,'w342')+'" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid #2563eb"></div>';
  if(p.biography){
    h+='<div style="font-size:12px;color:rgba(240,240,248,.7);line-height:1.7;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden" id="actor-bio-text" class="collapsed">'+xe(p.biography)+'</div>';
    h+='<button onclick="toggleActorBio()" style="font-size:12px;color:#2563eb;background:none;border:none;cursor:pointer;margin-bottom:16px">Read more</button>';
  }
  var chips='';
  if(p.birthday)chips+='<span class="chip">Born: '+p.birthday+'</span>';
  if(p.place_of_birth)chips+='<span class="chip">'+xe(p.place_of_birth)+'</span>';
  if(p.known_for_department)chips+='<span class="chip">'+xe(p.known_for_department)+'</span>';
  if(chips)h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px">'+chips+'</div>';
  h+='<div class="actor-section-title" style="font-size:14px;font-weight:800;margin-bottom:12px">Filmography</div>';
  h+='<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px">';
  h+='<button class="filter-btn'+(actorFilter==='all'?' active':'')+'" onclick="switchActorFilter(\'all\')">All ('+allCredits.length+')</button>';
  h+='<button class="filter-btn'+(actorFilter==='movie'?' active':'')+'" onclick="switchActorFilter(\'movie\')">Movies ('+movieCount+')</button>';
  h+='<button class="filter-btn'+(actorFilter==='tv'?' active':'')+'" onclick="switchActorFilter(\'tv\')">Series ('+tvCount+')</button>';
  h+='</div>';
  if(!filtered.length){
    h+='<div class="empty">No credits found.</div>';
  }else{
    h+='<div class="sim-grid">';
    filtered.forEach(function(cr){
      var type=cr.media_type||'movie';
      var title=xe(cr.title||cr.name||'');
      var poster=cr.poster_path?iurl(cr.poster_path,'w342'):'';
      var yr=(cr.release_date||cr.first_air_date||'').slice(0,4);
      var rating=cr.vote_average?cr.vote_average.toFixed(1):'';
      h+='<div class="card" onclick="closeActorProfile();openDetail('+cr.id+',\''+type+'\')">';
      h+='<div class="card-img-wrap">';
      if(poster)h+='<img class="card-img" src="'+poster+'" loading="lazy" alt="'+title+'">';
      else h+='<div class="card-img" style="background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);padding:8px;text-align:center">'+title+'</div>';
      if(rating)h+='<div class="card-rating">&#9733; '+rating+'</div>';
      h+='<div style="position:absolute;top:5px;right:5px;background:rgba(31,41,55,.75);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;text-transform:uppercase">'+(type==='movie'?'FILM':'TV')+'</div>';
      h+='</div><div class="card-title">'+title+'</div>';
      if(yr)h+='<div class="card-meta">'+yr+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  body.innerHTML=h;
}

function switchActorFilter(f){
  actorFilter=f;
  if(curActorId){
    Promise.all([tmdb('/person/'+curActorId),tmdb('/person/'+curActorId+'/combined_credits')])
      .then(function(rs){renderActorBody(rs[0],rs[1]);});
  }
}

function toggleActorBio(){
  var el=ge('actor-bio-text');
  var btn=el&&el.nextElementSibling;
  if(!el)return;
  var expanded=!el.classList.contains('collapsed');
  el.classList.toggle('collapsed',expanded);
  if(btn)btn.textContent=expanded?'Read more':'Show less';
}

// ═══ PLAY ═══
function startPlay(){pSrv=0;pEpS=1;pEpE=1;openPlayer(getSrcs(pType,pId,1,1)[0],0,null);}
function playEp(s,e){
  pEpS=s;pEpE=e;pSrv=0;
  pmCloseEps();
  openPlayer(getSrcs('tv',pId,s,e)[0],0,'S'+s+' E'+e);
}

// ═══ PLAYER MODAL ═══
function openPlayer(src,srvIdx,epInfo){
  window.open=function(){return null;};
  try{if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(function(){});}catch(e){}
  ge('pm-iframe').src=src;
  ge('pm-title').textContent=pTitle||'Now Playing';
  var epBadge=ge('pm-ep-badge');
  if(epInfo){epBadge.textContent=epInfo;epBadge.style.display='block';}
  else epBadge.style.display='none';
  ge('pm-srv-row').innerHTML=SRVN.map(function(n,i){
    return '<button class="pm-srv'+(i===srvIdx?' active':'')+'" onclick="switchSrv('+i+')">S'+(i+1)+' '+n+'</button>';
  }).join('');
  var epBtn=ge('pm-ep-btn');if(epBtn)epBtn.style.display=pType==='tv'?'inline-flex':'none';
  var trlBtn=ge('pm-trl-btn');if(trlBtn)trlBtn.style.display=pYTKey?'inline-flex':'none';
  ge('player-modal').classList.add('open');
  document.body.style.overflow='hidden';
  pmShowControls();pmAutoHide();
  installAB();
}

function closePlayer(){
  ge('pm-iframe').src='';
  ge('player-modal').classList.remove('open');
  pmCloseEps();
  document.body.style.overflow='';
  try{if(screen.orientation&&screen.orientation.unlock)screen.orientation.unlock();}catch(e){}
}

function switchSrv(idx){
  pSrv=idx;
  ge('pm-iframe').src=getSrcs(pType,pId,pEpS,pEpE)[idx];
  document.querySelectorAll('.pm-srv').forEach(function(b,i){b.classList.toggle('active',i===idx);});
  pmShowControls();
  toast(SRVN[idx]+' loading...');
}
function pmNextSrv(){var n=(pSrv+1)%SRVN.length;switchSrv(n);}
function pmTrailer(){if(pYTKey)openPlayer('https://www.youtube.com/embed/'+pYTKey+'?autoplay=1&rel=0',-1,'Trailer');}

function pmToggle(){if(pmVisible)pmHideControls();else pmShowControls();}
function pmShowControls(){
  pmVisible=true;
  var tb=ge('pm-topbar'),bb=ge('pm-bottombar');
  if(tb)tb.classList.remove('hidden');
  if(bb)bb.classList.remove('hidden');
  pmAutoHide();
}
function pmHideControls(){
  pmVisible=false;
  var tb=ge('pm-topbar'),bb=ge('pm-bottombar');
  if(tb)tb.classList.add('hidden');
  if(bb)bb.classList.add('hidden');
}
function pmAutoHide(){clearTimeout(pmHideT);pmHideT=setTimeout(pmHideControls,4000);}

function pmUnmute(){
  var iframe=ge('pm-iframe');
  var src=iframe.src;
  if(src.indexOf('muted=true')>=0)src=src.replace('muted=true','muted=false');
  else if(src.indexOf('muted=false')<0)src+=(src.indexOf('?')>=0?'&':'?')+'muted=false';
  iframe.src=src;
  var btn=ge('pm-unmute-btn');
  if(btn)btn.style.display='none';
}

function pmFullscreen(){
  var el=ge('player-modal');
  if(el.requestFullscreen)el.requestFullscreen();
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  try{if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(function(){});}catch(e){}
}

function pmOpenEps(){
  var panel=ge('pm-ep-panel');
  if(!panel)return;
  ge('pm-ep-show').style.color='#fff';
  ge('pm-ep-show').textContent=pTitle;
  var d=curDetail;
  var seas=d&&d.seasons?d.seasons.filter(function(s){return s.season_number>0;}):[];
  ge('pm-seasons').innerHTML=seas.map(function(s){
    return '<button class="seas-btn'+(s.season_number===pmSeason?' active':'')+'" onclick="pmLoadSeason('+s.season_number+',this)">Season '+s.season_number+'</button>';
  }).join('');
  panel.classList.add('open');
  pmLoadSeason(pmSeason,null);
}
function pmCloseEps(){var p=ge('pm-ep-panel');if(p)p.classList.remove('open');}
function pmLoadSeason(s,btn){
  pmSeason=s;
  if(btn){document.querySelectorAll('#pm-seasons .seas-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');}
  ge('pm-ep-list').innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  tmdb('/tv/'+pId+'/season/'+s).then(function(d){
    ge('pm-ep-list').innerHTML=(d.episodes||[]).map(function(ep){
      var active=s===pEpS&&ep.episode_number===pEpE;
      return '<div class="ep-item'+(active?' active-ep':'')+'" onclick="playEp('+s+','+ep.episode_number+')">'
        +'<div class="ep-thumb" style="width:70px">'
        +(ep.still_path?'<img src="'+iurl(ep.still_path,'w185')+'" loading="lazy" alt="">'
          :'<div style="width:100%;height:100%;background:var(--bg4);display:flex;align-items:center;justify-content:center">&#127916;</div>')
        +'<div class="ep-thumb-play">&#9654;</div></div>'
        +'<div class="ep-info"><div class="ep-num">S'+s+' E'+ep.episode_number+'</div>'
        +'<div class="ep-name">'+xe(ep.name||'Episode '+ep.episode_number)+'</div></div>'
        +(active?'<div style="color:#2563eb;font-size:20px">&#9654;</div>':'')
        +'</div>';
    }).join('');
  });
}

// ═══ WATCHLIST ═══
function toggleWL(){
  var idx=watchlist.findIndex(function(w){return w.id===pId;});
  if(idx>=0){watchlist.splice(idx,1);toast('Removed from watchlist');}
  else{watchlist.push({id:pId,type:pType,title:pTitle,poster:curDetail?curDetail.poster_path:''});toast('Added to watchlist');}
  try{localStorage.setItem('fw_wl',JSON.stringify(watchlist));}catch(e){}
  updateWLCount();
  var btn=ge('wlbtn');
  if(btn)btn.textContent=watchlist.some(function(w){return w.id===pId;})?'&#10003; Saved':'+ Watchlist';
}
function updateWLCount(){var el=ge('wlc');if(el)el.textContent=watchlist.length;}
function renderWL(){
  if(!watchlist.length){
    ge('wl-grid').innerHTML='<div class="wl-empty" style="grid-column:1/-1"><div class="wl-empty-icon">&#128278;</div><div>Your watchlist is empty</div><div style="margin-top:8px;font-size:12px">Add movies and series to watch later</div></div>';
    return;
  }
  ge('wl-grid').innerHTML=watchlist.map(function(w){
    return makeCard({id:w.id,title:w.title,name:w.title,poster_path:w.poster,media_type:w.type},w.type,false);
  }).join('');
}

// ═══ SEARCH ═══
var searchDebounce=null;
function doSearch(q){
  var clr=ge('sclr');
  if(clr)clr.className='btn'+(q?' show':'');
  clearTimeout(searchDebounce);
  if(!q){if(curPage==='search')go('home',true);return;}
  searchDebounce=setTimeout(function(){
    go('search',true);
    ge('sr-title').textContent='Results for "'+q+'"';
    ge('sr-grid2').innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
    tmdb('/search/multi',{query:q}).then(function(d){
      var res=(d.results||[]).filter(function(r){return r.media_type==='movie'||r.media_type==='tv';});
      if(!res.length){ge('sr-grid2').innerHTML='<div class="empty">No results found</div>';return;}
      ge('sr-grid2').innerHTML=res.map(function(r){return makeCard(r,r.media_type,false);}).join('');
    });
  },400);
}
function clearSearch(){ge('sinput').value='';ge('sclr').className='btn';if(curPage==='search')go('home',true);}

// ═══ AD SHIELD ═══
function installAB(){
  if(window._abOn)return;window._abOn=true;
  var orig=window.open;
  window.open=function(url){
    if(!url)return null;
    var safe=['youtube','youtu.be','tmdb','vidsrc','vidlink','videasy','vidfast','embed.su','multiembed','goojara','soaper','archive.org','dl.vidsrc'];
    if(safe.some(function(d){return url.indexOf(d)>=0;}))return orig.apply(window,arguments);
    toast('Ad blocked!');return{closed:false,close:function(){},focus:function(){}};
  };
  window.addEventListener('beforeunload',function(e){
    if(ge('player-modal')&&ge('player-modal').classList.contains('open')){
      e.preventDefault();e.returnValue='';return'';
    }
  });
}

// ═══ MOVIE CHANNELS ═══
var _allProviders=[];
var _curProviderId=null;
var _curProviderType='movie';

function loadHomeChannels(){
  tmdb('/watch/providers/movie',{watch_region:'US',language:'en-US'}).then(function(d){
    _allProviders=(d.results||[]).slice(0,60);  // UPGRADED TO 60+ CHANNELS
    var strip=ge('home-channels-strip');
    if(!strip)return;
    strip.innerHTML=_allProviders.map(function(p){
      return '<div class="ch-logo" onclick="openProvider('+p.provider_id+',\'' +xe(p.provider_name)+ '\',\'' +iurl(p.logo_path,'w92')+ '\')">'
        +'<img src="'+iurl(p.logo_path,'w92')+'" alt="'+xe(p.provider_name)+'" onerror="this.parentNode.style.background=\'#222\'">'
        +'</div>';
    }).join('');
  }).catch(function(){
    var strip=ge('home-channels-strip');
    if(strip)strip.innerHTML='<div style="color:var(--muted);font-size:13px;padding:20px">Could not load channels</div>';
  });
}

function openChannels(){
  var pg=ge('channels-page');
  pg.classList.add('open');
  document.body.style.overflow='hidden';
  if(_allProviders.length){
    renderChannelsGrid(_allProviders);
  } else {
    tmdb('/watch/providers/movie',{watch_region:'US',language:'en-US'}).then(function(d){
      _allProviders=d.results||[];
      renderChannelsGrid(_allProviders);
    });
  }
}

function renderChannelsGrid(providers){
  var grid=ge('channels-grid');
  if(!grid)return;
  grid.innerHTML=providers.map(function(p){
    return '<div class="ch-card" onclick="openProvider('+p.provider_id+',\'' +xe(p.provider_name)+ '\',\'' +iurl(p.logo_path,'w185')+ '\')">'
      +'<img src="'+iurl(p.logo_path,'w185')+'" alt="'+xe(p.provider_name)+'" onerror="this.style.display=\'none\'">'
      +'</div>';
  }).join('');
}

function closeChannels(){
  ge('channels-page').classList.remove('open');
  document.body.style.overflow='';
}

function openProvider(id,name,logo){
  _curProviderId=id;
  _curProviderType='movie';
  ge('provider-name-title').textContent=name;
  ge('provider-logo-img').src=logo;
  ge('provider-page').classList.add('open');
  document.body.style.overflow='hidden';
  document.querySelectorAll('#prov-tab-movie,#prov-tab-tv').forEach(function(b){b.classList.remove('active');});
  ge('prov-tab-movie').classList.add('active');
  loadProviderContent(id,'movie');
}

function closeProvider(){
  ge('provider-page').classList.remove('open');
  document.body.style.overflow='';
}

function switchProviderTab(type,btn){
  _curProviderType=type;
  document.querySelectorAll('#prov-tab-movie,#prov-tab-tv').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  ge('provider-grid').innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  loadProviderContent(_curProviderId,type);
}

function loadProviderContent(id,type){
  _providerPage=1;
  _providerItems=[];
  var grid=ge('provider-grid');
  grid.innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  fetchProviderPage(id,type,1);
}
var _providerPage=1,_providerItems=[];
function fetchProviderPage(id,type,page){
  var grid=ge('provider-grid');
  var endpoint=type==='tv'?'/discover/tv':'/discover/movie';
  tmdb(endpoint,{
    with_watch_providers:id,
    watch_region:'US',
    sort_by:'popularity.desc',
    language:'en-US',
    page:page
  }).then(function(d){
    var items=d.results||[];
    if(page===1)_providerItems=items;
    else _providerItems=_providerItems.concat(items);
    var hasMore=d.page<d.total_pages&&d.page<10;
    if(!_providerItems.length){
      grid.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">No content found</div>';
      return;
    }
    var cards=_providerItems.map(function(item){return makeCard(item,type,false);}).join('');
    if(hasMore){
      var nextPage=d.page+1;
      cards+='<div style="grid-column:1/-1;text-align:center;padding:20px">'
        +'<button class="btn" style="border:1px solid #2563eb;color:#2563eb;background:transparent" '
        +'onclick="fetchProviderPage('+id+',\''+type+'\','+nextPage+')">Load More</button></div>';
    }
    grid.innerHTML=cards;
    _providerPage=page;
  }).catch(function(){
    if(page===1)grid.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">Failed to load</div>';
  });
}

// ═══ TOAST ═══
var toastT;
function toast(msg){var t=ge('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('on');},2500);}

// ═══ THEME TOGGLE (NEW) ═══
function toggleTheme(){
  var isDark = document.body.getAttribute('data-theme') === 'dark';
  document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem('fw-theme', isDark ? 'light' : 'dark');
}

// ═══ PWA (NEW) ═══
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('data:text/javascript,' + encodeURIComponent(`
    self.addEventListener('install', () => self.skipWaiting());
    self.addEventListener('activate', () => self.clients.claim());
  `));
}

// ═══ INIT ═══
updateWLCount();
loadHome();
loadHomeChannels();  // 60+ channels now loaded
</script>
</body>
</html>
