<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Feng World — Stream Everything</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --red:#e5091a;--red2:#ff2d3f;--red3:rgba(229,9,26,.15);
  --bg:#060610;--bg2:#0a0a18;--bg3:#0f0f1e;--bg4:#161628;--bg5:#1e1e32;
  --text:#f2f2fa;--muted:rgba(242,242,250,.45);--muted2:rgba(242,242,250,.25);
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.12);
  --card-r:12px;--nav-h:60px;
  --font:'Inter',sans-serif;--font2:'Syne',sans-serif;
  --glow:0 0 40px rgba(229,9,26,.25);
  --glass:rgba(10,10,24,.7);
  --gold:#ffd060;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  min-height:100vh;overflow-x:hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(229,9,26,.5);border-radius:2px}

/* ── NAV ── */
#nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:800;
  display:flex;align-items:center;padding:0 24px;gap:14px;
  transition:background .3s,backdrop-filter .3s;
}
#nav.scrolled{
  background:rgba(6,6,16,.96);
  backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,.05);
  box-shadow:0 4px 30px rgba(0,0,0,.5);
}
.logo{
  display:flex;align-items:center;gap:10px;
  text-decoration:none;flex-shrink:0;cursor:pointer;
}
.logo-mark{
  width:34px;height:34px;background:var(--red);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;flex-shrink:0;
  box-shadow:0 0 20px rgba(229,9,26,.6),0 0 60px rgba(229,9,26,.15);
  position:relative;overflow:hidden;
}
.logo-mark::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,transparent 60%);
}
.logo-txt{
  font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:3px;color:var(--text);
}
.logo-txt em{color:var(--red);font-style:normal}
.nav-links{display:flex;gap:2px;flex:1;padding-left:8px}
.nav-link{
  padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all .2s;border:none;
  background:none;font-family:var(--font);white-space:nowrap;letter-spacing:.1px;
}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,.06)}
.nav-link.active{
  color:#fff;background:rgba(229,9,26,.15);
  border:1px solid rgba(229,9,26,.25);
}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.wl-btn{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.06);border:1px solid var(--bdr);
  color:var(--text);border-radius:10px;padding:7px 14px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;white-space:nowrap;
}
.wl-btn:hover{background:rgba(255,255,255,.1);border-color:var(--bdr2)}
#wl-count-badge{
  background:var(--red);color:#fff;border-radius:50%;
  width:18px;height:18px;font-size:10px;font-weight:800;
  display:inline-flex;align-items:center;justify-content:center;
  margin-left:2px;
}

/* ── SEARCH BAR ── */
#searchbar{
  position:fixed;top:var(--nav-h);left:0;right:0;z-index:790;
  padding:8px 20px 10px;
  background:rgba(6,6,16,.95);
  backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,.04);
  transition:transform .25s;
}
.search-wrap{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.055);
  border:1.5px solid rgba(255,255,255,.08);
  border-radius:11px;padding:10px 14px;
  transition:all .25s;max-width:700px;margin:0 auto;
}
.search-wrap:focus-within{
  border-color:rgba(229,9,26,.45);
  background:rgba(229,9,26,.04);
  box-shadow:0 0 0 3px rgba(229,9,26,.08);
}
.search-wrap svg{flex-shrink:0;opacity:.4;transition:opacity .2s}
.search-wrap:focus-within svg{opacity:.7}
#sinput{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;font-family:var(--font);font-weight:500;
}
#sinput::placeholder{color:var(--muted)}
#sclr{
  background:rgba(255,255,255,.1);border:none;color:var(--text);
  width:20px;height:20px;border-radius:50%;font-size:13px;
  display:none;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  transition:background .2s;
}
#sclr:hover{background:rgba(229,9,26,.3)}
#sclr.show{display:flex}

/* ── PAGES ── */
.page{display:none;padding-top:calc(var(--nav-h) + 54px)}
.page.active{display:block}
.page-fade{animation:pageFade .35s ease}
@keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ══════════════════════════
   HERO SECTION — CINEMATIC
══════════════════════════ */
.hero{
  position:relative;
  height:calc(100vw * 0.56);
  min-height:260px;max-height:560px;
  overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background:#000;
}
.hero-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center 20%;
  transition:opacity .7s ease,transform .7s ease;
  transform:scale(1.03);
}
.hero-img.loaded{transform:scale(1)}
.hero-shimmer{
  position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.03) 50%,transparent 100%);
  animation:shimmer 2s infinite;
  display:none;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.hero-grad{
  position:absolute;inset:0;
  background:
    linear-gradient(to top, var(--bg) 0%, rgba(6,6,16,.8) 35%, rgba(6,6,16,.15) 70%, transparent 100%),
    linear-gradient(to right, rgba(6,6,16,.85) 0%, rgba(6,6,16,.4) 40%, transparent 70%);
}
.hero-side-glow{
  position:absolute;top:0;left:0;bottom:0;width:4px;
  background:linear-gradient(to bottom,transparent,var(--red),transparent);
  opacity:.6;
}
.hero-content{
  position:absolute;bottom:0;left:0;right:0;
  padding:24px 24px 32px;
  z-index:2;
}
.hero-eyebrow{
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;
}
.hero-eyebrow-line{
  width:24px;height:2px;background:var(--red);border-radius:1px;
  box-shadow:0 0 8px rgba(229,9,26,.8);
}
.hero-eyebrow-txt{
  font-size:10px;font-weight:800;letter-spacing:2px;
  color:var(--red);text-transform:uppercase;
  font-family:var(--font2);
}
.hero-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.hbadge{
  display:inline-flex;align-items:center;gap:4px;
  border-radius:6px;padding:3px 9px;
  font-size:10px;font-weight:700;letter-spacing:.4px;
}
.hbadge-red{background:var(--red);color:#fff;box-shadow:0 0 12px rgba(229,9,26,.45)}
.hbadge-glass{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.85);
  backdrop-filter:blur(8px);
}
.hbadge-gold{
  background:rgba(255,208,96,.15);
  border:1px solid rgba(255,208,96,.35);
  color:var(--gold);
}
.hero-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(30px,8vw,60px);
  letter-spacing:1.5px;line-height:.96;
  margin-bottom:10px;
  text-shadow:0 2px 30px rgba(0,0,0,.9),0 0 80px rgba(229,9,26,.15);
}
.hero-desc{
  font-size:12px;color:rgba(242,242,250,.72);
  line-height:1.6;max-width:340px;margin-bottom:16px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  font-family:var(--font);
}
.hero-btns{display:flex;gap:8px;flex-wrap:wrap}
.hero-dots{
  position:absolute;bottom:12px;right:20px;
  display:flex;gap:5px;z-index:3;
}
.hero-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.25);cursor:pointer;
  transition:all .35s;
}
.hero-dot.active{background:var(--red);width:20px;border-radius:3px;box-shadow:0 0 8px rgba(229,9,26,.7)}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  border-radius:10px;padding:10px 20px;
  font-size:13px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;border:none;
  white-space:nowrap;letter-spacing:.1px;
}
.btn-red{
  background:var(--red);color:#fff;
  box-shadow:0 4px 20px rgba(229,9,26,.45);
}
.btn-red:hover{
  background:var(--red2);transform:translateY(-1px);
  box-shadow:0 8px 28px rgba(229,9,26,.6);
}
.btn-red:active{transform:translateY(0)}
.btn-ghost{
  background:rgba(255,255,255,.09);color:var(--text);
  border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(10px);
}
.btn-ghost:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.22)}
.btn-green{
  background:rgba(0,210,90,.15);color:#00d25a;
  border:1px solid rgba(0,210,90,.3);
}
.btn-green:hover{background:rgba(0,210,90,.25)}
.btn-sm{padding:7px 14px;font-size:12px}

/* ── SECTIONS ── */
.section{margin-bottom:36px}
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;margin-bottom:14px;
}
.sec-title{
  font-size:16px;font-weight:800;letter-spacing:.2px;
  display:flex;align-items:center;gap:8px;
  font-family:var(--font2);
}
.sec-title-accent{
  display:inline-block;width:3px;height:16px;
  background:var(--red);border-radius:2px;flex-shrink:0;
  box-shadow:0 0 8px rgba(229,9,26,.6);
}
.sec-label{
  font-size:11px;font-weight:600;color:var(--muted);
  background:rgba(255,255,255,.05);border:1px solid var(--bdr);
  border-radius:20px;padding:2px 8px;
}
.sec-more{
  font-size:12px;color:var(--red);cursor:pointer;font-weight:700;
  letter-spacing:.2px;transition:color .2s;
  display:flex;align-items:center;gap:4px;
}
.sec-more:hover{color:var(--red2)}
.sec-more::after{content:'›';font-size:16px;line-height:1}

/* ── CARDS ── */
.cards-row{
  display:flex;gap:10px;overflow-x:auto;padding:0 20px 8px;
  scrollbar-width:none;
}
.cards-row::-webkit-scrollbar{display:none}
.card{
  flex-shrink:0;width:120px;cursor:pointer;
  transition:transform .25s;position:relative;
}
.card:hover{transform:translateY(-4px)}
.card-img-wrap{
  position:relative;border-radius:var(--card-r);overflow:hidden;
  aspect-ratio:2/3;background:var(--bg4);margin-bottom:8px;
  border:1px solid rgba(255,255,255,.05);
}
.card-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.card:hover .card-img{transform:scale(1.05)}
.card-img-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 55%);
}
.card-overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:1;opacity:0;transition:opacity .25s;
  background:rgba(6,6,16,.35);
}
.card:hover .card-overlay{opacity:1}
.card-play-ring{
  width:44px;height:44px;border-radius:50%;
  background:rgba(229,9,26,.9);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;box-shadow:0 4px 20px rgba(229,9,26,.6);
  border:2px solid rgba(255,255,255,.2);
}
.card-rating{
  position:absolute;top:7px;left:7px;z-index:2;
  background:rgba(0,0,0,.8);border-radius:5px;
  padding:2px 7px;font-size:9px;font-weight:700;color:var(--gold);
  display:flex;align-items:center;gap:3px;
  border:1px solid rgba(255,208,96,.2);
}
.card-new-badge{
  position:absolute;top:7px;right:7px;z-index:2;
  background:var(--red);border-radius:5px;
  padding:2px 6px;font-size:8px;font-weight:900;letter-spacing:.5px;
}
.card-type-badge{
  position:absolute;bottom:36px;right:7px;z-index:2;
  background:rgba(0,0,0,.75);border-radius:4px;
  padding:2px 6px;font-size:8px;font-weight:700;color:rgba(255,255,255,.7);
  text-transform:uppercase;letter-spacing:.5px;
}
.card-title{font-size:11px;font-weight:600;line-height:1.35;color:var(--text)}
.card-meta{font-size:10px;color:var(--muted);margin-top:2px;display:flex;gap:4px;align-items:center}
.card-meta-dot{width:3px;height:3px;border-radius:50%;background:var(--muted);flex-shrink:0}

/* Wide card */
.card-wide{width:180px}
.card-wide .card-img-wrap{aspect-ratio:16/9}

/* ── SPOTLIGHT CARD (featured) ── */
.spotlight-row{
  display:flex;gap:10px;overflow-x:auto;padding:0 20px 10px;
  scrollbar-width:none;
}
.spotlight-row::-webkit-scrollbar{display:none}
.card-spotlight{
  flex-shrink:0;width:240px;cursor:pointer;
  border-radius:14px;overflow:hidden;
  position:relative;aspect-ratio:16/10;
  border:1px solid rgba(255,255,255,.07);
  transition:transform .3s,box-shadow .3s;
}
.card-spotlight:hover{transform:translateY(-4px) scale(1.01);box-shadow:0 16px 48px rgba(0,0,0,.6)}
.card-spotlight img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.card-spotlight:hover img{transform:scale(1.05)}
.card-spotlight-grad{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.4) 50%,rgba(0,0,0,.1) 100%);
}
.card-spotlight-content{
  position:absolute;bottom:0;left:0;right:0;
  padding:12px;z-index:2;
}
.card-spotlight-badge{
  display:inline-block;background:var(--red);color:#fff;
  border-radius:4px;padding:2px 7px;font-size:8px;font-weight:800;
  letter-spacing:.5px;margin-bottom:5px;
}
.card-spotlight-title{font-size:13px;font-weight:800;line-height:1.2;margin-bottom:3px}
.card-spotlight-meta{font-size:10px;color:rgba(255,255,255,.6);display:flex;gap:6px}

/* ── BROWSE PAGE ── */
.page-back-btn{
  flex-shrink:0;width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;font-family:var(--font);
}
.page-back-btn:hover{background:rgba(229,9,26,.25);border-color:rgba(229,9,26,.4);color:#fff}
.browse-topbar{
  display:flex;align-items:center;gap:10px;
  padding:0 20px 10px;flex-wrap:wrap;
}
.sort-tab-row{
  display:flex;gap:6px;overflow-x:auto;flex:1;scrollbar-width:none;
}
.sort-tab-row::-webkit-scrollbar{display:none}
.sort-tab{
  flex-shrink:0;padding:7px 15px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.06);border:1px solid var(--bdr);
  color:var(--muted);font-family:var(--font);transition:all .2s;
}
.sort-tab.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 12px rgba(229,9,26,.35)}
.filter-trigger-btn{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.06);border:1px solid var(--bdr);
  color:var(--text);font-family:var(--font);transition:all .2s;
}
.filter-trigger-btn:hover{background:rgba(229,9,26,.12);border-color:rgba(229,9,26,.35);color:#fff}
.filter-trigger-btn.has-filter{background:rgba(229,9,26,.18);border-color:var(--red);color:#fff}

.grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  padding:0 20px 20px;
}
.grid .card{width:100%}

/* ── DETAIL PAGE ── */
#detail-page{padding-top:0!important}
.detail-back{
  position:fixed;top:14px;left:16px;z-index:900;
  width:38px;height:38px;border-radius:50%;
  background:rgba(6,6,16,.85);border:1px solid rgba(255,255,255,.14);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;backdrop-filter:blur(16px);
  transition:all .2s;color:var(--text);
}
.detail-back:hover{background:rgba(229,9,26,.25);border-color:rgba(229,9,26,.4)}
.detail-hero{
  position:relative;height:58vw;min-height:220px;max-height:440px;overflow:hidden;
}
.detail-hero img{width:100%;height:100%;object-fit:cover;display:block}
.detail-hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,rgba(6,6,16,.5) 55%,transparent 100%);
}
.detail-body{padding:0 20px;margin-top:-48px;position:relative;z-index:2}
.detail-row{display:flex;gap:16px;margin-bottom:18px}
.detail-poster{
  width:92px;flex-shrink:0;border-radius:11px;overflow:hidden;
  box-shadow:0 8px 36px rgba(0,0,0,.7);
  border:1.5px solid rgba(255,255,255,.1);
}
.detail-poster img{width:100%;display:block}
.detail-info{flex:1;padding-top:10px;min-width:0}
.detail-title{font-size:21px;font-weight:800;line-height:1.15;margin-bottom:7px;font-family:var(--font2)}
.detail-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.chip{
  background:rgba(255,255,255,.06);border:1px solid var(--bdr);
  border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--muted);
}
.chip.red{background:rgba(229,9,26,.14);border-color:rgba(229,9,26,.3);color:var(--red)}
.chip.gold{background:rgba(255,208,96,.1);border-color:rgba(255,208,96,.3);color:var(--gold)}
.chip.green{background:rgba(0,210,90,.1);border-color:rgba(0,210,90,.3);color:#00d25a}
.detail-tagline{
  font-size:12px;font-style:italic;color:var(--red);
  margin-bottom:12px;opacity:.85;
}
.detail-overview{
  font-size:13px;color:rgba(242,242,250,.72);line-height:1.7;
  margin-bottom:18px;
}
.detail-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}

/* TABS */
.tabs{
  display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.06);
  margin-bottom:20px;overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;
  background:none;border-left:none;border-right:none;border-top:none;
  font-family:var(--font);
}
.tab.active{color:var(--text);border-bottom-color:var(--red)}
.tab-pane{display:none}.tab-pane.active{display:block}

/* Cast */
.cast-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.cast-row::-webkit-scrollbar{display:none}
.cast-card{
  flex-shrink:0;width:72px;text-align:center;cursor:pointer;
  transition:transform .2s;
}
.cast-card:hover{transform:scale(1.06)}
.cast-img-wrap{
  position:relative;width:64px;height:64px;border-radius:50%;
  overflow:hidden;margin:0 auto 7px;
  border:2px solid rgba(229,9,26,.35);
  background:var(--bg4);
  transition:border-color .2s,box-shadow .2s;
}
.cast-card:hover .cast-img-wrap{border-color:var(--red);box-shadow:0 0 16px rgba(229,9,26,.3)}
.cast-img{width:100%;height:100%;object-fit:cover;display:block}
.cast-img-overlay{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(229,9,26,.6);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;opacity:0;transition:opacity .2s;
}
.cast-card:hover .cast-img-overlay{opacity:1}

function go(page,noHistory){
  if(!noHistory&&curPage!==page)prevPage=curPage;

  var nl=ge('nl-'+page);
  if(nl)nl.classList.add('active');
  ge('searchbar').style.display=page==='detail'?'none':'block';

  if(page==='home')loadHome();
  else if(page==='movies')loadBrowse('movies');
  else if(page==='series')loadBrowse('series');
  else if(page==='anime')loadBrowse('anime');
  else if(page==='cartoons')loadBrowse('cartoons');
  else if(page==='wl')renderWL();
  updateWLCount();
}

  var yr=(d.release_date||d.first_air_date||'').slice(0,4);
  var img=iurl(d.backdrop_path,'w1280')||iurl(d.poster_path,'w780');

  heroImg.classList.remove('loaded');
  heroImg.onload=function(){heroImg.classList.add('loaded')};
  heroImg.src=img;

  ge('hero-desc').textContent=d.overview||'';
  var isMov=d.media_type==='movie';
  ge('hero-eyebrow').textContent=isMov?'Featured Movie':'Featured Series';

  if(d.vote_average)badges+='<span class="hbadge hbadge-gold">&#9733; '+d.vote_average.toFixed(1)+'</span>';
  badges+='<span class="hbadge hbadge-red">'+(isMov?'Movie':'Series')+'</span>';
  ge('hero-badges').innerHTML=badges;
  ge('hero-dots').innerHTML=heroItems.slice(0,8).map(function(_,j){
    return '<div class="hero-dot'+(j===i?' active':'')+'" onclick="setHero('+j+')"></div>';

}

function loadHome(){
  heroItems=SEED_TRENDING;
  setHero(0);startHeroTimer();
  renderHome({trending:SEED_TRENDING,movies:SEED_MOVIES,tv:SEED_TV,anime:SEED_ANIME,cartoons:SEED_CARTOONS});
  Promise.all([
    tmdb('/movie/now_playing'),
    tmdb('/tv/on_the_air'),
    tmdb('/discover/movie',{sort_by:'popularity.desc','primary_release_year':'2025','vote_count.gte':'10'}),
    tmdb('/discover/tv',{sort_by:'popularity.desc','first_air_date.gte':'2025-01-01','vote_count.gte':'20'}),
    tmdb('/discover/tv',{with_genres:'16',with_keywords:'210024|287501',sort_by:'popularity.desc'}),
    tmdb('/discover/tv',{with_genres:'16',language:'en-US',sort_by:'popularity.desc',without_keywords:'210024|287501'})
  ]).then(function(rs){
    var nowPlaying=(rs[0].results||[]).map(function(d){d.media_type='movie';return d;});
    var onAir=(rs[1].results||[]).map(function(d){d.media_type='tv';return d;});
    var merged=[];
    for(var i=0;i<Math.max(nowPlaying.length,onAir.length);i++){
      if(nowPlaying[i])merged.push(nowPlaying[i]);
      if(onAir[i])merged.push(onAir[i]);
    }
    heroItems=merged.filter(function(d){return d.backdrop_path;}).slice(0,12);
    if(!heroItems.length)heroItems=SEED_TRENDING;
    setHero(0);startHeroTimer();
    var movies2025=(rs[2].results&&rs[2].results.length)?rs[2].results:SEED_MOVIES;
    var tvRecent=(rs[3].results&&rs[3].results.length)?rs[3].results:SEED_TV;
    var anime=rs[4].results&&rs[4].results.length?rs[4].results:SEED_ANIME;
    var cartoons=rs[5].results&&rs[5].results.length?rs[5].results:SEED_CARTOONS;
    renderHome({trending:merged.slice(0,12)||SEED_TRENDING,movies:movies2025,tv:tvRecent,anime:anime,cartoons:cartoons});
  }).catch(function(){});
}

function renderHome(d){

  h+=makeSection('&#127916; New Movies',d.movies||[],'movie');
  h+=makeSection('&#128250; Top Series',d.tv||[],'tv');
  h+=makeSection('&#127981; Anime',d.anime||[],'tv');
  h+=makeSection('&#127774; Cartoons',d.cartoons||[],'tv');
  ge('home-sections').innerHTML=h;
}

function makeSpotlightSection(title,items,isTrending){
  if(!items||!items.length)return'';
  var cls=isTrending?'section section-trending':'section';
  var cards=items.slice(0,10).map(function(d){
    var id=d.id,t=xe(d.title||d.name||'');
    var img=iurl(d.backdrop_path,'w780')||iurl(d.poster_path,'w342');
    var yr=(d.release_date||d.first_air_date||'').slice(0,4);
    var mt=d.media_type||'movie';
    var isMov=mt==='movie';
    return '<div class="card-spotlight" onclick="openDetail('+id+',\''+mt+'\')">'
      +(img?'<img src="'+img+'" loading="lazy" alt="'+t+'">':'')

      +'<div class="card-spotlight-content">'
      +'<span class="card-spotlight-badge">'+(isMov?'MOVIE':'TV')+'</span>'
      +'<div class="card-spotlight-title">'+t+'</div>'
      +'<div class="card-spotlight-meta">'
      +(d.vote_average?'<span>&#9733; '+d.vote_average.toFixed(1)+'</span>':'')
      +(yr?'<span>'+yr+'</span>':'')
      +'</div>'
      +'</div>'
      +'</div>';
  }).join('');
  return '<div class="'+cls+'">'
    +'<div class="sec-head"><div class="sec-title"><span class="sec-title-accent"></span>'+title+'</div></div>'
    +'<div class="spotlight-row">'+cards+'</div>'
    +'</div>';
}

function makeSection(title,items,type){
  if(!items||!items.length)return'';
  var cards=items.slice(0,14).map(function(d){return makeCard(d,type||d.media_type||'movie',false);}).join('');
  return '<div class="section">'
    +'<div class="sec-head"><div class="sec-title"><span class="sec-title-accent"></span>'+title+'</div>'
    +'<div class="sec-more" onclick="go(\''+mapTypeToPage(type)+'\')">See all</div>'
    +'</div>'
    +'<div class="cards-row">'+cards+'</div>'
    +'</div>';
}

function mapTypeToPage(type){
  return type==='movie'?'movies':'series';
}

function makeCard(d,type,wide){
  var id=d.id,
      title=xe(d.title||d.name||''),
      poster=iurl(d.poster_path||(wide?d.backdrop_path:''),'w342'),
      yr=(d.release_date||d.first_air_date||'').slice(0,4),
      rating=d.vote_average?d.vote_average.toFixed(1):'';
  var mt=d.media_type||(type==='tv'?'tv':'movie');
  var isNew=yr>='2025';
  return '<div class="card'+(wide?' card-wide':'')+'" onclick="openDetail('+id+',\''+mt+'\')">'
    +'<div class="card-img-wrap">'
    +(poster?'<img class="card-img" src="'+poster+'" loading="lazy" alt="'+title+'">'
      :'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:10px;font-size:10px;color:var(--muted);text-align:center">'+title+'</div>')
    +(rating?'<div class="card-rating">&#9733; '+rating+'</div>':'')
    +(isNew?'<div class="card-new-badge">NEW</div>':'')
    +'<div class="card-overlay"><div class="card-play-ring">&#9654;</div></div>'
    +'</div>'
    +'<div class="card-title">'+title+'</div>'
    +'<div class="card-meta">'+(yr?'<span>'+yr+'</span>':'')+(yr&&mt?'<span class="card-meta-dot"></span>':'')+(mt?'<span>'+(mt==='movie'?'Movie':'TV')+'</span>':'')+'</div>'
    +'</div>';
}

/* ═══ BROWSE ═══ */
var GENRES_MV=[{id:'',n:'All'},{id:'28',n:'Action'},{id:'35',n:'Comedy'},{id:'18',n:'Drama'},{id:'27',n:'Horror'},{id:'10749',n:'Romance'},{id:'878',n:'Sci-Fi'},{id:'53',n:'Thriller'},{id:'16',n:'Animation'},{id:'12',n:'Adventure'},{id:'80',n:'Crime'},{id:'14',n:'Fantasy'}];
var GENRES_TV=[{id:'',n:'All'},{id:'10759',n:'Action'},{id:'35',n:'Comedy'},{id:'18',n:'Drama'},{id:'9648',n:'Mystery'},{id:'10765',n:'Sci-Fi'},{id:'10764',n:'Reality'},{id:'10762',n:'Kids'},{id:'10766',n:'Soap'},{id:'37',n:'Western'}];

function loadBrowse(pg){
  var genres=pg==='movies'?GENRES_MV:GENRES_TV;
  var rowId=pg==='movies'?'mv-sort-row':pg==='series'?'sr-sort-row':pg==='anime'?'an-sort-row':'ct-sort-row';
  var gid=pg==='movies'?'mv-grid':pg==='series'?'sr-grid':pg==='anime'?'an-grid':'ct-grid';
  var state=filterState[pg];
  ge(rowId).innerHTML=genres.map(function(g){
    var active=(!state.genres.length&&g.id==='')||(state.genres.indexOf(g.id)>=0&&g.id!=='');
    return '<button class="sort-tab'+(active?' active':'')+'" onclick="quickGenre(\''+pg+'\',\''+g.id+'\',this)">'+g.n+'</button>';
  }).join('');
  updateFilterBtnState(pg);
  browseItems[pg]=[];browsePage2[pg]=1;
  ge(gid).innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  fetchBrowse(pg,1);
}

function quickGenre(pg,gid,btn){
  var state=filterState[pg];
  if(gid===''){state.genres=[];}
  else{
    var idx=state.genres.indexOf(gid);
    if(idx>=0)state.genres.splice(idx,1);else state.genres.push(gid);
  }
  loadBrowse(pg);
}

function buildBrowseParams(pg,pageNum){
  var state=filterState[pg];
  var params={sort_by:state.sort,page:pageNum,'vote_count.gte':'20'};
  if(pg==='anime'){params.with_genres='16';params.with_keywords='210024|287501';}
  else if(pg==='cartoons'){
    params.with_genres='16';
    params.without_keywords='210024|287501';
    params.with_original_language='en';
  }
  else if(state.genres.length)params.with_genres=state.genres.join(',');
  if(state.country)params.with_origin_country=state.country;
  if(state.year){
    if(pg==='movies')params.primary_release_year=state.year;
    else params.first_air_date_year=state.year;
  }
  return params;
}

function fetchBrowse(pg,pageNum){
  var path=pg==='movies'?'/discover/movie':'/discover/tv';
  var params=buildBrowseParams(pg,pageNum);
  var gid=pg==='movies'?'mv-grid':pg==='series'?'sr-grid':pg==='anime'?'an-grid':'ct-grid';
  var type=pg==='movies'?'movie':'tv';
  tmdb(path,params).then(function(d){
    var items=d.results||[];
    if(pageNum===1)browseItems[pg]=items;
    else browseItems[pg]=browseItems[pg].concat(items);
    var cards=browseItems[pg].map(function(item){return makeCard(item,type,false);}).join('');
    var hasMore=d.page<d.total_pages&&d.page<8;
    ge(gid).innerHTML=cards
      +(hasMore?'<div class="load-more-wrap"><button class="load-more-btn" onclick="loadMoreBrowse(\''+pg+'\')">Load More</button></div>':'');
    if(!cards)ge(gid).innerHTML='<div class="empty">Nothing found. Try changing filters.</div>';
  }).catch(function(){
    ge(gid).innerHTML='<div class="empty">Failed to load. Check connection.</div>';
  });
}

function loadMoreBrowse(pg){
  browsePage2[pg]++;
  var gid=pg==='movies'?'mv-grid':pg==='series'?'sr-grid':pg==='anime'?'an-grid':'ct-grid';
  var lmw=ge(gid).querySelector('.load-more-wrap');if(lmw)lmw.remove();
  fetchBrowse(pg,browsePage2[pg]);
}

function updateFilterBtnState(pg){
  var btnId=pg+'-filter-btn';if(pg==='series')btnId='sr-filter-btn';else if(pg==='anime')btnId='an-filter-btn';else if(pg==='cartoons')btnId='ct-filter-btn';else btnId='mv-filter-btn';
  var btn=ge(btnId);if(!btn)return;
  var s=filterState[pg];
  var hasFilter=s.genres.length>0||s.country||s.year;
  btn.classList.toggle('has-filter',hasFilter);
}

/* ═══ FILTER DRAWER ═══ */
function openFilter(pg){
  curFilterPage=pg;
  renderFilterDrawer(pg);
  ge('filter-drawer').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeFilter(){
  ge('filter-drawer').classList.remove('open');
  document.body.style.overflow='';
}
function applyFilter(){
  closeFilter();
  loadBrowse(curFilterPage);
}
function resetFilter(){
  filterState[curFilterPage]={
    sort:curFilterPage==='movies'?'popularity.desc':'first_air_date.desc',
    genres:[],country:'',year:''
  };
  closeFilter();
  loadBrowse(curFilterPage);
}
function renderFilterDrawer(pg){
  var s=filterState[pg];
  var sorts=pg==='movies'?[
    {v:'popularity.desc',l:'Most Popular'},{v:'vote_average.desc',l:'Top Rated'},
    {v:'release_date.desc',l:'Newest'},{v:'revenue.desc',l:'Box Office'},
  ]:[
    {v:'first_air_date.desc',l:'Newest'},{v:'popularity.desc',l:'Most Popular'},
    {v:'vote_average.desc',l:'Top Rated'},
  ];
  var genres=pg==='movies'?GENRES_MV.slice(1):GENRES_TV.slice(1);
  var years=[];for(var y=2026;y>=1970;y--)years.push(y);
  var countries=[{v:'',l:'Any'},{v:'US',l:'USA'},{v:'GB',l:'UK'},{v:'KR',l:'Korea'},{v:'JP',l:'Japan'},{v:'IN',l:'India'},{v:'FR',l:'France'},{v:'AU',l:'Australia'}];
  var h='<div class="fd-sec-title">Sort By</div>';
  h+='<div class="fd-chips">'+sorts.map(function(so){
    return '<button class="fd-chip sort-chip'+(s.sort===so.v?' selected':'')+'" onclick="setSort(\''+pg+'\',\''+so.v+'\',this)">'+so.l+'</button>';
  }).join('')+'</div>';
  if(pg!=='anime'&&pg!=='cartoons'){
    h+='<div class="fd-sec-title">Genres</div>';
    h+='<div class="fd-chips">'+genres.map(function(g){
      return '<button class="fd-chip'+(s.genres.indexOf(g.id)>=0?' selected':'')+'" onclick="toggleFDGenre(\''+pg+'\',\''+g.id+'\',this)">'+g.n+'</button>';
    }).join('')+'</div>';
  }
  h+='<div class="fd-sec-title">Country of Origin</div>';
  h+='<div class="fd-chips">'+countries.map(function(co){
    return '<button class="fd-chip'+(s.country===co.v?' selected':'')+'" onclick="setFDCountry(\''+pg+'\',\''+co.v+'\',this)">'+co.l+'</button>';
  }).join('')+'</div>';
  h+='<div class="fd-sec-title">Release Year</div>';
  h+='<select class="fd-select" onchange="setFDYear(\''+pg+'\',this.value)"><option value="">Any Year</option>';
  years.forEach(function(y){h+='<option value="'+y+'"'+(s.year==y?' selected':'')+'>'+y+'</option>';});
  h+='</select>';
  ge('fd-body').innerHTML=h;
}
function setSort(pg,val,btn){
  filterState[pg].sort=val;
  if(btn){
    btn.closest('.fd-chips').querySelectorAll('.sort-chip').forEach(function(b){b.classList.remove('selected');});
    btn.classList.add('selected');
  }
}
function toggleFDGenre(pg,gid,btn){
  var s=filterState[pg];
  var idx=s.genres.indexOf(gid);
  if(idx>=0)s.genres.splice(idx,1);else s.genres.push(gid);
  if(btn)btn.classList.toggle('selected',s.genres.indexOf(gid)>=0);
}
function setFDCountry(pg,val,btn){
  filterState[pg].country=val;
  if(btn){
    btn.closest('.fd-chips').querySelectorAll('.fd-chip').forEach(function(b){b.classList.remove('selected');});
    btn.classList.add('selected');
  }
}
function setFDYear(pg,val){filterState[pg].year=val;}

/* ═══ DETAIL ═══ */
function openDetail(id,type){
  prevPage=curPage;
  pType=type;pId=id;pEpS=1;pEpE=1;pSrv=0;pIsAnime=false;pDubMode=false;
  go('detail',true);
  ge('d-backdrop').src='';ge('d-poster').src='';
  ge('d-title').textContent='Loading...';
  ge('d-chips').innerHTML='';ge('d-tagline').textContent='';
  ge('d-overview').textContent='';ge('d-btns').innerHTML='';
  ge('d-tabs').innerHTML='';
  ge('d-tab-content').innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  var dubEl=ge('dub-toggle');if(dubEl)dubEl.style.display='none';
  tmdb('/'+type+'/'+id,{append_to_response:'credits,videos,similar,seasons'}).then(function(d){
    curDetail=d;curDetailType=type;
    pTitle=d.title||d.name||'';
    var vids=d.videos&&d.videos.results?d.videos.results:[];
    var trailer=vids.find(function(v){return v.site==='YouTube'&&v.type==='Trailer';});
    pYTKey=trailer?trailer.key:'';
    var isAnime=(d.original_language==='ja'&&type==='tv')||
      ((d.genres||[]).some(function(g){return g.id===16;})&&d.original_language==='ja');
    pIsAnime=isAnime;
    if(d.backdrop_path)ge('d-backdrop').src=iurl(d.backdrop_path,'w1280');
    if(d.poster_path)ge('d-poster').src=iurl(d.poster_path,'w342');
    else ge('d-poster').parentElement.style.display='none';
    ge('d-title').textContent=pTitle;
    var yr=(d.release_date||d.first_air_date||'').slice(0,4);
    var runtime=d.runtime?d.runtime+'m':(d.episode_run_time&&d.episode_run_time[0]?d.episode_run_time[0]+'m/ep':'');
    var chips='';
    if(d.vote_average)chips+='<span class="chip gold">&#9733; '+d.vote_average.toFixed(1)+'</span>';
    if(yr)chips+='<span class="chip">'+yr+'</span>';
    if(runtime)chips+='<span class="chip">'+runtime+'</span>';
    if(d.status)chips+='<span class="chip '+(d.status==='Returning Series'?'green':'')+'">'+(d.status==='Returning Series'?'&#128994; ':'')+xe(d.status)+'</span>';
    (d.genres||[]).slice(0,3).forEach(function(g){chips+='<span class="chip">'+xe(g.name)+'</span>';});
    ge('d-chips').innerHTML=chips;
    if(d.tagline)ge('d-tagline').textContent='\u201c'+d.tagline+'\u201d';
    ge('d-overview').textContent=d.overview||'No description available.';
    var inWL=watchlist.some(function(w){return w.id===id;});
    ge('d-btns').innerHTML=
      '<button class="btn btn-red" onclick="startPlay()">&#9654;&nbsp; Watch Now</button>'
      +'<button class="btn btn-ghost" id="wlbtn" onclick="toggleWL()">'+(inWL?'&#10003; Saved':'+ Watchlist')+'</button>'
      +(pYTKey?'<button class="btn btn-ghost btn-sm" onclick="pmTrailer()">&#127909; Trailer</button>':'')
      +(d.homepage?'<a href="'+d.homepage+'" target="_blank" class="btn btn-ghost btn-sm" rel="noopener">Official Site &#8599;</a>':'');
    if(isAnime&&dubEl){
      dubEl.style.display='flex';
      ge('dub-state-lbl').textContent='Sub';
      ge('dub-chk').checked=false;
    }
    var tabs='<button class="tab active" onclick="switchTab(\'overview\',this)">Overview</button>';
    if(type==='tv')tabs+='<button class="tab" onclick="switchTab(\'episodes\',this)">Episodes</button>';
    if(d.credits&&d.credits.cast&&d.credits.cast.length)tabs+='<button class="tab" onclick="switchTab(\'cast\',this)">Cast</button>';
    if(d.similar&&d.similar.results&&d.similar.results.length)tabs+='<button class="tab" onclick="switchTab(\'similar\',this)">Similar</button>';
    ge('d-tabs').innerHTML=tabs;
    showDetailTab('overview',d);
  }).catch(function(){
    ge('d-title').textContent='Failed to load';
    ge('d-tab-content').innerHTML='<div class="empty">Could not load details. Please check your connection.</div>';
  });
}

function toggleDub(checked){
  pDubMode=checked;
  var lbl=ge('dub-state-lbl');
  if(lbl){lbl.textContent=pDubMode?'DUB':'SUB';lbl.className='dub-state '+(pDubMode?'on':'off');}
  toast(pDubMode?'&#127482;&#127480; English Dub mode':'&#127471;&#127477; Japanese Sub mode');
}

function switchTab(name,btn){
  document.querySelectorAll('#d-tabs .tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  showDetailTab(name,curDetail);
}

function showDetailTab(name,d){
  var h='';
  if(name==='overview'){
    var crew=d.credits&&d.credits.crew?d.credits.crew:[];
    var dir=crew.find(function(c){return c.job==='Director';});
    var cre=crew.find(function(c){return c.job==='Executive Producer'||c.job==='Creator';});
    h='<div style="display:grid;gap:8px;margin-bottom:18px">';
    if(dir)h+='<div style="font-size:12px;color:var(--muted)">Director &nbsp;<b style="color:var(--text)">'+xe(dir.name)+'</b></div>';
    if(cre)h+='<div style="font-size:12px;color:var(--muted)">Creator &nbsp;<b style="color:var(--text)">'+xe(cre.name)+'</b></div>';
    if(d.production_companies&&d.production_companies.length)
      h+='<div style="font-size:12px;color:var(--muted)">Studio &nbsp;<b style="color:var(--text)">'+xe(d.production_companies[0].name)+'</b></div>';
    if(d.number_of_seasons)
      h+='<div style="font-size:12px;color:var(--muted)">Seasons &nbsp;<b style="color:var(--text)">'+d.number_of_seasons+'</b></div>';
    if(d.number_of_episodes)
      h+='<div style="font-size:12px;color:var(--muted)">Episodes &nbsp;<b style="color:var(--text)">'+d.number_of_episodes+'</b></div>';
    h+='</div>';
  }else if(name==='episodes'){
    var seas=(d.seasons||[]).filter(function(s){return s.season_number>0;});
    h='<div class="season-select" id="seas-btns">'
      +seas.map(function(s){return '<button class="seas-btn'+(s.season_number===1?' active':'')+'" onclick="loadSeasonEps('+s.season_number+',this)">S'+s.season_number+'</button>';}).join('')
      +'</div><div id="ep-list"><div class="spinwrap"><div class="spinner"></div></div></div>';
    ge('d-tab-content').innerHTML=h;
    if(seas.length)loadSeasonEps(1,null);
    return;
  }else if(name==='cast'){
    var cast=(d.credits&&d.credits.cast?d.credits.cast:[]).slice(0,32);
    h='<p style="font-size:11px;color:var(--muted);margin-bottom:14px">&#128072; Tap a cast member to explore their filmography</p>';
    h+='<div class="cast-row">'+cast.map(function(c){
      var img=c.profile_path?iurl(c.profile_path,'w185'):'';
      return '<div class="cast-card" onclick="openActorProfile('+c.id+',\''+xe(c.name)+'\')">'
        +'<div class="cast-img-wrap">'
        +(img?'<img class="cast-img" src="'+img+'" loading="lazy" alt="'+xe(c.name)+'">'
          :'<div style="display:flex;align-items:center;justify-content:center;font-size:22px;width:100%;height:100%;background:var(--bg4)">&#128100;</div>')
        +'<div class="cast-img-overlay">&#9654;</div>'
        +'</div>'
        +'<div class="cast-name">'+xe(c.name)+'</div>'
        +'<div class="cast-role">'+xe(c.character||'')+'</div>'
        +'</div>';
    }).join('')+'</div>';
  }else if(name==='similar'){
    var sim=(d.similar&&d.similar.results?d.similar.results:[]).slice(0,12);
    h='<div class="sim-grid">'+sim.map(function(s){return makeCard(s,curDetailType,false);}).join('')+'</div>';
  }
  ge('d-tab-content').innerHTML=h;
}

function loadSeasonEps(season,btn){

        +'<div class="ep-thumb-play">&#9654;</div>'

    ge('ep-list').innerHTML='<div class="empty">Failed to load episodes.</div>';

/* ═══ ACTOR PROFILE ═══ */
function openActorProfile(actorId,actorName){
  curActorId=actorId;actorFilter='all';

  if(!ap){
    var div=document.createElement('div');
    div.id='actor-page';
    div.style.cssText='display:flex;position:fixed;inset:0;z-index:7000;background:var(--bg);overflow-y:auto;flex-direction:column;';

      +'<button onclick="closeActorProfile()" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--text);width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;">&#8592;</button>'
      +'<div id="actor-name" style="font-size:16px;font-weight:800;font-family:\'Syne\',sans-serif;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1"></div></div>'
      +'<div id="actor-body" style="padding:20px"><div class="spinwrap"><div class="spinner"></div></div></div>';

function closeActorProfile(){
  var ap=ge('actor-page');if(ap)ap.style.display='none';
  document.body.style.overflow='';curActorId=null;
}
function renderActorBody(p,credits){
  var body=ge('actor-body');if(!body)return;
  var all=(credits.cast||[]).filter(function(c){return c.poster_path;}).sort(function(a,b){return(b.vote_count||0)-(a.vote_count||0);});
  var filtered=actorFilter==='all'?all:all.filter(function(c){return c.media_type===actorFilter;});
  var mvCount=all.filter(function(c){return c.media_type==='movie';}).length;
  var tvCount=all.filter(function(c){return c.media_type==='tv';}).length;
  var h='';
  if(p.profile_path)h+='<div style="text-align:center;margin-bottom:18px"><img src="'+iurl(p.profile_path,'w342')+'" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--red);box-shadow:0 0 20px rgba(229,9,26,.3)"></div>';
  if(p.biography){
    h+='<div id="actor-bio-text" class="actor-bio collapsed">'+xe(p.biography)+'</div>';
    h+='<button onclick="toggleActorBio()" style="font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;margin:6px 0 18px;display:block">Read more &#8964;</button>';
  }
  var chips='';
  if(p.birthday)chips+='<span class="chip">&#127874; '+p.birthday+'</span>';
  if(p.place_of_birth)chips+='<span class="chip">&#127981; '+xe(p.place_of_birth)+'</span>';
  if(p.known_for_department)chips+='<span class="chip">'+xe(p.known_for_department)+'</span>';
  if(chips)h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px">'+chips+'</div>';
  h+='<div style="font-size:14px;font-weight:800;margin-bottom:12px;font-family:\'Syne\',sans-serif">Filmography</div>';
  h+='<div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:16px;scrollbar-width:none">';
  h+='<button class="sort-tab'+(actorFilter==='all'?' active':'')+'" onclick="switchActorFilter(\'all\')">All ('+all.length+')</button>';
  h+='<button class="sort-tab'+(actorFilter==='movie'?' active':'')+'" onclick="switchActorFilter(\'movie\')">Movies ('+mvCount+')</button>';
  h+='<button class="sort-tab'+(actorFilter==='tv'?' active':'')+'" onclick="switchActorFilter(\'tv\')">Series ('+tvCount+')</button>';
  h+='</div>';
  if(!filtered.length){h+='<div class="empty">No credits found.</div>';}
  else{
    h+='<div class="sim-grid">';
    filtered.slice(0,60).forEach(function(cr){
      var t=xe(cr.title||cr.name||''),mt=cr.media_type||'movie';
      var yr=(cr.release_date||cr.first_air_date||'').slice(0,4);
      var rat=cr.vote_average?cr.vote_average.toFixed(1):'';
      h+='<div class="card" onclick="closeActorProfile();openDetail('+cr.id+',\''+mt+'\')">';
      h+='<div class="card-img-wrap">';
      h+='<img class="card-img" src="'+iurl(cr.poster_path,'w342')+'" loading="lazy" alt="'+t+'">';
      if(rat)h+='<div class="card-rating">&#9733; '+rat+'</div>';
      h+='<div class="card-overlay"><div class="card-play-ring">&#9654;</div></div>';
      h+='</div><div class="card-title">'+t+'</div>';
      h+='<div class="card-meta">'+(yr?'<span>'+yr+'</span>':'')+'<span class="card-meta-dot"></span><span>'+(mt==='movie'?'Movie':'TV')+'</span></div>';
      h+='</div>';
    });
    h+='</div>';
  }
  body.innerHTML=h;
}
function switchActorFilter(f){
  actorFilter=f;
  if(curActorId){
    var body=ge('actor-body');if(body)body.innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
    Promise.all([tmdb('/person/'+curActorId),tmdb('/person/'+curActorId+'/combined_credits')])
      .then(function(rs){renderActorBody(rs[0],rs[1]);});
  }
}
function toggleActorBio(){
  var el=ge('actor-bio-text');var btn=el&&el.nextElementSibling;if(!el)return;
  var expanded=!el.classList.contains('collapsed');
  el.classList.toggle('collapsed',expanded);
  if(btn)btn.textContent=expanded?'Read more &#8964;':'Show less &#8963;';
}
var actorBioStyle=document.createElement('style');
actorBioStyle.textContent='.actor-bio{font-size:13px;line-height:1.7;color:var(--muted);margin-bottom:4px}.actor-bio.collapsed{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}';
document.head.appendChild(actorBioStyle);

/* ═══ PLAY ═══ */
function startPlay(){pSrv=0;pEpS=1;pEpE=1;openPlayer(getSrcs(pType,pId,1,1)[0],0,null);}
function playEp(s,e){pEpS=s;pEpE=e;pSrv=0;pmCloseEps();openPlayer(getSrcs('tv',pId,s,e)[0],0,'S'+s+' E'+e);}

/* ═══ PLAYER ═══ */
function openPlayer(src,srvIdx,epInfo){
  window.open=function(){return null;};
  try{if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(function(){});}catch(e){}
  ge('pm-iframe').src=src;
  ge('pm-title').textContent=pTitle||'Now Playing';
  var epBadge=ge('pm-ep-badge');
  if(epInfo){epBadge.textContent=epInfo;epBadge.style.display='block';}else epBadge.style.display='none';
  ge('pm-srv-row').innerHTML=SRVN.map(function(n,i){
    return '<button class="pm-srv'+(i===srvIdx?' active':'')+'" onclick="switchSrv('+i+')">'
      +'<span class="pm-srv-dot"></span>'+n+'</button>';
  }).join('');
  var epBtn=ge('pm-ep-btn');if(epBtn)epBtn.style.display=pType==='tv'?'inline-flex':'none';
  var trlBtn=ge('pm-trl-btn');if(trlBtn)trlBtn.style.display=pYTKey?'inline-flex':'none';
  ge('player-modal').classList.add('open');
  document.body.style.overflow='hidden';
  pmShowControls();pmAutoHide();
  installAB();
}
function closePlayer(){
  ge('pm-iframe').src='';
  ge('player-modal').classList.remove('open');
  pmCloseEps();
  document.body.style.overflow='';
  try{if(screen.orientation&&screen.orientation.unlock)screen.orientation.unlock();}catch(e){}
}
function switchSrv(idx){
  pSrv=idx;
  ge('pm-iframe').src=getSrcs(pType,pId,pEpS,pEpE)[idx];
  document.querySelectorAll('.pm-srv').forEach(function(b,i){b.classList.toggle('active',i===idx);});
  pmShowControls();
  toast(SRVN[idx]+' loading...');
}
function pmNextSrv(){var n=(pSrv+1)%SRVN.length;switchSrv(n);}
function pmTrailer(){if(pYTKey)openPlayer('https://www.youtube.com/embed/'+pYTKey+'?autoplay=1&rel=0',-1,'Trailer');}
function pmShowControls(){
  pmVisible=true;
  var tb=ge('pm-topbar'),bb=ge('pm-bottombar');
  if(tb)tb.classList.remove('hidden');if(bb)bb.classList.remove('hidden');
  pmAutoHide();
}
function pmHideControls(){
  pmVisible=false;
  var tb=ge('pm-topbar'),bb=ge('pm-bottombar');
  if(tb)tb.classList.add('hidden');if(bb)bb.classList.add('hidden');
}
function pmAutoHide(){clearTimeout(pmHideT);pmHideT=setTimeout(pmHideControls,5000);}
function pmUnmute(){
  var iframe=ge('pm-iframe');var src=iframe.src;
  if(src.indexOf('muted=true')>=0)src=src.replace('muted=true','muted=false');
  else if(src.indexOf('muted=false')<0)src+=(src.indexOf('?')>=0?'&':'?')+'muted=false';
  iframe.src=src;
  var btn=ge('pm-unmute-btn');if(btn)btn.style.display='none';
}
function pmFullscreen(){
  var el=ge('player-modal');
  if(el.requestFullscreen)el.requestFullscreen();
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  try{if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(function(){});}catch(e){}
}
function pmOpenEps(){
  var panel=ge('pm-ep-panel');if(!panel)return;
  ge('pm-ep-show').textContent=pTitle;
  var d=curDetail;
  var seas=d&&d.seasons?d.seasons.filter(function(s){return s.season_number>0;}):[];
  ge('pm-seasons').innerHTML=seas.map(function(s){
    return '<button class="seas-btn'+(s.season_number===pmSeason?' active':'')+'" onclick="pmLoadSeason('+s.season_number+',this)">S'+s.season_number+'</button>';
  }).join('');
  panel.classList.add('open');pmLoadSeason(pmSeason,null);
}
function pmCloseEps(){var p=ge('pm-ep-panel');if(p)p.classList.remove('open');}
function pmLoadSeason(s,btn){
  pmSeason=s;
  if(btn){document.querySelectorAll('#pm-seasons .seas-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');}
  ge('pm-ep-list').innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  tmdb('/tv/'+pId+'/season/'+s).then(function(d){
    ge('pm-ep-list').innerHTML=(d.episodes||[]).map(function(ep){
      var active=s===pEpS&&ep.episode_number===pEpE;
      return '<div class="ep-item'+(active?' active-ep':'')+'" onclick="playEp('+s+','+ep.episode_number+')">'
        +'<div class="ep-thumb" style="width:72px">'
        +(ep.still_path?'<img src="'+iurl(ep.still_path,'w185')+'" loading="lazy" alt="">':'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg4)">&#127916;</div>')
        +'<div class="ep-thumb-play">&#9654;</div></div>'
        +'<div class="ep-info"><div class="ep-num">S'+s+' · E'+ep.episode_number+'</div>'
        +'<div class="ep-name">'+xe(ep.name||'Episode '+ep.episode_number)+'</div></div>'
        +(active?'<div style="color:var(--red);font-size:20px;padding-right:4px">&#9654;</div>':'')
        +'</div>';
    }).join('')||'<div class="empty">No episodes.</div>';
  });
}

/* ═══ WATCHLIST ═══ */
function toggleWL(){
  var idx=watchlist.findIndex(function(w){return w.id===pId;});
  if(idx>=0){watchlist.splice(idx,1);toast('&#10007; Removed from watchlist',true);}
  else{watchlist.push({id:pId,type:pType,title:pTitle,poster:curDetail?curDetail.poster_path:'',rating:curDetail?curDetail.vote_average:0});toast('&#10003; Added to watchlist',false,true);}
  try{localStorage.setItem('fw_wl2',JSON.stringify(watchlist));}catch(e){}
  updateWLCount();
  var btn=ge('wlbtn');if(btn)btn.textContent=watchlist.some(function(w){return w.id===pId;})?'&#10003; Saved':'+ Watchlist';
}
function clearWatchlist(){
  if(!watchlist.length)return;
  watchlist=[];
  try{localStorage.setItem('fw_wl2','[]');}catch(e){}
  updateWLCount();renderWL();toast('Watchlist cleared');
}
function updateWLCount(){
  var el=ge('wl-count-badge');if(el)el.textContent=watchlist.length;
}
function renderWL(){
  if(!watchlist.length){
    ge('wl-grid').innerHTML='<div class="wl-empty" style="grid-column:1/-1"><span class="wl-empty-icon">&#128278;</span><div style="font-size:15px;font-weight:700;margin-bottom:6px">Your watchlist is empty</div><div style="font-size:12px">Find something great and save it here</div></div>';
    return;
  }
  ge('wl-grid').innerHTML=watchlist.map(function(w){
    return makeCard({id:w.id,title:w.title,name:w.title,poster_path:w.poster,vote_average:w.rating,media_type:w.type},w.type,false);
  }).join('');
}

/* ═══ SEARCH ═══ */
var searchDebounce=null;
function doSearch(q){
  var clr=ge('sclr');if(clr)clr.className=q?'show':'';
  clearTimeout(searchDebounce);
  if(!q){if(curPage==='search')go('home',true);return;}
  searchDebounce=setTimeout(function(){
    go('search',true);
    ge('sr-title').textContent='Results for "'+q+'"';
    ge('sr-grid2').innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
    tmdb('/search/multi',{query:q}).then(function(d){
      var res=(d.results||[]).filter(function(r){return r.media_type==='movie'||r.media_type==='tv';});
      if(!res.length){ge('sr-grid2').innerHTML='<div class="empty">No results for "'+xe(q)+'"</div>';return;}
      ge('sr-grid2').innerHTML=res.map(function(r){return makeCard(r,r.media_type,false);}).join('');
    });
  },380);
}
function clearSearch(){
  ge('sinput').value='';ge('sclr').className='';
  if(curPage==='search')go('home',true);
}

/* ═══ AD SHIELD ═══ */
function installAB(){
  if(window._abOn)return;window._abOn=true;
  var orig=window.open;
  window.open=function(url){
    if(!url)return null;
    var safe=['youtube','youtu.be','tmdb','vidsrc','vidlink','videasy','vidfast','embed.su','multiembed','goojara','soaper','archive.org'];
    if(safe.some(function(d){return url.indexOf(d)>=0;}))return orig.apply(window,arguments);
    toast('&#128737; Ad blocked!');return{closed:false,close:function(){},focus:function(){}};
  };
  window.addEventListener('beforeunload',function(e){
    if(ge('player-modal')&&ge('player-modal').classList.contains('open')){
      e.preventDefault();e.returnValue='';return'';
    }
  });
}

/* ═══ TOAST ═══ */
var toastT;
function toast(msg,isError,isSuccess){
  var t=ge('toast');
  t.innerHTML=msg;
  t.className='on'+(isError?' toast-error':isSuccess?' toast-success':'');
  clearTimeout(toastT);
  toastT=setTimeout(function(){t.className='';},2600);
}

/* ═══ KEYBOARD NAV ═══ */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(ge('pm-ep-panel')&&ge('pm-ep-panel').classList.contains('open'))pmCloseEps();
    else if(ge('player-modal')&&ge('player-modal').classList.contains('open'))closePlayer();
    else if(ge('filter-drawer')&&ge('filter-drawer').classList.contains('open'))closeFilter();
    else if(ge('actor-page')&&ge('actor-page').style.display==='flex')closeActorProfile();
  }
  if(e.key==='f'&&ge('player-modal')&&ge('player-modal').classList.contains('open'))pmFullscreen();
});

/* ═══ PLAYER TOUCH TO SHOW CONTROLS ═══ */
var pmIframeWrap=ge('pm-iframe-wrap');
if(pmIframeWrap){
  pmIframeWrap.addEventListener('click',function(){pmShowControls();},false);
}

/* ═══ INIT ═══ */
updateWLCount();
loadHome();
ge('nav').classList.toggle('scrolled',window.scrollY>10);
</script>
</body>
</html>
