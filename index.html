<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Feng World</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --red:#e5091a;--red2:#ff2d3f;
  --bg:#07070f;--bg2:#0d0d1a;--bg3:#12121f;--bg4:#1a1a2a;
  --text:#f0f0f8;--muted:rgba(240,240,248,.45);--bdr:rgba(255,255,255,.08);
  --card-r:14px;--nav-h:64px;
  --font:'Space Grotesk',sans-serif;--font2:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(229,9,26,.4);border-radius:2px}

/* ── NAV ── */
#nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:500;
  display:flex;align-items:center;padding:0 20px;gap:16px;
  background:linear-gradient(to bottom,rgba(7,7,15,.98),rgba(7,7,15,.85));
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-icon{
  width:36px;height:36px;background:var(--red);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(229,9,26,.5);
  font-size:16px;font-weight:900;color:#fff;
}
.logo-txt{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  color:var(--text);
}
.logo-txt span{color:var(--red)}
.nav-links{display:flex;gap:4px;flex:1}
.nav-link{
  padding:7px 12px;border-radius:8px;font-size:13px;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all .2s;border:none;
  background:none;font-family:var(--font);white-space:nowrap;
}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,.06)}
.nav-link.active{color:#fff;background:rgba(229,9,26,.18);border:1px solid rgba(229,9,26,.3)}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.wl-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  color:var(--text);border-radius:10px;padding:7px 12px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;white-space:nowrap;
}
.wl-btn:hover{background:rgba(255,255,255,.12)}

/* ── SEARCH BAR ── */
#searchbar{
  position:fixed;top:var(--nav-h);left:0;right:0;z-index:490;
  padding:8px 16px 10px;
  background:rgba(7,7,15,.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.search-inner{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.09);
  border-radius:12px;padding:10px 14px;
  transition:all .25s;
}
.search-inner:focus-within{
  border-color:rgba(229,9,26,.5);
  background:rgba(229,9,26,.05);
  box-shadow:0 0 0 3px rgba(229,9,26,.08);
}
.search-inner svg{flex-shrink:0;opacity:.4}
#sinput{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;font-family:var(--font);font-weight:500;
}
#sinput::placeholder{color:var(--muted)}
#sclr{
  background:rgba(255,255,255,.1);border:none;color:var(--text);
  width:20px;height:20px;border-radius:50%;font-size:13px;
  display:none;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;
}
#sclr.show{display:flex}

/* ── PAGES ── */
.page{display:none;padding-top:calc(var(--nav-h) + 56px)}
.page.active{display:block}

/* ── HERO ── */
.hero{
  position:relative;height:calc(100vw * 0.56);min-height:240px;max-height:520px;
  overflow:hidden;
}
.hero-img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:opacity .6s;
}
.hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,rgba(7,7,15,.7) 40%,rgba(7,7,15,.2) 100%),
             linear-gradient(to right,rgba(7,7,15,.8) 0%,transparent 60%);
}
.hero-content{
  position:absolute;bottom:0;left:0;right:0;padding:20px 20px 28px;
  transform:translateY(0);transition:all .4s;
}
.hero-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.hero-badge{
  background:rgba(229,9,26,.85);border-radius:5px;
  padding:3px 8px;font-size:10px;font-weight:800;letter-spacing:.5px;
}
.hero-badge.outline{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.8);
}
.hero-title{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,52px);
  letter-spacing:2px;line-height:1;margin-bottom:8px;
  text-shadow:0 2px 20px rgba(0,0,0,.8);
}
.hero-desc{
  font-size:12px;color:rgba(240,240,248,.7);line-height:1.5;
  max-width:320px;margin-bottom:14px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.hero-btns{display:flex;gap:8px;flex-wrap:wrap}
.hero-dots{
  position:absolute;bottom:8px;right:16px;display:flex;gap:5px;z-index:2;
}
.hero-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.3);cursor:pointer;transition:all .3s;
}
.hero-dot.active{background:var(--red);width:18px;border-radius:3px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  border-radius:10px;padding:10px 18px;
  font-size:13px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;border:none;
  white-space:nowrap;
}
.btn-red{
  background:var(--red);color:#fff;
  box-shadow:0 4px 16px rgba(229,9,26,.4);
}
.btn-red:hover{background:var(--red2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(229,9,26,.5)}
.btn-ghost{
  background:rgba(255,255,255,.1);color:var(--text);
  border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(10px);
}
.btn-ghost:hover{background:rgba(255,255,255,.18)}
.btn-green{
  background:rgba(0,200,80,.15);color:#00c850;
  border:1px solid rgba(0,200,80,.3);
}
.btn-green:hover{background:rgba(0,200,80,.25)}
.btn-sm{padding:8px 14px;font-size:12px}

/* ── SECTIONS ── */
.section{margin-bottom:32px}
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;margin-bottom:12px;
}
.sec-title{
  font-size:16px;font-weight:800;letter-spacing:.3px;
  position:relative;
}
.sec-title::before{
  content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:16px;background:var(--red);border-radius:2px;
}
.sec-more{font-size:12px;color:var(--red);cursor:pointer;font-weight:700}

/* ── CARDS ── */
.cards-row{
  display:flex;gap:10px;overflow-x:auto;padding:0 16px 8px;
  scrollbar-width:none;
}
.cards-row::-webkit-scrollbar{display:none}
.card{
  flex-shrink:0;width:120px;cursor:pointer;
  transition:transform .25s;
}
.card:hover{transform:scale(1.04)}
.card-img-wrap{
  position:relative;border-radius:var(--card-r);overflow:hidden;
  aspect-ratio:2/3;background:var(--bg3);margin-bottom:7px;
}
.card-img{width:100%;height:100%;object-fit:cover;display:block}
.card-img-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 50%);
  opacity:0;transition:opacity .2s;
}
.card:hover .card-img-wrap::after{opacity:1}
.card-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:1;opacity:0;transition:opacity .2s;
}
.card:hover .card-play{opacity:1}
.card-play-icon{
  width:40px;height:40px;background:rgba(229,9,26,.9);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;box-shadow:0 4px 16px rgba(229,9,26,.5);
}
.card-rating{
  position:absolute;top:6px;left:6px;z-index:1;
  background:rgba(0,0,0,.75);border-radius:5px;
  padding:2px 6px;font-size:10px;font-weight:700;color:#ffd700;
}
.card-new{
  position:absolute;top:6px;right:6px;z-index:1;
  background:var(--red);border-radius:5px;
  padding:2px 5px;font-size:9px;font-weight:800;letter-spacing:.3px;
}

  50%    { box-shadow:0 2px 16px rgba(255,100,0,.85); }
}
.card-title{font-size:12px;font-weight:600;line-height:1.3;color:var(--text)}
.card-meta{font-size:10px;color:var(--muted);margin-top:2px}

/* Wide cards for landscape */
.card-wide{width:170px}
.card-wide .card-img-wrap{aspect-ratio:16/9}

/* ── BROWSE PAGE ── */
.browse-filters{
  display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;
  scrollbar-width:none;
}
.browse-filters::-webkit-scrollbar{display:none}
.filter-btn{
  flex-shrink:0;padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  color:var(--muted);font-family:var(--font);transition:all .2s;
}
.filter-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  padding:0 16px 20px;
}
.grid .card{width:100%}
/* ── LOAD MORE ── */
.load-more-wrap{
  grid-column:1/-1;
  display:flex;justify-content:center;
  padding:20px 0 40px;
}
.load-more-btn{
  padding:12px 40px;border-radius:24px;
  background:rgba(229,9,26,.15);border:1.5px solid rgba(229,9,26,.4);
  color:var(--red);font-size:13px;font-weight:800;cursor:pointer;
  font-family:var(--font);transition:all .25s;letter-spacing:.5px;
}
.load-more-btn:hover{
  background:var(--red);color:#fff;
  box-shadow:0 4px 20px rgba(229,9,26,.4);transform:translateY(-1px);
}


/* ── DETAIL PAGE ── */
#detail-page{padding-top:0!important}
.detail-back{
  position:fixed;top:16px;left:16px;z-index:600;
  width:38px;height:38px;border-radius:50%;
  background:rgba(7,7,15,.8);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;backdrop-filter:blur(10px);
  transition:all .2s;
}
.detail-back:hover{background:rgba(229,9,26,.3)}
.detail-hero{
  position:relative;height:56vw;min-height:220px;max-height:400px;
  overflow:hidden;
}
.detail-hero-img{width:100%;height:100%;object-fit:cover}
.detail-hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,rgba(7,7,15,.5) 50%,transparent 100%);
}
.detail-body{padding:0 16px;margin-top:-40px;position:relative;z-index:2}
.detail-row{display:flex;gap:14px;margin-bottom:16px}
.detail-poster{
  width:90px;flex-shrink:0;border-radius:10px;overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.1);
}
.detail-poster img{width:100%;display:block}
.detail-info{flex:1;padding-top:8px;min-width:0}
.detail-title{font-size:20px;font-weight:800;line-height:1.2;margin-bottom:6px}
.detail-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.chip{
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--muted);
}
.chip.red{background:rgba(229,9,26,.15);border-color:rgba(229,9,26,.3);color:var(--red)}
.chip.gold{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.3);color:#ffd700}
.detail-overview{
  font-size:13px;color:rgba(240,240,248,.72);line-height:1.6;
  margin-bottom:16px;font-family:var(--font2);
}
.detail-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.detail-tagline{
  font-size:13px;font-style:italic;color:var(--red);
  margin-bottom:12px;font-family:var(--font2);
}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bdr);margin-bottom:20px}
.tab{
  padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;
  background:none;border-left:none;border-right:none;border-top:none;
  font-family:var(--font);
}
.tab.active{color:var(--text);border-bottom-color:var(--red)}
.tab-pane{display:none}.tab-pane.active{display:block}

/* Cast */
.cast-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.cast-row::-webkit-scrollbar{display:none}
.cast-card{flex-shrink:0;width:70px;text-align:center}
.cast-img{
  width:62px;height:62px;border-radius:50%;object-fit:cover;margin:0 auto 6px;
  border:2px solid var(--bdr);background:var(--bg3);display:block;
}
.cast-name{font-size:10px;font-weight:600;color:var(--text);line-height:1.3}
.cast-role{font-size:9px;color:var(--muted)}

/* Episodes */
.ep-item{
  display:flex;gap:12px;padding:10px;
  background:var(--bg3);border-radius:10px;margin-bottom:8px;
  cursor:pointer;transition:all .2s;border:1px solid transparent;
}
.ep-item:hover,.ep-item.active-ep{border-color:rgba(229,9,26,.4);background:rgba(229,9,26,.08)}
.ep-thumb{
  width:80px;flex-shrink:0;border-radius:7px;overflow:hidden;
  background:var(--bg4);aspect-ratio:16/9;position:relative;
}
.ep-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.ep-thumb-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(229,9,26,.7);font-size:16px;opacity:0;transition:opacity .2s;
}
.ep-item:hover .ep-thumb-play{opacity:1}
.ep-info{flex:1;min-width:0}
.ep-num{font-size:10px;color:var(--red);font-weight:800;margin-bottom:3px}
.ep-name{font-size:13px;font-weight:700;margin-bottom:3px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ep-desc{font-size:11px;color:var(--muted);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.season-select{
  display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;
}
.season-select::-webkit-scrollbar{display:none}
.seas-btn{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  color:var(--muted);font-family:var(--font);transition:all .2s;
}
.seas-btn.active{background:var(--red);border-color:var(--red);color:#fff}

/* Similar grid */
.sim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

/* ── PLAYER MODAL ── */
#player-modal{
  display:none;
  position:fixed;inset:0;z-index:9000;
  background:#000;
  flex-direction:column;
  overflow:hidden;
}
#player-modal.open{display:flex}

/* TOP BAR — fixed height, never hidden, always clickable */
#pm-topbar{
  flex:0 0 54px;
  width:100%;
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:rgba(0,0,0,.92);
  border-bottom:1px solid rgba(255,255,255,.08);
  z-index:30;
  position:relative;
}

/* IFRAME fills ALL remaining space between topbar and bottombar */
#pm-iframe-wrap{
  flex:1 1 auto;
  position:relative;
  overflow:hidden;
  background:#000;
  min-height:0;
  width:100%;
}
/* When iframe-wrap goes native fullscreen */
#pm-iframe-wrap:fullscreen,
#pm-iframe-wrap:-webkit-full-screen{
  width:100vw;
  height:100vh;
  background:#000;
}
#pm-iframe-wrap:fullscreen #pm-iframe,
#pm-iframe-wrap:-webkit-full-screen #pm-iframe{
  position:absolute;
  top:0;left:0;width:100%;height:100%;
}
#pm-iframe{
  position:absolute;
  top:0;left:0;
  width:100%;
  height:100%;
  border:none;
  display:block;
  background:#000;
}
/* Only block top banner strip ~50px — ads appear there, controls don't */
#ad-shield-overlay{
  position:absolute;top:0;left:0;right:0;
  height:60px; /* covers top banner ad zone */
  z-index:5;pointer-events:none;
  background:transparent;
}

/* BOTTOM BAR — fixed height, never hidden, always clickable */
#pm-bottombar{
  flex:0 0 auto;
  width:100%;
  padding:10px 14px 18px;
  background:rgba(0,0,0,.92);
  border-top:1px solid rgba(255,255,255,.08);
  z-index:30;
  position:relative;
}
.pm-back{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .2s;font-weight:700;
}
.pm-back:active{background:rgba(229,9,26,.5);transform:scale(.92)}
.pm-title{
  flex:1;font-size:14px;font-weight:700;
  text-shadow:0 1px 6px rgba(0,0,0,.9);
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.pm-ep-badge{
  background:rgba(229,9,26,.8);border-radius:6px;
  padding:3px 8px;font-size:11px;font-weight:700;flex-shrink:0;
}
.pm-srv-row{
  display:flex;gap:6px;overflow-x:auto;
  padding-bottom:6px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.pm-srv-row::-webkit-scrollbar{display:none}
.pm-srv{
  flex-shrink:0;padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.85);font-family:var(--font);transition:all .2s;
  min-height:36px;display:flex;align-items:center;
}
.pm-srv:active{transform:scale(.95)}
.pm-srv.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 12px rgba(229,9,26,.5)}
.pm-actions{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.pm-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
  color:#fff;border-radius:10px;padding:9px 14px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;min-height:40px;
}
.pm-btn:active{transform:scale(.95)}
.pm-btn.red{background:rgba(229,9,26,.8);border-color:var(--red);box-shadow:0 2px 12px rgba(229,9,26,.4)}
.pm-shield{
  margin-left:auto;display:flex;align-items:center;gap:4px;
  background:rgba(0,200,80,.2);border:1px solid rgba(0,200,80,.4);
  color:#00c850;border-radius:20px;padding:6px 12px;
  font-size:11px;font-weight:800;flex-shrink:0;
}

/* Episode Panel in player */
#pm-ep-panel{
  display:none;position:fixed;inset:0;z-index:9010;
  background:rgba(7,7,15,.97);backdrop-filter:blur(20px);
  overflow-y:auto;padding:60px 16px 40px;
}
#pm-ep-panel.open{display:block}
.pm-ep-close{
  position:sticky;top:-60px;float:right;margin-bottom:10px;
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

/* ── WATCHLIST ── */
#wl-page .grid{padding-bottom:100px}
.wl-empty{
  text-align:center;padding:60px 20px;
  color:var(--muted);
}
.wl-empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}



/* ── SPINNER ── */
.spinwrap{display:flex;justify-content:center;padding:40px}
.spinner{
  width:36px;height:36px;border:3px solid rgba(229,9,26,.2);
  border-top-color:var(--red);border-radius:50%;
  animation:spin .7s linear infinite;
}

@keyframes sp{to{transform:rotate(360deg)}}
.auth-spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);
  background:rgba(20,20,35,.95);border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(20px);padding:10px 18px;border-radius:10px;
  font-size:13px;font-weight:600;z-index:99999;
  opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MISC ── */
.empty{padding:30px;text-align:center;color:var(--muted);font-size:13px}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}


/* ── DUB/SUB TOGGLE ── */
.dub-toggle{
  display:none;
  align-items:center;gap:8px;
  margin:0 16px 14px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--bdr);
  border-radius:12px;
  padding:10px 14px;
}
.dub-toggle.show{display:flex}
.dub-toggle-label{font-size:13px;font-weight:700;flex:1}
.dub-toggle-sub{font-size:11px;color:var(--muted)}
.dub-switch{
  position:relative;width:52px;height:28px;flex-shrink:0;
}
.dub-switch input{opacity:0;width:0;height:0}
.dub-slider{
  position:absolute;inset:0;background:rgba(255,255,255,.15);
  border-radius:28px;cursor:pointer;transition:.3s;border:1px solid var(--bdr);
}
.dub-slider::before{
  content:'';position:absolute;width:22px;height:22px;
  left:3px;top:2px;background:#fff;border-radius:50%;
  transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.4);
}
.dub-switch input:checked + .dub-slider{background:var(--red);border-color:var(--red)}
.dub-switch input:checked + .dub-slider::before{transform:translateX(24px)}
.dub-state{font-size:12px;font-weight:800;min-width:32px;text-align:right}
.dub-state.on{color:var(--red)}
.dub-state.off{color:var(--muted)}

/* ── LIVE TV ── */
.live-cats{

}
.live-cats::-webkit-scrollbar{display:none}
.live-cat{

  background:rgba(255,255,255,.07);border:1px solid var(--bdr);

}
.live-cat.active,.live-cat:hover{background:var(--red);border-color:var(--red);color:#fff}
/* ── ANIMATED FLAME ── */
@keyframes flicker {
  0%,100% { transform: scaleY(1) rotate(-2deg); filter: brightness(1); }
  20%      { transform: scaleY(1.06) rotate(1deg); filter: brightness(1.15); }
  40%      { transform: scaleY(0.95) rotate(-1deg); filter: brightness(0.9); }
  60%      { transform: scaleY(1.08) rotate(2deg); filter: brightness(1.2); }
  80%      { transform: scaleY(0.98) rotate(-2deg); filter: brightness(1.05); }
}
@keyframes flickerGlow {
  0%,100% { text-shadow: 0 0 8px #ff6b00, 0 0 16px #ff3300; }
  33%      { text-shadow: 0 0 14px #ff9000, 0 0 28px #ff5500, 0 0 40px #ff2200; }
  66%      { text-shadow: 0 0 6px #ff4400, 0 0 12px #ff2200; }
}
.flame-icon {
  display:inline-block;
  animation: flicker 1.4s ease-in-out infinite;
  transform-origin: bottom center;
  font-size: 18px;
}
.section-trending .sec-title {
  animation: flickerGlow 1.4s ease-in-out infinite;
  color: #fff;
  font-size: 17px;
  letter-spacing: .5px;
}
.section-trending .sec-title::before {
  background: linear-gradient(to bottom, #ff6b00, #ff2200);

}

    tmdb('/discover/tv',{sort_by:'first_air_date.desc','first_air_date.gte':'2020-01-01','vote_count.gte':10}),

    // Merge now-playing movies + on-air series, sort by date descending
    var nowMovies = (rs[0].results||[]).map(function(m){ m.media_type='movie'; return m; });
    var onAirTV   = (rs[1].results||[]).map(function(t){ t.media_type='tv';    return t; });

      var da = new Date(a.release_date||a.first_air_date||0);
      var db = new Date(b.release_date||b.first_air_date||0);
      return db - da;

  } else if(isAnime && !s.country){
    params.with_genres = '16';
  }
  if(s.country) params.with_origin_country = s.country;
  if(s.year && s.year !== 'older'){
    if(pg==='movies'){
      params['primary_release_year'] = s.year;

      // For a specific year, show that whole year
      params['first_air_date.gte'] = s.year+'-01-01';
      params['first_air_date.lte'] = s.year+'-12-31';

var browseTotal={movies:999,series:999,anime:999};

function fetchBrowse(pg){
  var gid=pg==='movies'?'mv-grid':pg==='series'?'sr-grid':'an-grid';
  var path=pg==='movies'?'/discover/movie':'/discover/tv';
  var type=pg==='movies'?'movie':'tv';
  browsePageNum[pg]=1; browseLoading[pg]=true;
  ge(gid).innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  // Remove old load-more btn if any
  var oldWrap=ge(pg+'-loadmore');
  if(oldWrap)oldWrap.remove();

  Promise.all([
    tmdb(path,buildBrowseParams(pg,1)),
    tmdb(path,buildBrowseParams(pg,2)),
    tmdb(path,buildBrowseParams(pg,3)),
  ]).then(function(rs){
    browseTotal[pg]=rs[0].total_pages||1;
    browsePageNum[pg]=3;
    browseLoading[pg]=false;
    var seen={};
    var items=[].concat(rs[0].results||[],rs[1].results||[],rs[2].results||[]).filter(function(it){
      if(seen[it.id])return false;seen[it.id]=1;return true;
    });
    if(!items.length){
      ge(gid).innerHTML='<div class="empty">No results found. Try adjusting filters.</div>';
      return;
    }
    ge(gid).innerHTML=items.map(function(it){return makeCard(it,type,false);}).join('');
    appendLoadMoreBtn(pg,gid);
  }).catch(function(){
    browseLoading[pg]=false;
    ge(gid).innerHTML='<div class="empty">Failed to load. Check connection.</div>';
  });
}

function appendLoadMoreBtn(pg,gid){
  var old=ge(pg+'-loadmore');if(old)old.remove();
  if(browsePageNum[pg]>=browseTotal[pg])return;
  var wrap=document.createElement('div');
  wrap.id=pg+'-loadmore';
  wrap.className='load-more-wrap';
  wrap.innerHTML='<button class="load-more-btn" id="lmbtn-'+pg+'">Load More</button>';
  ge(gid).after(wrap);
  ge('lmbtn-'+pg).addEventListener('click',function(){loadMoreBrowse(pg);});
}

function loadMoreBrowse(pg){
  if(browseLoading[pg])return;
  var next=browsePageNum[pg]+1;
  if(next>browseTotal[pg])return;
  browseLoading[pg]=true;
  var gid=pg==='movies'?'mv-grid':pg==='series'?'sr-grid':'an-grid';
  var path=pg==='movies'?'/discover/movie':'/discover/tv';
  var type=pg==='movies'?'movie':'tv';
  var wrap=ge(pg+'-loadmore');
  if(wrap)wrap.innerHTML='<div class="spinwrap" style="padding:20px"><div class="spinner"></div></div>';
  Promise.all([
    tmdb(path,buildBrowseParams(pg,next)),
    tmdb(path,buildBrowseParams(pg,next+1)),
  ]).then(function(rs){
    browsePageNum[pg]=Math.min(next+1,browseTotal[pg]);
    browseLoading[pg]=false;
    var seen={};
    ge(gid).querySelectorAll('.card').forEach(function(el){
      var oc=el.getAttribute('onclick')||'';
      var m=oc.match(/openDetail\((\d+)/);
      if(m)seen[m[1]]=1;
    });
    var items=[].concat(rs[0].results||[],rs[1].results||[]).filter(function(it){
      if(seen[it.id])return false;seen[it.id]=1;return true;
    });
    ge(gid).innerHTML+=items.map(function(it){return makeCard(it,type,false);}).join('');
    appendLoadMoreBtn(pg,gid);
  }).catch(function(){
    browseLoading[pg]=false;
    if(wrap)wrap.innerHTML='<button class="load-more-btn" id="lmbtn-'+pg+'">Try Again</button>';
    var b=ge('lmbtn-'+pg);if(b)b.addEventListener('click',function(){loadMoreBrowse(pg);});
  });
}

function openFilter(pg){
  filterPage = pg;
  ge('filter-drawer').classList.add('open');
  document.body.style.overflow='hidden';
  renderFilterDrawer(pg);
}
function closeFilter(){
  ge('filter-drawer').classList.remove('open');
  document.body.style.overflow='';
}

function chip(label, selClass, action){
  return '<div class="fd-chip '+selClass+'" data-action="'+action+'">'+label+'</div>';
}

function renderFilterDrawer(pg){
  var s = filterState[pg];
  var isMovie = pg==='movies';
  var isAnime = pg==='anime';
  var genres = isMovie ? GENRES_MOVIE : (isAnime ? GENRES_ANIME : GENRES_TV_LIST);
  var years = ['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','Older'];
  var h = '';

  // Sort
  h += '<div class="fd-sec-title">Sort By</div><div class="fd-chips">';
  (isMovie ? SORT_TABS : SORT_TABS_TV).forEach(function(t){
    var sel = s.sort===t.id ? 'selected fd-chip-all' : '';
    h += chip(t.n, sel, 'sort:'+t.id);
  });
  h += '</div>';

  // Genres
  h += '<div class="fd-divider"></div><div class="fd-sec-title">Genres</div><div class="fd-chips">';
  h += chip('All Genres', s.genres.length===0?'selected fd-chip-all':'', 'genre-all:');
  genres.forEach(function(g){
    h += chip(g.n, s.genres.indexOf(g.id)>=0?'selected':'', 'genre:'+g.id);
  });
  h += '</div>';

  // Country
  h += '<div class="fd-divider"></div><div class="fd-sec-title">Country</div><div class="fd-chips">';
  h += chip('All Countries', s.country===''?'selected fd-chip-all':'', 'country:');
  COUNTRIES.forEach(function(ct){
    h += chip(ct.n, s.country===ct.c?'selected':'', 'country:'+ct.c);
  });
  h += '</div>';

  // Year
  h += '<div class="fd-divider"></div><div class="fd-sec-title">Release Year</div><div class="fd-chips">';
  h += chip('All Time', s.year===''?'selected fd-chip-all':'', 'year:');
  years.forEach(function(yr){
    var yid = yr==='Older'?'older':yr;
    h += chip(yr, s.year===yid?'selected':'', 'year:'+yid);
  });
  h += '</div>';

  ge('fd-body').innerHTML = h;

  // Attach click listeners using data-action
  ge('fd-body').querySelectorAll('.fd-chip').forEach(function(el){
    el.addEventListener('click', function(){
      var act = this.getAttribute('data-action');
      var colon = act.indexOf(':');
      var key = act.slice(0, colon);
      var val = act.slice(colon+1);
      var s2 = filterState[filterPage];
      if(key==='sort')      { s2.sort=val; }
      else if(key==='country'){ s2.country=val; }
      else if(key==='year')   { s2.year=val; }
      else if(key==='genre-all'){ s2.genres=[]; }
      else if(key==='genre'){
        var i = s2.genres.indexOf(val);
        if(i>=0) s2.genres.splice(i,1); else s2.genres.push(val);
      }
      renderFilterDrawer(filterPage);
    });
  });
}

function applyFilter(){
  closeFilter();
  loadBrowse(filterPage);
}

function resetFilter(){
  filterState[filterPage]={sort:'popularity.desc',genres:[],country:'',year:''};
  renderFilterDrawer(filterPage);
  closeFilter();
  loadBrowse(filterPage);
}
// ═══ DETAIL ═══
function openDetail(id,type){
  prevPage=curPage;
  pType=type;pId=id;pEpS=1;pEpE=1;pSrv=0;
  go('detail',true);
  ge('d-backdrop').src='';
  ge('d-poster').src='';
  ge('d-title').textContent='Loading...';
  ge('d-chips').innerHTML='';
  ge('d-tagline').textContent='';
  ge('d-overview').textContent='';
  ge('d-btns').innerHTML='';
  ge('d-tabs').innerHTML='';
  ge('d-tab-content').innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  var path=type==='movie'?'/movie/'+id:'/tv/'+id;
  tmdb(path,{append_to_response:'credits,videos,similar,seasons'}).then(function(d){
    curDetail=d;curDetailType=type;
    pTitle=d.title||d.name||'';
    var vids=d.videos&&d.videos.results?d.videos.results:[];
    var trailer=vids.find(function(v){return v.site==='YouTube'&&v.type==='Trailer';});
    pYTKey=trailer?trailer.key:'';
    if(d.backdrop_path)ge('d-backdrop').src=iurl(d.backdrop_path,'w1280');
    if(d.poster_path)ge('d-poster').src=iurl(d.poster_path,'w342');
    else ge('d-poster').parentElement.style.display='none';
    ge('d-title').textContent=pTitle;
    var yr=(d.release_date||d.first_air_date||'').slice(0,4);
    var runtime=d.runtime?d.runtime+'m':d.episode_run_time?d.episode_run_time[0]+'m':'';
    var chips='';
    if(d.vote_average)chips+='<span class="chip gold">&#9733; '+d.vote_average.toFixed(1)+'</span>';
    if(yr)chips+='<span class="chip">'+yr+'</span>';
    if(runtime)chips+='<span class="chip">'+runtime+'</span>';
    if(d.status)chips+='<span class="chip">'+d.status+'</span>';
    (d.genres||[]).slice(0,3).forEach(function(g){chips+='<span class="chip">'+xe(g.name)+'</span>';});
    ge('d-chips').innerHTML=chips;
    if(d.tagline){ge('d-tagline').textContent='\u201c'+d.tagline+'\u201d';}
    ge('d-overview').textContent=d.overview||'No description available.';
    var inWL=watchlist.some(function(w){return w.id===id;});
    ge('d-btns').innerHTML=
      '<button class="btn btn-red" onclick="startPlay()">&#9654; Watch Now</button>'
      +'<button class="btn btn-ghost" id="wlbtn" onclick="toggleWL()">'+(inWL?'&#10003; Saved':'+ Watchlist')+'</button>'
      +(d.homepage?'<a href="'+d.homepage+'" target="_blank" class="btn btn-ghost btn-sm" rel="noopener">Official Site</a>':'');
    var tabs='<button class="tab active" onclick="switchTab(\'overview\',this)">Overview</button>';
    if(type==='tv')tabs+='<button class="tab" onclick="switchTab(\'episodes\',this)">Episodes</button>';
    if(d.credits&&d.credits.cast&&d.credits.cast.length)tabs+='<button class="tab" onclick="switchTab(\'cast\',this)">Cast</button>';
    if(d.similar&&d.similar.results&&d.similar.results.length)tabs+='<button class="tab" onclick="switchTab(\'similar\',this)">Similar</button>';
    ge('d-tabs').innerHTML=tabs;
    showDetailTab('overview',d);
  }).catch(function(){
    ge('d-title').textContent='Failed to load';
    ge('d-tab-content').innerHTML='<div class="empty">Could not load details. Please try again.</div>';
  });
}

  while(el && !el.getAttribute('data-actorid')) el = el.parentElement;
  if(!el) return;
  var aid = parseInt(el.getAttribute('data-actorid'));
  var aname = el.getAttribute('data-actorname') || '';

});

  var filter = el.getAttribute('data-filter');
  actorFilter = filter;

    });
    credits.sort(function(a,b){return (b.popularity||0)-(a.popularity||0);});
    renderActorBody(p, credits);
  });
});

function switchTab(name,btn){
  document.querySelectorAll('#d-tabs .tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  showDetailTab(name,curDetail);
}

function showDetailTab(name,d){
  var h='';
  if(name==='overview'){
    var crew=d.credits&&d.credits.crew?d.credits.crew:[];
    var dir=crew.find(function(c){return c.job==='Director';});
    if(dir)h+='<p style="font-size:12px;color:var(--muted);margin-bottom:12px">Director: <b style="color:var(--text)">'+xe(dir.name)+'</b></p>';
    if(d.production_companies&&d.production_companies.length){
      h+='<p style="font-size:12px;color:var(--muted)">Studio: <b style="color:var(--text)">'+xe(d.production_companies[0].name)+'</b></p>';
    }
  } else if(name==='episodes'){
    var seas=(d.seasons||[]).filter(function(s){return s.season_number>0;});
    h='<div class="season-select" id="seas-btns">'
      +seas.map(function(s){return '<button class="seas-btn'+(s.season_number===1?' active':'')+'" onclick="loadSeasonEps('+s.season_number+',this)">Season '+s.season_number+'</button>';}).join('')
      +'</div><div id="ep-list"><div class="spinwrap"><div class="spinner"></div></div></div>';
    ge('d-tab-content').innerHTML=h;
    if(seas.length)loadSeasonEps(1,null);
    return;
  } else if(name==='cast'){
    var cast=(d.credits&&d.credits.cast?d.credits.cast:[]).slice(0,30);
    h='<p style="font-size:11px;color:var(--muted);margin-bottom:12px;text-align:center">👆 Tap any cast member to see their full filmography</p>';
    h+='<div class="cast-row">'+cast.map(function(cm){
      var img=cm.profile_path?iurl(cm.profile_path,'w185'):'';
      return '<div class="cast-card cast-card-tap" data-actorid="'+cm.id+'" data-actorname="'+xe(cm.name).replace(/"/g,'&quot;')+'">'
        +'<div class="cast-img-wrap">'
        +(img?'<img class="cast-img" src="'+img+'" loading="lazy" alt="'+xe(cm.name)+'">'
          :'<div class="cast-img cast-img-blank">&#128100;</div>')
        +'<div class="cast-img-overlay">&#9654;</div>'
        +'</div>'
        +'<div class="cast-name">'+xe(cm.name)+'</div>'
        +'<div class="cast-role">'+xe(cm.character||'')+'</div>'
        +'</div>';
    }).join('')+'</div>';

  } else if(name==='similar'){
    var sim=(d.similar&&d.similar.results?d.similar.results:[]).slice(0,12);
    h='<div class="sim-grid">'+sim.map(function(s){return makeCard(s,curDetailType,false);}).join('')+'</div>';
  }
  ge('d-tab-content').innerHTML=h;
}

function loadSeasonEps(season,btn){
  if(btn){
    document.querySelectorAll('.seas-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
  }
  ge('ep-list').innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
  tmdb('/tv/'+pId+'/season/'+season).then(function(d){
    var eps=d.episodes||[];
    ge('ep-list').innerHTML=eps.map(function(ep){
      var thumb=ep.still_path?iurl(ep.still_path,'w300'):'';
      return '<div class="ep-item'+(season===pEpS&&ep.episode_number===pEpE?' active-ep':'')+'" onclick="playEp('+season+','+ep.episode_number+')">'
        +'<div class="ep-thumb">'
        +(thumb?'<img src="'+thumb+'" loading="lazy" alt="">':'<div style="width:100%;height:100%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:20px">&#127916;</div>')
        +'<div class="ep-thumb-play">&#9654;</div>'
        +'</div>'
        +'<div class="ep-info">'
        +'<div class="ep-num">S'+season+' E'+ep.episode_number+'</div>'
        +'<div class="ep-name">'+xe(ep.name||'Episode '+ep.episode_number)+'</div>'
        +(ep.overview?'<div class="ep-desc">'+xe(ep.overview)+'</div>':'')
        +'</div>'
        +'</div>';
    }).join('');
  }).catch(function(){
    ge('ep-list').innerHTML='<div class="empty">Failed to load episodes.</div>';
  });
}

// ═══ PLAYER MODAL ═══
function pmFullscreen(){
  var wrap = ge('pm-iframe-wrap') || ge('player-modal');
  // Request native fullscreen on the wrapper element
  var req = wrap.requestFullscreen || wrap.webkitRequestFullscreen || wrap.mozRequestFullScreen || wrap.msRequestFullscreen;
  if(req){
    req.call(wrap).then(function(){
      // After fullscreen granted, lock to landscape
      try{
        if(screen.orientation && screen.orientation.lock){
          screen.orientation.lock('landscape').catch(function(){});
        } else if(window.screen.lockOrientation){
          window.screen.lockOrientation('landscape');
        } else if(window.screen.mozLockOrientation){
          window.screen.mozLockOrientation('landscape');
        }
      }catch(e){}
    }).catch(function(){
      // Fallback: just try orientation lock without fullscreen
      try{
        if(screen.orientation && screen.orientation.lock)
          screen.orientation.lock('landscape').catch(function(){});
      }catch(e){}
    });
  } else {
    // Older iOS Safari — can't do programmatic fullscreen, just lock orientation
    try{
      if(screen.orientation && screen.orientation.lock)
        screen.orientation.lock('landscape').catch(function(){});
    }catch(e){}
    toast('Tap the video expand button for fullscreen');
  }
}

// Listen for native fullscreen change — unlock orientation on exit
document.addEventListener('fullscreenchange', function(){
  if(!document.fullscreenElement){
    try{
      if(screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    }catch(e){}
  }
});
document.addEventListener('webkitfullscreenchange', function(){
  if(!document.webkitFullscreenElement){
    try{
      if(screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    }catch(e){}
  }
});

var _errTimer = null;
function openPlayer(src,srvIdx,epInfo){
  var modal=ge('player-modal');
  try{if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(function(){});}catch(e){}
  window.open=function(){ return null; };
  ge('pm-iframe').src=src;
  // Hide any previous error banner
  var eb = ge('pm-err-banner');
  if(eb) eb.style.display='none';
  // Auto-detect failed stream: if after 20s iframe didn't load content,
  // show a "try next server" banner (we can't read inside iframe, so use timer)
  clearTimeout(_errTimer);
  if(srvIdx >= 0){ // not trailer
    _errTimer = setTimeout(function(){
      if(ge('player-modal').classList.contains('open')){
        var eb2 = ge('pm-err-banner');
        if(eb2) eb2.style.display='flex';
      }
    }, 20000);
  }
  ge('pm-title').textContent=pTitle||'Now Playing';
  var epBadge=ge('pm-ep-badge');
  if(epInfo){epBadge.textContent=epInfo;epBadge.style.display='block';}
  else{epBadge.style.display='none';}
  ge('pm-srv-row').innerHTML=SRVN.map(function(n,i){
    return '<button class="pm-srv'+(i===srvIdx?' active':'')+'" onclick="switchSrv('+i+')">S'+(i+1)+' '+n+'</button>';
  }).join('');
  var epBtn=ge('pm-ep-btn');if(epBtn)epBtn.style.display=pType==='tv'?'inline-flex':'none';
  var trlBtn=ge('pm-trl-btn');if(trlBtn)trlBtn.style.display=pYTKey?'inline-flex':'none';
  modal.classList.add('open');
  document.body.style.overflow='hidden';
  pmShowControls();
  installAB();
}

function closePlayer(){
  clearTimeout(_errTimer);
  var eb=ge('pm-err-banner');if(eb)eb.style.display='none';
  ge('pm-iframe').src='';
  ge('player-modal').classList.remove('open');
  pmCloseEps();
  document.body.style.overflow='';
  try{if(screen.orientation&&screen.orientation.unlock)screen.orientation.unlock();}catch(e){}
}

function switchSrv(idx){
  pSrv=idx;

// ═══ WATCHLIST ═══
function toggleWL(){
  var idx=watchlist.findIndex(function(w){return w.id===pId;});
  if(idx>=0){watchlist.splice(idx,1);toast('Removed from watchlist');}
  else{
    watchlist.push({id:pId,type:pType,title:pTitle,poster:curDetail?curDetail.poster_path:''});
    toast('Added to watchlist');
  }
  try{localStorage.setItem('fw_wl',JSON.stringify(watchlist));}catch(e){}
  updateWLCount();
  var btn=ge('wlbtn');
  if(btn)btn.textContent=watchlist.some(function(w){return w.id===pId;})?'&#10003; Saved':'+ Watchlist';
}
function updateWLCount(){var el=ge('wlc');if(el)el.textContent=watchlist.length;}
function renderWL(){
  if(!watchlist.length){
    ge('wl-grid').innerHTML='<div class="wl-empty" style="grid-column:1/-1"><div class="wl-empty-icon">&#128278;</div><div>Your watchlist is empty</div><div style="margin-top:8px;font-size:12px">Add movies and series to watch later</div></div>';
    return;
  }
  ge('wl-grid').innerHTML=watchlist.map(function(w){
    return makeCard({id:w.id,title:w.title,name:w.title,poster_path:w.poster,media_type:w.type},w.type,false);
  }).join('');
}

// ═══ SEARCH ═══
var searchDebounce=null;
function doSearch(q){
  var clr=ge('sclr');
  if(clr)clr.className='btn'+(q?' show':'');
  clearTimeout(searchDebounce);
  if(!q){if(curPage==='search')go('home',true);return;}
  searchDebounce=setTimeout(function(){
    go('search',true);
    ge('sr-title').textContent='Results for "'+q+'"';
    ge('sr-grid2').innerHTML='<div class="spinwrap"><div class="spinner"></div></div>';
    tmdb('/search/multi',{query:q}).then(function(d){
      var res=(d.results||[]).filter(function(r){return r.media_type==='movie'||r.media_type==='tv';});
      if(!res.length){ge('sr-grid2').innerHTML='<div class="empty">No results found</div>';return;}
      ge('sr-grid2').innerHTML=res.map(function(r){return makeCard(r,r.media_type,false);}).join('');
    });
  },400);
}
function clearSearch(){ge('sinput').value='';ge('sclr').className='btn';if(curPage==='search')go('home',true);}


// ═══ AD BLOCKER ═══
function installAB(){
  if(window._abOn)return;
  window._abOn=true;

  // ── 1. Nuke window.open completely ──────────────────────────────
  window.open=function(){ toast('🛡 Ad blocked'); return null; };

  // ── 2. Block window.location hijacks from iframes ───────────────
  // Intercept any attempt by an iframe to navigate the top window
  window.addEventListener('beforeunload', function(e){
    if(ge('player-modal') && ge('player-modal').classList.contains('open')){
      e.preventDefault();
      e.returnValue='';
      return '';
    }
  });

  // ── 3. Kill all new tab / popup attempts ────────────────────────
  window.addEventListener('click', function(e){
    var el = e.target;
    // Walk up the DOM to find anchor tags
    while(el && el.tagName !== 'A') el = el.parentElement;
    if(!el) return;
    var href = el.getAttribute('href') || '';
    var target = el.getAttribute('target') || '';
    // Block any external link not from our own origin that tries to open new tab
    if(target === '_blank' && href && href.indexOf(location.origin) === -1 &&
       href.indexOf('youtube') === -1 && href.slice(0,1) !== '#'){
      e.preventDefault();
      e.stopPropagation();
      toast('🛡 Ad blocked');
    }
  }, true);

  // ── 4. Intercept iframe navigation attempts via postMessage ──────
  window.addEventListener('message', function(e){
    try{
      var d = typeof e.data === 'string' ? e.data : JSON.stringify(e.data);
      // Common ad redirect triggers
      if(d.indexOf('location')>=0 && d.indexOf('href')>=0) return;
    }catch(err){}
  });

  // ── 5. Re-intercept after iframe loads (they overwrite window.open) ──
  var iframe = ge('pm-iframe');
  if(iframe){
    iframe.addEventListener('load', function(){
      try{
        // Block iframe's contentWindow.open if same-origin — cross-origin iframes
        // are sandboxed anyway, but this covers edge cases
        if(iframe.contentWindow){
          iframe.contentWindow.open = function(){ return null; };
        }
      }catch(err){}
    });
  }

  // ── 6. Block document-level popunder trick ───────────────────────
  // Some sources detect mouse leave and fire window.open on it
  document.addEventListener('mouseleave', function(e){
    if(e.clientY <= 0) e.stopImmediatePropagation();
  }, true);

  // ── 7. Periodically restore window.open in case iframe overwrites it ──
  setInterval(function(){
    if(window.open.toString().indexOf('native code') >= 0){
      window.open = function(){ toast('🛡 Ad blocked'); return null; };
    }
  }, 500);

  // ── 8. Block visibility-change popunder trick ────────────────────
  // Malicious scripts open popup when tab loses/gains focus
  document.addEventListener('visibilitychange', function(){
    window.open = function(){ return null; };
  });
}


// ═══ ACTOR PROFILE ═══
var curActorId = null;
var actorFilter = 'all'; // 'all','movie','tv'

function openActorProfile(actorId, actorName){
  curActorId = actorId;
  actorFilter = 'all';
  var page = ge('actor-page');
  ge('actor-topbar-name').textContent = actorName;
  ge('actor-name').textContent = actorName;
  ge('actor-meta').innerHTML = '';
  ge('actor-hero-img').src = '';
  ge('actor-body').innerHTML = '<div class="spinwrap"><div class="spinner"></div></div>';
  page.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Fetch person details + combined_credits in one call
  Promise.all([
    tmdb('/person/'+actorId, {append_to_response:'combined_credits,images'}),
  ]).then(function(rs){
    var p = rs[0];
    // Hero image — try profile photo
    var imgPath = p.profile_path ? iurl(p.profile_path,'h632') : '';
    if(imgPath) ge('actor-hero-img').src = imgPath;

    ge('actor-name').textContent = p.name || actorName;
    ge('actor-topbar-name').textContent = p.name || actorName;

    // Meta chips
    var meta = '';
    if(p.birthday) meta += '<span>Born: '+p.birthday.slice(0,10)+'</span>';
    if(p.place_of_birth) meta += '<span>'+xe(p.place_of_birth)+'</span>';
    if(p.known_for_department) meta += '<span>'+xe(p.known_for_department)+'</span>';
    ge('actor-meta').innerHTML = meta;

    // Build filmography
    var credits = (p.combined_credits && p.combined_credits.cast) ? p.combined_credits.cast : [];
    // Deduplicate by id, sort by popularity desc
    var seen = {};
    credits = credits.filter(function(cr){
      if(seen[cr.id]) return false;
      seen[cr.id] = 1;
      // Skip items without a release date (unreleased)
      return (cr.release_date||cr.first_air_date);
    });
    credits.sort(function(a,b){ return (b.popularity||0)-(a.popularity||0); });

    renderActorBody(p, credits);
  }).catch(function(err){
    ge('actor-body').innerHTML = '<div class="empty">Could not load profile. Try again.</div>';
  });
}

function renderActorBody(p, allCredits){
  var bio = p.biography || '';
  var credits = allCredits;

  // Filter by type
  if(actorFilter === 'movie'){
    credits = allCredits.filter(function(c){ return c.media_type==='movie'; });
  } else if(actorFilter === 'tv'){
    credits = allCredits.filter(function(c){ return c.media_type==='tv'; });
  }

  var h = '';

  // Biography
  if(bio){
    h += '<div class="actor-section-title">Biography</div>';
    var bioId = 'actor-bio-text';
    h += '<div class="actor-bio collapsed" id="'+bioId+'">'+xe(bio)+'</div>';
    h += '<span class="actor-bio-toggle" onclick="toggleActorBio()">Read more</span>';
  }

  // Filter chips
  var movieCount = allCredits.filter(function(c){return c.media_type==='movie';}).length;
  var tvCount    = allCredits.filter(function(c){return c.media_type==='tv';}).length;
  h += '<div class="actor-section-title">Filmography</div>';
  h += '<div class="actor-known-for" id="actor-filter-row" style="margin-bottom:14px">';
  h += '<button class="actor-kf-chip'+(actorFilter==='all'?' active':'')+'" data-filter="all">All ('+allCredits.length+')</button>';
  h += '<button class="actor-kf-chip'+(actorFilter==='movie'?' active':'')+'" data-filter="movie">Movies ('+movieCount+')</button>';
  h += '<button class="actor-kf-chip'+(actorFilter==='tv'?' active':'')+'" data-filter="tv">Series ('+tvCount+')</button>';
  h += '</div>';

  // Grid of credits
  if(!credits.length){
    h += '<div class="empty">No credits found.</div>';
  } else {
    h += '<div class="actor-filmography-grid">';
    credits.forEach(function(cr){
      var type = cr.media_type || 'movie';
      var title = xe(cr.title || cr.name || '');
      var poster = cr.poster_path ? iurl(cr.poster_path,'w342') : '';
      var yr = (cr.release_date||cr.first_air_date||'').slice(0,4);
      var rating = cr.vote_average ? cr.vote_average.toFixed(1) : '';
      h += '<div class="card actor-film-card" data-filmid="'+cr.id+'" data-filmtype="'+type+'" style="cursor:pointer">';
      h += '<div class="card-img-wrap">';
      if(poster){
        h += '<img class="card-img" src="'+poster+'" loading="lazy" alt="'+title+'">';
      } else {
        h += '<div class="card-img" style="background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);padding:8px;text-align:center">'+title+'</div>';
      }
      if(rating) h += '<div class="card-rating">&#9733; '+rating+'</div>';
      // Type badge
      h += '<div style="position:absolute;top:5px;right:5px;background:rgba(0,0,0,.75);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;text-transform:uppercase">'+(type==='movie'?'FILM':'TV')+'</div>';
      h += '</div>';
      h += '<div class="card-info"><div class="card-title">'+title+'</div>';
      if(yr) h += '<div class="card-yr">'+yr+'</div>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  ge('actor-body').innerHTML = h;

  // Restore bio toggle state
  var bioEl = ge('actor-bio-text');
  if(bioEl) bioEl._expanded = false;
}



function toggleActorBio(){
  var el = ge('actor-bio-text');
  var btn = el && el.nextElementSibling;
  if(!el) return;
  el._expanded = !el._expanded;
  el.classList.toggle('collapsed', !el._expanded);
  if(btn) btn.textContent = el._expanded ? 'Show less' : 'Read more';
}

function closeActorProfile(){
  ge('actor-page').classList.remove('open');
  document.body.style.overflow = '';
  curActorId = null;
}

// ═══ TOAST ═══
var toastT;
function toast(msg){var t=ge('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('on');},2500);}

// ═══ INIT ═══
updateWLCount();
loadHome();
</script>
